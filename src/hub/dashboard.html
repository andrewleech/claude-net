<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-net</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1b26;
    --bg-surface: #24283b;
    --bg-hover: #2f3349;
    --border: #3b3f54;
    --text: #c0caf5;
    --text-muted: #565f89;
    --text-dim: #737aa2;
    --green: #9ece6a;
    --red: #f7768e;
    --blue: #7aa2f7;
    --cyan: #7dcfff;
    --orange: #ff9e64;
    --purple: #bb9af7;
    --yellow: #e0af68;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .status-dot.online { background: var(--green); }
  .status-dot.offline { background: var(--red); }

  /* Main layout */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Panels */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-shrink: 0;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* Agent sidebar */
  .sidebar { width: 200px; flex-shrink: 0; }

  .agent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .agent-item:hover { background: var(--bg-hover); }

  .agent-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .agent-dot.online { background: var(--green); }
  .agent-dot.offline { background: var(--text-muted); }

  .agent-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Message feed */
  .feed { flex: 1; min-width: 0; }

  .feed .panel-body { padding: 4px 8px; }

  .msg-entry {
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 2px;
    font-size: 13px;
    line-height: 1.4;
  }

  .msg-entry:hover { background: var(--bg-hover); }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 1px;
  }

  .msg-route {
    font-weight: 600;
    font-size: 12px;
  }

  .msg-route.direct { color: var(--blue); }
  .msg-route.broadcast { color: var(--orange); }
  .msg-route.team { color: var(--purple); }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .msg-content {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 80px;
    overflow: hidden;
  }

  /* Teams panel */
  .teams-panel { width: 220px; flex-shrink: 0; }

  .team-item {
    padding: 6px 12px;
    font-size: 13px;
  }

  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 2px 0;
    font-weight: 500;
  }

  .team-header:hover { color: var(--cyan); }

  .team-count {
    font-size: 11px;
    color: var(--text-muted);
  }

  .team-members {
    padding-left: 14px;
    margin-top: 2px;
  }

  .team-member {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1px 0;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Send bar */
  .send-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .send-bar label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .send-bar input, .send-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }

  .send-bar input:focus, .send-bar select:focus {
    border-color: var(--blue);
  }

  #to-field { width: 160px; }
  #msg-field { flex: 1; }

  #send-btn {
    background: var(--blue);
    color: var(--bg);
    border: none;
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  .send-error {
    font-size: 12px;
    color: var(--red);
    margin-left: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Dashboard / mirror root wrappers — each behaves like the original body
     flex column so header + main + footer keep their layout. */
  #dashboard-root,
  #mirror-root {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #mirror-root { display: none; }
  body.mirror-mode #dashboard-root { display: none; }
  body.mirror-mode #mirror-root { display: flex; }

  /* "Back to dashboard" breadcrumb in the mirror header */
  .mirror-nav-back {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-right: 12px;
  }
  .mirror-nav-back:hover { background: var(--bg-hover); color: var(--text); }

  .mirror-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .mirror-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .mirror-title .sid { color: var(--text-muted); font-family: monospace; margin-left: 8px; }
  .mirror-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .mirror-meta span { white-space: nowrap; }
  .mirror-meta .cwd { font-family: monospace; }

  .mirror-transcript {
    flex: 1; overflow-y: auto;
    padding: 16px 24px; display: flex; flex-direction: column; gap: 12px;
  }
  .m-evt { max-width: 78ch; word-wrap: break-word; font-size: 13px; line-height: 1.45; }
  .m-evt pre { white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; }
  .m-evt-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

  .m-evt-user { align-self: stretch; padding: 10px 12px; background: rgba(122,162,247,0.10); border-left: 3px solid var(--blue); border-radius: 4px; }
  .m-evt-user .m-label { color: var(--blue); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .m-evt-assistant { align-self: stretch; padding: 10px 12px; background: rgba(158,206,106,0.08); border-left: 3px solid var(--green); border-radius: 4px; }
  .m-evt-assistant .m-label { color: var(--green); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .m-evt-tool { align-self: stretch; padding: 8px 12px; background: var(--bg-surface); border-left: 3px solid var(--cyan); border-radius: 4px; }
  .m-evt-tool .m-label { color: var(--cyan); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .m-evt-tool details { margin-top: 4px; }
  .m-evt-tool summary { cursor: pointer; color: var(--text-muted); font-size: 12px; user-select: none; }
  .m-evt-tool .m-tool-result { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
  .m-evt-tool.is-error { border-left-color: var(--red); }

  /* Tool-card headline shared styles */
  .m-tool-headline {
    display: flex; align-items: baseline; gap: 10px; font-size: 13px;
    color: var(--text); line-height: 1.4;
  }
  .m-tool-headline .m-tool-name {
    font-size: 10px; font-weight: 600; color: var(--cyan);
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .m-tool-headline .m-tool-target {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .m-tool-sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
  }
  .m-tool-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; background: var(--border); color: var(--text-muted);
    margin-left: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .m-tool-badge.pending { background: rgba(224,175,104,0.20); color: var(--yellow); }
  .m-tool-badge.ok { background: rgba(158,206,106,0.15); color: var(--green); }
  .m-tool-badge.error { background: rgba(247,118,142,0.18); color: var(--red); }
  .m-tool-badge.nosupport { background: rgba(187,154,247,0.15); color: var(--purple); }

  /* TodoWrite list */
  .m-todo { list-style: none; padding: 6px 0 0 0; margin: 0; font-size: 12.5px; }
  .m-todo li { padding: 2px 0; color: var(--text); }
  .m-todo li.pending::before { content: "○ "; color: var(--text-dim); }
  .m-todo li.in_progress::before { content: "● "; color: var(--yellow); }
  .m-todo li.completed::before { content: "✓ "; color: var(--green); text-decoration: line-through; opacity: 0.7; }
  .m-todo li.completed { text-decoration: line-through; opacity: 0.7; }

  /* Diff for Edit/Write */
  .m-diff { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; margin-top: 6px; }
  .m-diff .m-diff-old { background: rgba(247,118,142,0.10); color: var(--red); padding: 0 4px; display: block; }
  .m-diff .m-diff-new { background: rgba(158,206,106,0.10); color: var(--green); padding: 0 4px; display: block; }
  .m-diff .m-diff-old::before { content: "- "; }
  .m-diff .m-diff-new::before { content: "+ "; }

  /* Question cards (ExitPlanMode / AskUserQuestion) */
  .m-evt-question {
    align-self: stretch; padding: 12px 14px; border-radius: 6px;
    border: 1px solid var(--yellow); background: rgba(224,175,104,0.06);
  }
  .m-evt-question.answered { border-color: var(--border); background: var(--bg-surface); }
  .m-q-banner {
    display: inline-block; font-size: 10px; font-weight: 700;
    color: var(--yellow); text-transform: uppercase; letter-spacing: 0.6px;
    padding: 2px 8px; border: 1px solid var(--yellow); border-radius: 3px;
  }
  .m-evt-question.answered .m-q-banner { color: var(--text-dim); border-color: var(--border); }
  .m-q-body { margin-top: 10px; font-size: 13px; line-height: 1.55; }
  .m-q-body h1, .m-q-body h2, .m-q-body h3 {
    font-weight: 600; color: var(--text); margin-top: 10px; margin-bottom: 4px;
  }
  .m-q-body h1 { font-size: 16px; }
  .m-q-body h2 { font-size: 14px; }
  .m-q-body h3 { font-size: 13px; color: var(--text-muted); }
  .m-q-body ul, .m-q-body ol { margin-left: 22px; margin-top: 4px; margin-bottom: 4px; }
  .m-q-body li { margin: 2px 0; }
  .m-q-body code {
    background: var(--bg); padding: 1px 4px; border-radius: 3px;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px;
  }
  .m-q-body pre {
    background: var(--bg); padding: 8px 10px; border-radius: 4px; margin: 6px 0;
    border-left: 2px solid var(--border); overflow-x: auto;
  }
  .m-q-body strong { font-weight: 600; color: var(--text); }
  .m-q-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .m-q-action {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 3px; font-size: 12px; cursor: pointer;
    font-family: inherit; text-align: left;
  }
  .m-q-action:hover { background: var(--bg-hover); border-color: var(--blue); }
  .m-q-action.primary { background: rgba(158,206,106,0.10); border-color: var(--green); color: var(--green); }
  .m-q-action.primary:hover { background: rgba(158,206,106,0.20); }
  .m-q-action .m-q-action-desc { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: normal; }
  .m-q-answer { margin-top: 10px; font-size: 12px; color: var(--text-muted); font-style: italic; }

  .m-evt-notif { align-self: center; color: var(--text-muted); font-style: italic; font-size: 12px; }
  .m-evt-compact { align-self: center; color: var(--text-dim); font-size: 12px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); padding: 4px 12px; }
  .m-evt-end { align-self: center; color: var(--orange); font-size: 12px; font-weight: 600; }
  .m-truncated { color: var(--orange); font-size: 11px; margin-left: 6px; }

  .mirror-compose {
    display: flex; align-items: stretch; gap: 8px;
    padding: 12px 24px; background: var(--bg-surface); border-top: 1px solid var(--border);
  }
  .mirror-compose.compose-hidden { display: none; }
  .mirror-compose-note { font-size: 12px; color: var(--text-muted); padding: 6px 0; flex: 1; }
  .mirror-compose textarea {
    flex: 1; min-height: 44px; max-height: 140px; resize: vertical;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px;
  }
  .mirror-compose textarea:focus { outline: none; border-color: var(--blue); }
  .mirror-compose button {
    background: var(--blue); color: var(--bg); border: none; padding: 0 18px;
    border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer;
    align-self: stretch; min-width: 80px;
  }
  .mirror-compose button:hover { opacity: 0.85; }
  .mirror-compose button:disabled { opacity: 0.4; cursor: default; }
  .mirror-compose-err { font-size: 12px; color: var(--red); padding: 4px 12px; min-height: 18px; }

  .mirror-share-btn {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 3px; font-size: 11px; cursor: pointer;
  }
  .mirror-share-btn:hover { background: var(--bg-hover); }

  .mirror-status { font-size: 11px; padding: 4px 12px; color: var(--text-muted); }
  .mirror-status.error { color: var(--red); }

  /* Mirror sessions list on the main dashboard */
  .mirror-list-heading {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 10px 12px 6px; border-top: 1px solid var(--border); margin-top: 4px;
  }
  .mirror-list-empty { padding: 6px 14px 10px; font-size: 12px; color: var(--text-dim); font-style: italic; }
  .mirror-list-item {
    display: block; padding: 8px 12px; cursor: pointer; text-decoration: none;
    color: inherit; border-left: 3px solid transparent;
  }
  .mirror-list-item:hover { background: var(--bg-hover); border-left-color: var(--blue); }
  .mirror-list-item .mli-owner { font-size: 13px; color: var(--text); }
  .mirror-list-item .mli-cwd { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-top: 2px; }
  .mirror-list-item .mli-meta {
    display: flex; gap: 10px; font-size: 10px; color: var(--text-dim); margin-top: 3px;
  }
  .mirror-list-item .mli-watchers {
    color: var(--green); font-weight: 600;
  }
</style>
</head>
<body>

<div id="dashboard-root">
<header>
  <h1>claude-net</h1>
  <div class="header-stats">
    <span id="agent-count">0 agents</span>
    <span id="team-count">0 teams</span>
    <span><span id="conn-dot" class="status-dot offline"></span><span id="conn-label">disconnected</span></span>
  </div>
</header>

<main>
  <div class="panel sidebar">
    <div class="panel-header">Agents</div>
    <div class="panel-body" id="agent-list"></div>
    <div class="mirror-list-heading">Mirror sessions</div>
    <div id="mirror-session-list"></div>
  </div>

  <div class="panel feed">
    <div class="panel-header">Messages</div>
    <div class="panel-body" id="msg-feed"></div>
  </div>

  <div class="panel teams-panel">
    <div class="panel-header">Teams</div>
    <div class="panel-body" id="team-list"></div>
  </div>
</main>

<div class="send-bar">
  <label for="to-field">To:</label>
  <input type="text" id="to-field" placeholder="agent, broadcast, team:name" list="to-suggestions">
  <datalist id="to-suggestions"></datalist>
  <input type="text" id="msg-field" placeholder="Message content...">
  <button id="send-btn">Send</button>
  <span class="send-error" id="send-error"></span>
</div>
</div>

<div id="mirror-root">
  <header class="mirror-header">
    <a class="mirror-nav-back" href="/" title="Back to main dashboard">← dashboard</a>
    <div class="mirror-title">mirror session<span class="sid" id="mirror-sid"></span></div>
    <div class="mirror-meta">
      <span class="cwd" id="mirror-cwd"></span>
      <span id="mirror-owner"></span>
      <span id="mirror-conn">connecting…</span>
      <button id="mirror-share-btn" class="mirror-share-btn" type="button" style="display:none" title="Create a read-only share link">share</button>
    </div>
  </header>
  <div class="mirror-status" id="mirror-status"></div>
  <div class="mirror-transcript" id="mirror-transcript"></div>
  <div class="mirror-compose compose-hidden" id="mirror-compose">
    <textarea id="mirror-compose-text" placeholder="Send a prompt to the local claude (Enter to send, Shift+Enter for newline)…" rows="2"></textarea>
    <button id="mirror-compose-send" type="button">Send</button>
  </div>
  <div class="mirror-compose-err" id="mirror-compose-err"></div>
</div>

<script>
(function() {
  'use strict';

  // --- Router: dashboard (default) vs mirror view (/mirror/:sid) ---
  var mirrorMatch = location.pathname.match(/^\/mirror\/([^/]+)\/?$/);
  if (mirrorMatch) {
    document.body.classList.add('mirror-mode');
    startMirror(decodeURIComponent(mirrorMatch[1]));
    return;
  }

  // --- Dashboard state ---
  const agents = new Map(); // fullName -> { name, fullName, status }
  const teams = new Map();  // teamName -> { members: string[] }
  const messages = [];       // { from, to, type, content, team?, timestamp, routeType }
  const MAX_MESSAGES = 200;
  const RECONNECT_INTERVAL = 3000;

  // --- DOM refs ---
  const agentListEl = document.getElementById('agent-list');
  const msgFeedEl = document.getElementById('msg-feed');
  const teamListEl = document.getElementById('team-list');
  const agentCountEl = document.getElementById('agent-count');
  const teamCountEl = document.getElementById('team-count');
  const connDot = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const toField = document.getElementById('to-field');
  const msgField = document.getElementById('msg-field');
  const sendBtn = document.getElementById('send-btn');
  const sendError = document.getElementById('send-error');
  const toSuggestions = document.getElementById('to-suggestions');
  const mirrorListEl = document.getElementById('mirror-session-list');

  // Active mirror sessions (full entries with owner_token for click-through).
  const mirrorSessions = new Map(); // sid -> entry

  // --- WebSocket ---
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/dashboard');

    ws.onopen = function() {
      setConnected(true);
      if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
      refreshMirrorSessions();
    };

    ws.onmessage = function(e) {
      var event;
      try { event = JSON.parse(e.data); } catch { return; }
      handleEvent(event);
    };

    ws.onclose = function() {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = function() {
      // onclose will fire after this
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        connect();
      }
    }, RECONNECT_INTERVAL);
  }

  function setConnected(connected) {
    connDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
    connLabel.textContent = connected ? 'connected' : 'disconnected';
  }

  // --- Event handling ---
  function handleEvent(event) {
    switch (event.event) {
      case 'agent:connected':
        agents.set(event.full_name, {
          name: event.name,
          fullName: event.full_name,
          status: 'online'
        });
        renderAgents();
        updateSuggestions();
        break;

      case 'agent:disconnected':
        agents.delete(event.full_name);
        renderAgents();
        updateSuggestions();
        break;

      case 'message:routed':
        addMessage(event);
        break;

      case 'dashboard:message':
        addMessage(event);
        break;

      case 'team:changed':
        if (event.action === 'deleted') {
          teams.delete(event.team);
        } else {
          teams.set(event.team, { members: event.members || [] });
        }
        renderTeams();
        updateSuggestions();
        break;

      case 'mirror:session_started':
        // Partial info from the event; fetch full session (with token + URL).
        refreshMirrorSessions();
        break;

      case 'mirror:session_ended':
        mirrorSessions.delete(event.sid);
        renderMirrorSessions();
        break;

      case 'mirror:watcher_joined':
      case 'mirror:watcher_left': {
        const entry = mirrorSessions.get(event.sid);
        if (entry) {
          entry.watcher_count = (entry.watcher_count || 0) +
            (event.event === 'mirror:watcher_joined' ? 1 : -1);
          if (entry.watcher_count < 0) entry.watcher_count = 0;
          renderMirrorSessions();
        }
        break;
      }

      case 'mirror:event': {
        const entry = mirrorSessions.get(event.sid);
        if (entry) {
          entry.last_event_at = new Date(event.ts || Date.now()).toISOString();
          entry.transcript_len = (entry.transcript_len || 0) + 1;
          renderMirrorSessions();
        }
        break;
      }
    }

    updateCounts();
  }

  // --- Mirror sessions (dashboard panel) ---
  function refreshMirrorSessions() {
    fetch('/api/mirror/sessions/all')
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(list) {
        mirrorSessions.clear();
        if (Array.isArray(list)) {
          for (var i = 0; i < list.length; i++) {
            mirrorSessions.set(list[i].sid, list[i]);
          }
        }
        renderMirrorSessions();
      })
      .catch(function() { /* ignore */ });
  }

  function renderMirrorSessions() {
    if (!mirrorListEl) return;
    var entries = Array.from(mirrorSessions.values())
      .sort(function(a, b) { return b.last_event_at.localeCompare(a.last_event_at); });
    if (entries.length === 0) {
      mirrorListEl.innerHTML = '<div class="mirror-list-empty">no active mirrors</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var age = relativeTime(e.last_event_at);
      var watchers = (e.watcher_count || 0) > 0
        ? '<span class="mli-watchers">' + e.watcher_count + ' watching</span>'
        : '';
      html +=
        '<a class="mirror-list-item" href="' + escapeAttr(e.mirror_url) + '" target="_blank" rel="noopener">' +
          '<div class="mli-owner">' + escapeHtml(e.owner_agent) + '</div>' +
          '<div class="mli-cwd">' + escapeHtml(e.cwd || '') + '</div>' +
          '<div class="mli-meta">' +
            '<span>' + (e.transcript_len || 0) + ' events</span>' +
            '<span>' + age + '</span>' +
            watchers +
          '</div>' +
        '</a>';
    }
    mirrorListEl.innerHTML = html;
  }

  function relativeTime(iso) {
    if (!iso) return '';
    var t = new Date(iso).getTime();
    if (!isFinite(t)) return '';
    var dt = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (dt < 10) return 'just now';
    if (dt < 60) return dt + 's ago';
    if (dt < 3600) return Math.floor(dt / 60) + 'm ago';
    if (dt < 86400) return Math.floor(dt / 3600) + 'h ago';
    return Math.floor(dt / 86400) + 'd ago';
  }

  // --- Render agents ---
  function renderAgents() {
    var sorted = Array.from(agents.values()).sort(function(a, b) {
      if (a.status !== b.status) return a.status === 'online' ? -1 : 1;
      return a.fullName.localeCompare(b.fullName);
    });

    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var ag = sorted[i];
      html += '<div class="agent-item" data-name="' + escapeAttr(ag.fullName) + '">'
        + '<span class="agent-dot ' + ag.status + '"></span>'
        + '<span class="agent-name">' + escapeHtml(ag.fullName) + '</span>'
        + '</div>';
    }
    agentListEl.innerHTML = html;

    // Bind click handlers
    var items = agentListEl.querySelectorAll('.agent-item');
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener('click', function() {
        toField.value = this.getAttribute('data-name');
        msgField.focus();
      });
    }
  }

  // --- Render messages ---
  function addMessage(event) {
    var routeType = 'direct';
    var toLabel = event.to;
    if (event.to === 'broadcast') {
      routeType = 'broadcast';
      toLabel = 'broadcast';
    } else if (event.team) {
      routeType = 'team';
      toLabel = 'team:' + event.team;
    }

    messages.push({
      from: event.from,
      to: toLabel,
      type: event.type,
      content: event.content,
      timestamp: event.timestamp,
      routeType: routeType
    });

    while (messages.length > MAX_MESSAGES) {
      messages.shift();
    }

    renderLastMessage();
  }

  function renderLastMessage() {
    var msg = messages[messages.length - 1];
    if (!msg) return;

    var el = document.createElement('div');
    el.className = 'msg-entry';
    el.innerHTML =
      '<div class="msg-meta">'
        + '<span class="msg-route ' + msg.routeType + '">'
          + escapeHtml(msg.from) + ' &rarr; ' + escapeHtml(msg.to)
        + '</span>'
        + '<span class="msg-time">' + formatTime(msg.timestamp) + '</span>'
      + '</div>'
      + '<div class="msg-content">' + escapeHtml(msg.content) + '</div>';

    msgFeedEl.appendChild(el);

    // Remove excess DOM nodes
    while (msgFeedEl.children.length > MAX_MESSAGES) {
      msgFeedEl.removeChild(msgFeedEl.firstChild);
    }

    // Auto-scroll
    msgFeedEl.scrollTop = msgFeedEl.scrollHeight;
  }

  // --- Render teams ---
  function renderTeams() {
    var html = '';
    var teamNames = Array.from(teams.keys()).sort();
    for (var i = 0; i < teamNames.length; i++) {
      var tName = teamNames[i];
      var team = teams.get(tName);
      var members = team.members || [];

      html += '<div class="team-item">'
        + '<div class="team-header" data-team="' + escapeAttr(tName) + '">'
          + '<span>' + escapeHtml(tName) + '</span>'
          + '<span class="team-count">' + members.length + '</span>'
        + '</div>'
        + '<div class="team-members">';

      for (var j = 0; j < members.length; j++) {
        var memberName = members[j];
        var ag = agents.get(memberName);
        var status = ag ? ag.status : 'offline';
        html += '<div class="team-member">'
          + '<span class="agent-dot ' + status + '"></span>'
          + '<span>' + escapeHtml(memberName) + '</span>'
          + '</div>';
      }

      html += '</div></div>';
    }
    teamListEl.innerHTML = html;
  }

  // --- Update counts ---
  function updateCounts() {
    var onlineCount = 0;
    agents.forEach(function(ag) { if (ag.status === 'online') onlineCount++; });
    agentCountEl.textContent = onlineCount + ' agent' + (onlineCount !== 1 ? 's' : '');
    teamCountEl.textContent = teams.size + ' team' + (teams.size !== 1 ? 's' : '');
  }

  // --- Update to-field suggestions ---
  function updateSuggestions() {
    var html = '<option value="broadcast">';
    agents.forEach(function(ag) {
      html += '<option value="' + escapeAttr(ag.fullName) + '">';
    });
    teams.forEach(function(_, tName) {
      html += '<option value="team:' + escapeAttr(tName) + '">';
    });
    toSuggestions.innerHTML = html;
  }

  // --- Send message ---
  function doSend() {
    var to = toField.value.trim();
    var content = msgField.value.trim();
    sendError.textContent = '';

    if (!to || !content) return;
    sendBtn.disabled = true;

    var url, body;
    if (to === 'broadcast') {
      url = '/api/broadcast';
      body = { from: 'dashboard', content: content };
    } else if (to.startsWith('team:')) {
      url = '/api/send_team';
      body = { from: 'dashboard', team: to.slice(5), content: content };
    } else {
      url = '/api/send';
      body = { from: 'dashboard', to: to, content: content };
    }

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      sendBtn.disabled = false;
      if (data.error) {
        sendError.textContent = data.error;
      } else {
        msgField.value = '';
      }
    })
    .catch(function(err) {
      sendBtn.disabled = false;
      sendError.textContent = 'Send failed: ' + err.message;
    });
  }

  sendBtn.addEventListener('click', doSend);
  msgField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });

  // --- Helpers ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  // --- Init ---
  connect();
  updateCounts();

  // ── Mirror view (scoped within the outer IIFE so helpers are in scope) ─
  function startMirror(sid) {
    var token = '';
    var hash = location.hash || '';
    var m = hash.match(/(?:^#|&)token=([^&]+)/);
    if (m) token = decodeURIComponent(m[1]);

    var sidEl = document.getElementById('mirror-sid');
    var cwdEl = document.getElementById('mirror-cwd');
    var ownerEl = document.getElementById('mirror-owner');
    var connEl = document.getElementById('mirror-conn');
    var statusEl = document.getElementById('mirror-status');
    var transcriptEl = document.getElementById('mirror-transcript');

    sidEl.textContent = sid;
    connEl.textContent = 'connecting…';

    if (!token) {
      statusEl.className = 'mirror-status error';
      statusEl.textContent = 'Missing token in URL fragment. Paste the full mirror URL (including #token=...).';
      connEl.textContent = 'unauthenticated';
      return;
    }

    var rendered = Object.create(null); // uuid → true
    var userScrolledUp = false;
    var SCROLL_LOCK_THRESHOLD = 80;

    transcriptEl.addEventListener('scroll', function() {
      var distance = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
      userScrolledUp = distance > SCROLL_LOCK_THRESHOLD;
    });

    function scrollToBottom() {
      if (userScrolledUp) return;
      requestAnimationFrame(function() {
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      });
    }

    // ── Tool renderers ───────────────────────────────────────────────
    // Each entry has { call(payload, el), result(payload, el), label? }.
    // `call` is invoked when the tool_call arrives; `result` when the
    // matching tool_result arrives on the same card. Fallbacks cover
    // tools we don't have a custom renderer for yet.

    function toolLabelFromName(name) {
      if (!name) return '';
      // Parse MCP tool names: mcp__<server>__<tool> → "<server>: <tool>"
      var m = name.match(/^mcp__([^_]+)__(.+)$/);
      if (m) return m[1] + ': ' + m[2];
      return name;
    }

    function shortPath(p) {
      if (!p) return '';
      var parts = p.split('/');
      if (parts.length <= 2) return p;
      return '…/' + parts.slice(-2).join('/');
    }

    function makeHeadline(toolName, target, sub) {
      var html =
        '<div class="m-tool-headline">' +
          '<span class="m-tool-name">' + escapeHtml(toolLabelFromName(toolName)) + '</span>' +
          '<span class="m-tool-target">' + (target || '') + '</span>' +
          '<span class="m-tool-badge pending" data-role="status">pending</span>' +
        '</div>';
      if (sub) html += '<div class="m-tool-sub">' + sub + '</div>';
      return html;
    }

    function setStatusOk(el, text) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge ok'; badge.textContent = text || 'done'; }
    }
    function setStatusError(el) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge error'; badge.textContent = 'error'; }
      el.classList.add('is-error');
    }

    function appendDetails(el, summary, body, opts) {
      var open = opts && opts.open ? ' open' : '';
      var d = document.createElement('details');
      d.innerHTML = '<summary>' + escapeHtml(summary) + '</summary>' + body;
      if (open) d.setAttribute('open', '');
      el.appendChild(d);
      return d;
    }

    function truncateLines(text, maxLines) {
      if (!text) return '';
      var lines = String(text).split('\n');
      if (lines.length <= maxLines) return text;
      return lines.slice(0, maxLines).join('\n') +
        '\n… (' + (lines.length - maxLines) + ' more lines)';
    }

    var TOOL_RENDERERS = {
      Read: {
        call: function(p, el) {
          var fp = p.input && p.input.file_path;
          el.innerHTML = makeHeadline('Read',
            '<span title="' + escapeAttr(fp || '') + '">' + escapeHtml(shortPath(fp || '')) + '</span>');
        },
        result: function(p, el) {
          if (p.is_error) { setStatusError(el); } else { setStatusOk(el, 'read'); }
          var resp = typeof p.response === 'string' ? p.response : tryJson(p.response);
          var preview = truncateLines(resp, 20);
          appendDetails(el, 'content (' + (resp ? resp.split('\n').length : 0) + ' lines)',
            '<pre>' + escapeHtml(preview) + '</pre>');
        },
      },
      Bash: {
        call: function(p, el) {
          var cmd = p.input && p.input.command;
          var desc = p.input && p.input.description;
          el.innerHTML = makeHeadline('Bash',
            '<span class="m-tool-target">$ ' + escapeHtml(truncateLines(cmd || '', 1).slice(0, 200)) + '</span>',
            desc ? escapeHtml(desc) : null);
        },
        result: function(p, el) {
          var resp = typeof p.response === 'string' ? p.response : tryJson(p.response);
          if (p.is_error) { setStatusError(el); } else { setStatusOk(el, 'exit 0'); }
          appendDetails(el, 'stdout + stderr', '<pre>' + escapeHtml(truncateLines(resp, 30)) + '</pre>',
            { open: true });
        },
      },
      Edit: {
        call: function(p, el) {
          var fp = p.input && p.input.file_path;
          el.innerHTML = makeHeadline('Edit',
            '<span title="' + escapeAttr(fp || '') + '">✎ ' + escapeHtml(shortPath(fp || '')) + '</span>');
          var oldS = p.input && p.input.old_string;
          var newS = p.input && p.input.new_string;
          if (oldS || newS) {
            var diff = document.createElement('div');
            diff.className = 'm-diff';
            diff.innerHTML =
              (oldS ? '<span class="m-diff-old">' + escapeHtml(truncateLines(oldS, 5)) + '</span>' : '') +
              (newS ? '<span class="m-diff-new">' + escapeHtml(truncateLines(newS, 5)) + '</span>' : '');
            el.appendChild(diff);
          }
        },
        result: function(p, el) {
          if (p.is_error) { setStatusError(el); } else { setStatusOk(el, 'saved'); }
        },
      },
      Write: {
        call: function(p, el) {
          var fp = p.input && p.input.file_path;
          var content = (p.input && p.input.content) || '';
          el.innerHTML = makeHeadline('Write',
            '<span title="' + escapeAttr(fp || '') + '">+ ' + escapeHtml(shortPath(fp || '')) + '</span>',
            content.split('\n').length + ' lines');
          appendDetails(el, 'preview', '<pre>' + escapeHtml(truncateLines(content, 15)) + '</pre>');
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, 'written');
        },
      },
      Grep: {
        call: function(p, el) {
          var pat = p.input && p.input.pattern;
          var where = (p.input && (p.input.glob || p.input.path)) || '.';
          el.innerHTML = makeHeadline('Grep',
            '🔍 <code>' + escapeHtml(pat || '') + '</code>',
            'in ' + escapeHtml(where));
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el);
          else setStatusOk(el, 'done');
          var resp = typeof p.response === 'string' ? p.response : tryJson(p.response);
          var lines = (resp || '').split('\n').filter(function(l) { return l.length > 0; });
          appendDetails(el, lines.length + ' result(s)',
            '<pre>' + escapeHtml(truncateLines(resp || '', 25)) + '</pre>');
        },
      },
      Glob: {
        call: function(p, el) {
          var pat = p.input && p.input.pattern;
          el.innerHTML = makeHeadline('Glob', '📁 <code>' + escapeHtml(pat || '') + '</code>');
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el);
          else setStatusOk(el, 'done');
          var resp = typeof p.response === 'string' ? p.response : tryJson(p.response);
          var lines = (resp || '').split('\n').filter(function(l) { return l.length > 0; });
          appendDetails(el, lines.length + ' match(es)',
            '<pre>' + escapeHtml(truncateLines(resp || '', 20)) + '</pre>');
        },
      },
      TodoWrite: {
        call: function(p, el) {
          var todos = (p.input && p.input.todos) || [];
          var inProg = todos.filter(function(t) { return t.status === 'in_progress'; }).length;
          var done = todos.filter(function(t) { return t.status === 'completed'; }).length;
          el.innerHTML = makeHeadline('TodoWrite',
            '✓ ' + todos.length + ' task' + (todos.length === 1 ? '' : 's'),
            done + ' done · ' + inProg + ' in progress');
          if (todos.length > 0) {
            var ul = document.createElement('ul');
            ul.className = 'm-todo';
            for (var i = 0; i < todos.length; i++) {
              var t = todos[i];
              var li = document.createElement('li');
              li.className = t.status || 'pending';
              li.textContent = t.status === 'in_progress' && t.activeForm ? t.activeForm : t.content || '';
              ul.appendChild(li);
            }
            el.appendChild(ul);
          }
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, 'updated');
        },
      },
      Task: {
        call: function(p, el) {
          var desc = p.input && p.input.description;
          var type = p.input && p.input.subagent_type;
          var prompt = (p.input && p.input.prompt) || '';
          el.innerHTML = makeHeadline('Task',
            '▶ ' + escapeHtml(type || 'agent') + ': ' + escapeHtml(desc || ''));
          if (prompt) {
            appendDetails(el, 'prompt', '<pre>' + escapeHtml(truncateLines(prompt, 15)) + '</pre>');
          }
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, 'done');
          var resp = typeof p.response === 'string' ? p.response : tryJson(p.response);
          appendDetails(el, 'result', '<pre>' + escapeHtml(truncateLines(resp || '', 30)) + '</pre>',
            { open: true });
        },
      },
      NotebookEdit: {
        call: function(p, el) {
          var fp = p.input && p.input.notebook_path;
          el.innerHTML = makeHeadline('NotebookEdit', '✎ ' + escapeHtml(shortPath(fp || '')));
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, 'saved');
        },
      },
    };

    // Render an unknown tool with a clear "no custom view yet" note.
    function renderUnknownToolCall(payload, el) {
      var name = payload.tool_name || 'tool';
      el.innerHTML = makeHeadline(name, '');
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge nosupport'; badge.textContent = 'no view'; }
      appendDetails(el, 'input (raw)',
        '<pre>' + escapeHtml(tryJson(payload.input)) + '</pre>');
    }
    function renderUnknownToolResult(payload, el) {
      var resp = typeof payload.response === 'string' ? payload.response : tryJson(payload.response);
      if (payload.is_error) setStatusError(el);
      else setStatusOk(el, 'done');
      appendDetails(el, 'result (raw)', '<pre>' + escapeHtml(truncateLines(resp, 30)) + '</pre>');
    }

    // ── Question cards (ExitPlanMode, AskUserQuestion) ───────────────

    function renderQuestionExitPlanMode(evt, payload) {
      var card = document.createElement('div');
      card.className = 'm-evt m-evt-question';
      card.setAttribute('data-tool-use-id', payload.tool_use_id || '');
      var planMd = (payload.input && payload.input.plan) || '';
      card.innerHTML =
        '<span class="m-q-banner">plan awaiting approval</span>' +
        '<div class="m-q-body">' + renderMarkdown(planMd) + '</div>' +
        '<div class="m-q-actions">' +
          '<button type="button" class="m-q-action primary" data-action="approve">Approve → compose</button>' +
          '<button type="button" class="m-q-action" data-action="reject">Reject → compose</button>' +
        '</div>';
      card.querySelector('[data-action="approve"]').addEventListener('click', function() {
        prefillCompose('Proceed with this plan.');
      });
      card.querySelector('[data-action="reject"]').addEventListener('click', function() {
        prefillCompose("Don't do that — ");
      });
      return card;
    }

    function renderQuestionAskUserQuestion(evt, payload) {
      var card = document.createElement('div');
      card.className = 'm-evt m-evt-question';
      card.setAttribute('data-tool-use-id', payload.tool_use_id || '');
      var qs = (payload.input && payload.input.questions) || [];
      var html = '<span class="m-q-banner">awaiting answer</span>';
      for (var i = 0; i < qs.length; i++) {
        var q = qs[i];
        html += '<div class="m-q-body"><strong>' + escapeHtml(q.question || '') + '</strong></div>';
        html += '<div class="m-q-actions">';
        var opts = q.options || [];
        for (var j = 0; j < opts.length; j++) {
          var o = opts[j];
          html += '<button type="button" class="m-q-action" data-inject="' + escapeAttr(o.label || '') + '">' +
            escapeHtml(o.label || '') +
            (o.description ? '<span class="m-q-action-desc">' + escapeHtml(o.description) + '</span>' : '') +
          '</button>';
        }
        html += '</div>';
      }
      card.innerHTML = html;
      var btns = card.querySelectorAll('.m-q-action[data-inject]');
      for (var k = 0; k < btns.length; k++) {
        btns[k].addEventListener('click', function(e) {
          var text = e.currentTarget.getAttribute('data-inject');
          sendInject(text);
        });
      }
      return card;
    }

    function markQuestionAnswered(cardEl, payload) {
      cardEl.classList.add('answered');
      var banner = cardEl.querySelector('.m-q-banner');
      if (banner) banner.textContent = 'answered';
      var actions = cardEl.querySelector('.m-q-actions');
      if (actions) actions.remove();
      var resp = typeof payload.response === 'string' ? payload.response : tryJson(payload.response);
      if (resp) {
        var a = document.createElement('div');
        a.className = 'm-q-answer';
        a.textContent = '→ ' + truncateLines(resp, 2);
        cardEl.appendChild(a);
      }
    }

    // ── Tiny markdown renderer (headings / lists / code / bold) ─────

    function renderMarkdown(src) {
      if (!src) return '';
      // Normalize
      src = String(src).replace(/\r\n/g, '\n');
      var out = '';
      var lines = src.split('\n');
      var i = 0;
      while (i < lines.length) {
        var line = lines[i];
        // Fenced code
        var fence = line.match(/^```(.*)$/);
        if (fence) {
          var body = '';
          i++;
          while (i < lines.length && !/^```/.test(lines[i])) {
            body += lines[i] + '\n';
            i++;
          }
          i++;
          out += '<pre><code>' + escapeHtml(body) + '</code></pre>';
          continue;
        }
        // Heading
        var h = line.match(/^(#{1,3}) +(.*)$/);
        if (h) {
          out += '<h' + h[1].length + '>' + inlineMd(h[2]) + '</h' + h[1].length + '>';
          i++; continue;
        }
        // List (unordered)
        if (/^\s*[-*] +/.test(line)) {
          out += '<ul>';
          while (i < lines.length && /^\s*[-*] +/.test(lines[i])) {
            out += '<li>' + inlineMd(lines[i].replace(/^\s*[-*] +/, '')) + '</li>';
            i++;
          }
          out += '</ul>';
          continue;
        }
        // List (ordered)
        if (/^\s*\d+\. +/.test(line)) {
          out += '<ol>';
          while (i < lines.length && /^\s*\d+\. +/.test(lines[i])) {
            out += '<li>' + inlineMd(lines[i].replace(/^\s*\d+\. +/, '')) + '</li>';
            i++;
          }
          out += '</ol>';
          continue;
        }
        // Blank line → paragraph break
        if (line.trim() === '') { i++; continue; }
        // Paragraph
        var para = line;
        i++;
        while (i < lines.length && lines[i].trim() !== '' &&
               !/^#{1,3} /.test(lines[i]) && !/^```/.test(lines[i]) &&
               !/^\s*[-*] /.test(lines[i]) && !/^\s*\d+\. /.test(lines[i])) {
          para += ' ' + lines[i];
          i++;
        }
        out += '<p>' + inlineMd(para) + '</p>';
      }
      return out;
    }

    function inlineMd(s) {
      if (!s) return '';
      // Order matters: escape first, then apply inline markup.
      var out = escapeHtml(s);
      // `code`
      out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
      // **bold**
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }

    // ── Main renderEvent ─────────────────────────────────────────────

    function renderEvent(evt) {
      if (!evt || !evt.uuid || rendered[evt.uuid]) return;
      rendered[evt.uuid] = true;

      var kind = evt.kind;
      var payload = evt.payload || {};
      var el;
      var ts = formatTime(new Date(evt.ts).toISOString());

      if (kind === 'user_prompt') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-user';
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">user</span> ' + ts + '</div>' +
          '<pre>' + escapeHtml(payload.prompt || '') + '</pre>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
      } else if (kind === 'assistant_message') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-assistant';
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">assistant</span> ' + ts + '</div>' +
          '<pre>' + escapeHtml(payload.text || '') + '</pre>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
      } else if (kind === 'tool_call') {
        // Question tools get their own card; everything else uses the
        // tool-renderer registry with a safe fallback for unknown names.
        if (payload.tool_name === 'ExitPlanMode') {
          el = renderQuestionExitPlanMode(evt, payload);
        } else if (payload.tool_name === 'AskUserQuestion') {
          el = renderQuestionAskUserQuestion(evt, payload);
        } else {
          el = document.createElement('div');
          el.className = 'm-evt m-evt-tool';
          el.setAttribute('data-tool-use-id', payload.tool_use_id || '');
          var renderer = TOOL_RENDERERS[payload.tool_name];
          if (renderer && typeof renderer.call === 'function') {
            renderer.call(payload, el);
          } else {
            renderUnknownToolCall(payload, el);
          }
        }
      } else if (kind === 'tool_result') {
        // Try to attach to the matching tool_call / question card.
        var existing = payload.tool_use_id
          ? transcriptEl.querySelector('[data-tool-use-id="' + cssEscape(payload.tool_use_id) + '"]')
          : null;
        if (existing) {
          if (existing.classList.contains('m-evt-question')) {
            markQuestionAnswered(existing, payload);
          } else {
            var r = TOOL_RENDERERS[payload.tool_name];
            if (r && typeof r.result === 'function') {
              r.result(payload, existing);
            } else {
              renderUnknownToolResult(payload, existing);
            }
          }
          scrollToBottom();
          return;
        }
        // No matching call — render stand-alone result.
        el = document.createElement('div');
        el.className = 'm-evt m-evt-tool' + (payload.is_error ? ' is-error' : '');
        el.innerHTML = makeHeadline(payload.tool_name || 'tool', '(orphan result)');
        var r2 = TOOL_RENDERERS[payload.tool_name];
        if (r2 && typeof r2.result === 'function') r2.result(payload, el);
        else renderUnknownToolResult(payload, el);
      } else if (kind === 'notification') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-notif';
        el.innerHTML = escapeHtml(payload.text || '');
      } else if (kind === 'compact') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-compact';
        el.innerHTML = '— conversation ' + (payload.phase === 'pre' ? 'compacting' : 'compacted') + ' —';
      } else if (kind === 'session_start') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-notif';
        el.innerHTML = '— session started (' + escapeHtml(payload.source || '') + ') —';
      } else if (kind === 'session_end') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-end';
        el.innerHTML = '— session ended (' + escapeHtml(payload.reason || '') + ') —';
      } else {
        el = document.createElement('div');
        el.className = 'm-evt';
        el.innerHTML = '<pre>' + escapeHtml(JSON.stringify(evt)) + '</pre>';
      }

      transcriptEl.appendChild(el);
      scrollToBottom();
    }

    function prefillCompose(text) {
      var ct = document.getElementById('mirror-compose-text');
      if (!ct) return;
      ct.value = text;
      ct.focus();
      // Move caret to end
      var len = ct.value.length;
      try { ct.setSelectionRange(len, len); } catch (e) { /* ignore */ }
    }

    function sendInject(text) {
      if (!text || !text.trim()) return;
      var errEl = document.getElementById('mirror-compose-err');
      fetch('/api/mirror/' + encodeURIComponent(sid) + '/inject?t=' + encodeURIComponent(token), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, watcher: 'web-button' })
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          if (r.status >= 400 && errEl) {
            errEl.textContent = (r.body && r.body.error) || ('HTTP ' + r.status);
          }
        })
        .catch(function(err) {
          if (errEl) errEl.textContent = 'Send failed: ' + (err && err.message ? err.message : err);
        });
    }

    var isOwner = false;
    function applyInit(msg) {
      cwdEl.textContent = msg.cwd || '';
      ownerEl.textContent = msg.owner_agent || '';
      connEl.textContent = 'connected';
      if (msg.closed_at) {
        statusEl.className = 'mirror-status';
        statusEl.textContent = 'session closed at ' + msg.closed_at;
      }
      isOwner = msg.token_type === 'owner';
      var shareBtn = document.getElementById('mirror-share-btn');
      if (shareBtn) shareBtn.style.display = isOwner ? '' : 'none';
      var compose = document.getElementById('mirror-compose');
      if (compose && !isOwner) compose.classList.add('compose-hidden');
      transcriptEl.innerHTML = '';
      rendered = Object.create(null);
      userScrolledUp = false;  // fresh init → start at bottom
      if (Array.isArray(msg.transcript)) {
        for (var i = 0; i < msg.transcript.length; i++) {
          renderEvent(msg.transcript[i]);
        }
      }
      scrollToBottom();
    }

    var mws = null;
    var mReconnectTimer = null;
    function mConnect() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = proto + '//' + location.host + '/ws/mirror/' + encodeURIComponent(sid) + '?t=' + encodeURIComponent(token);
      try {
        mws = new WebSocket(url);
      } catch (e) {
        connEl.textContent = 'error';
        statusEl.className = 'mirror-status error';
        statusEl.textContent = 'Failed to open WebSocket: ' + (e && e.message ? e.message : e);
        return;
      }
      mws.onopen = function() { connEl.textContent = 'connected'; statusEl.textContent = ''; statusEl.className = 'mirror-status'; };
      mws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.event === 'mirror:init') applyInit(msg);
        else if (msg.event === 'mirror:event') renderEvent(msg);
        else if (msg.event === 'error') {
          statusEl.className = 'mirror-status error';
          statusEl.textContent = msg.message || 'error';
        }
      };
      mws.onclose = function() {
        connEl.textContent = 'disconnected';
        if (mReconnectTimer) return;
        mReconnectTimer = setTimeout(function() { mReconnectTimer = null; mConnect(); }, 3000);
      };
      mws.onerror = function() { /* close will follow */ };
    }
    mConnect();

    // Compose box (remote inject). Shown because we have an owner token —
    // reader-token UX lands in Phase M3.
    var composeEl = document.getElementById('mirror-compose');
    var composeText = document.getElementById('mirror-compose-text');
    var composeSend = document.getElementById('mirror-compose-send');
    var composeErr = document.getElementById('mirror-compose-err');
    if (composeEl) composeEl.classList.remove('compose-hidden');

    function doInject() {
      var text = composeText.value;
      if (!text || !text.trim()) return;
      composeSend.disabled = true;
      composeErr.textContent = '';
      fetch('/api/mirror/' + encodeURIComponent(sid) + '/inject?t=' + encodeURIComponent(token), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, watcher: 'web' })
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          composeSend.disabled = false;
          if (r.status >= 400) {
            composeErr.textContent = (r.body && r.body.error) || ('HTTP ' + r.status);
          } else {
            composeText.value = '';
          }
        })
        .catch(function(err) {
          composeSend.disabled = false;
          composeErr.textContent = 'Send failed: ' + (err && err.message ? err.message : err);
        });
    }

    if (composeSend) composeSend.addEventListener('click', doInject);
    if (composeText) {
      composeText.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doInject();
        }
      });
    }

    var shareBtn = document.getElementById('mirror-share-btn');
    if (shareBtn) {
      shareBtn.addEventListener('click', function() {
        shareBtn.disabled = true;
        fetch('/api/mirror/' + encodeURIComponent(sid) + '/share?t=' + encodeURIComponent(token), { method: 'POST' })
          .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
          .then(function(r) {
            shareBtn.disabled = false;
            if (r.status >= 400) {
              statusEl.className = 'mirror-status error';
              statusEl.textContent = (r.body && r.body.error) || 'share failed';
              return;
            }
            var url = r.body.mirror_url;
            if (url) {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).catch(function() { /* ignore */ });
              }
              statusEl.className = 'mirror-status';
              statusEl.textContent = 'reader link copied: ' + url;
            }
          })
          .catch(function(err) {
            shareBtn.disabled = false;
            statusEl.className = 'mirror-status error';
            statusEl.textContent = 'share failed: ' + (err && err.message ? err.message : err);
          });
      });
    }
  }

  function tryJson(v) {
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function cssEscape(s) {
    return String(s).replace(/[^a-zA-Z0-9_-]/g, function(c) {
      return '\\' + c;
    });
  }
})();
</script>
</body>
</html>
