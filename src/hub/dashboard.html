<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>claude-net</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ───────────────────────────────────────────────────────────────
     BROADCAST CONSOLE
     Aesthetic: op-room / live broadcast monitor. Sharp corners,
     monospace everywhere structural, one saturated accent (amber-
     red "on air"), subtle scanlines for atmosphere. The feed is a
     continuous ticker, not a stack of cards.
     ─────────────────────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Dark (default) — broadcast monitor. */
    --bg: #0b0c10;
    --bg-panel: #101218;
    --bg-surface: #14171f;
    --bg-hover: #1a1e27;
    --bg-elevate: #1c2029;
    --border: #262a33;
    --border-dim: #1a1d24;
    --text: #e8ebef;
    --text-dim: #8b92a0;
    --text-muted: #545a66;

    /* ── One saturated accent: broadcast red-orange. Everything hot
         (live pulses, active selections, new-event flashes, user
         prompts, focus rings) uses this. Resist the urge to add
         more. ── */
    --accent: #ff4d2e;
    --accent-dim: #c53c22;
    --accent-glow: rgba(255, 77, 46, 0.18);
    --accent-ink: rgba(255, 77, 46, 0.08);

    /* Supporting hues, desaturated — used sparingly as type tags. */
    --gold: #d4a04d;
    --green: #55c27a;
    --red: #ff4d2e;       /* alias of --accent so existing error styles keep working */
    --blue: #6fb0d4;      /* desaturated, not the 'main' colour any more */
    --cyan: #6fc3d9;
    --orange: #ff9e64;
    --purple: #b48ceb;
    --yellow: #d4a04d;    /* aliases --gold */

    --font-sans: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace;

    /* Scanline texture colour — swaps to a dark version on light
       theme. Keeps the broadcast-monitor feel on both modes. */
    --scanline: rgba(255, 255, 255, 0.012);

    /* Code-block ground (terminal-style panels — slightly darker
       than --bg on dark theme, slightly lighter than --bg on light). */
    --bg-code: #07080b;

    /* Text colour to use on top of the accent fill — keeps contrast
       readable on either theme. */
    --on-accent: #0b0c10;
  }

  /* Light theme overrides. */
  body.theme-light {
    --bg: #f3efe5;
    --bg-panel: #ebe6d7;
    --bg-surface: #e3ddcb;
    --bg-hover: #ddd5bf;
    --bg-elevate: #d5ccb2;
    --border: #bfb59a;
    --border-dim: #d0c7ae;
    --text: #1c1a16;
    --text-dim: #55534d;
    --text-muted: #8a8679;
    --accent: #c53518;
    --accent-dim: #9a2810;
    --accent-glow: rgba(197, 53, 24, 0.18);
    --accent-ink: rgba(197, 53, 24, 0.09);
    --gold: #8a6a28;
    --green: #3f8f52;
    --red: #c53518;
    --blue: #3a7594;
    --cyan: #3a7594;
    --orange: #c55a18;
    --purple: #7b4da3;
    --yellow: #8a6a28;
    --scanline: rgba(0, 0, 0, 0.022);
    --bg-code: #e8e0cc;
    --on-accent: #fff9ee;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* Very faint vertical scanline overlay — the 'broadcast monitor'
       texture. Tuned low enough to stay invisible on casual glance
       but enough to kill the flatness of pure-black backgrounds. */
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      var(--scanline) 2px, var(--scanline) 3px
    );
    font-feature-settings: 'ss01', 'cv11';
  }

  /* Uniform chrome label: the building block of the whole interface.
     Reused for panel headers, tool tags, meta rows, anything that
     labels something else. */
  .chrome-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header {
    min-height: calc(44px + env(safe-area-inset-top));
    /* Respect iOS Dynamic Island / notch via env() insets. */
    padding:
      env(safe-area-inset-top) calc(16px + env(safe-area-inset-right))
      0 calc(18px + env(safe-area-inset-left));
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Wordmark: stylised as a broadcast callsign. The leading dot is
     the accent — small touch but it's what makes this feel like a
     station identity rather than a generic app title. */
  header h1 {
    font: inherit;
    font-weight: 700;
    letter-spacing: 2.2px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  header h1::before {
    content: "";
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: live-pulse 2.2s ease-in-out infinite;
  }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .header-stats > * {
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    line-height: 1;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    margin-right: 6px;
    vertical-align: 1px;
    background: var(--text-muted);
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .status-dot.offline { background: var(--text-muted); }

  /* ── Main layout ─────────────────────────────────────────────── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    background: var(--bg);
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    flex-shrink: 0;
    /* Tiny accent tick next to every panel header — signals that
       this is a named "channel" in the broadcast metaphor. */
    position: relative;
  }
  .panel-header::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    width: 3px; height: 11px;
    background: var(--accent);
    transform: translateY(-50%);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* Agent sidebar */
  .sidebar { width: 200px; flex-shrink: 0; }
  .sidebar-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* Agent rows: teletype-style. No rounded pill. Left accent
     tick appears only when online. */
  .agent-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.08s, border-color 0.08s;
  }
  .agent-item:hover {
    background: var(--bg-hover);
    border-left-color: var(--accent-dim);
  }

  .agent-dot {
    width: 5px; height: 5px;
    flex-shrink: 0;
    background: var(--text-muted);
  }
  .agent-dot.online { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
  .agent-dot.offline { background: var(--text-muted); opacity: 0.5; }

  .agent-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Message feed */
  .feed { flex: 1; min-width: 0; }
  .feed .panel-body { padding: 6px 0; }

  .msg-entry {
    padding: 6px 14px;
    margin-bottom: 1px;
    font-size: 13px;
    line-height: 1.5;
    border-left: 2px solid transparent;
  }
  .msg-entry:hover {
    background: var(--bg-hover);
    border-left-color: var(--border);
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 2px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .msg-route { font-weight: 600; }
  .msg-route.direct { color: var(--accent); }
  .msg-route.broadcast { color: var(--gold); }
  .msg-route.team { color: var(--purple); }

  .msg-time {
    color: var(--text-muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  .msg-content {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 80px;
    overflow: hidden;
  }

  /* Teams panel */
  .teams-panel { width: 220px; flex-shrink: 0; }

  .team-item {
    padding: 8px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-dim);
  }

  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 2px 0;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.5px;
    font-weight: 600;
    color: var(--text);
  }
  .team-header:hover { color: var(--accent); }

  .team-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.8px;
  }

  .team-members {
    padding-left: 14px;
    margin-top: 4px;
  }

  .team-member {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 1px 0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Send bar — dashboard's DM composer. Terminal prompt look. ── */
  .send-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .send-bar label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .send-bar input, .send-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    outline: none;
    transition: border-color 0.1s, box-shadow 0.1s;
  }
  .send-bar input::placeholder, .send-bar select::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }
  .send-bar input:focus, .send-bar select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
  }

  #to-field { width: 180px; }
  #msg-field { flex: 1; }

  #send-btn {
    background: var(--accent);
    color: var(--on-accent);
    border: none;
    padding: 7px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.1s, transform 0.05s;
  }
  #send-btn:hover { background: #ff6344; }
  #send-btn:active { transform: translateY(1px); }
  #send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: default; }

  .send-error {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-left: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Dashboard / mirror root wrappers — each behaves like the original body
     flex column so header + main + footer keep their layout. */
  #dashboard-root,
  #mirror-root {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #mirror-root { display: none; }
  body.mirror-mode #dashboard-root { display: none; }
  body.mirror-mode #mirror-root { display: flex; }

  /* ── Mirror header = the 'station bug' strip. ── */
  .mirror-nav-back {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    margin-right: 14px;
    transition: color 0.1s, border-color 0.1s;
  }
  .mirror-nav-back:hover { color: var(--accent); border-color: var(--accent); }

  .mirror-header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 20px;
    height: 48px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    position: relative;
    /* All direct chrome elements share one font-size / line-height so
       the baseline is consistent end-to-end. Per-element overrides
       (the cwd, the LIVE indicator) must opt in. */
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  /* Thin accent rule under the header — gives the 'on-air' feel
     without a gaudy red bar across the top. */
  .mirror-header::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      var(--accent) 0%, var(--accent) 60px,
      transparent 60px, transparent 100%
    );
  }
  .mirror-title {
    font: inherit;
    font-weight: 700;
    letter-spacing: 1.8px;
    color: var(--text);
    white-space: nowrap;
  }
  .mirror-title .sid {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 10px;
    letter-spacing: 1px;
  }
  .mirror-meta {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-left: auto;
    min-width: 0;
    /* Inherit font-family/size/letter-spacing/text-transform from
       .mirror-header, so every meta element sits on the same
       baseline. */
  }
  .mirror-meta > * {
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1;
  }
  .mirror-meta .cwd {
    color: var(--text-dim);
    /* path is not a label — drop the uppercase + wide tracking so it
       stays readable, but keep the same font-size so the baseline
       still agrees with the rest of the row. */
    text-transform: none;
    letter-spacing: 0.2px;
  }

  /* LIVE / OFFLINE / CONNECTING / ERROR indicator. Sizing matches
     the rest of the meta row; state is driven by classes on the
     element itself. */
  #mirror-conn {
    color: var(--text);
    font-weight: 700;
    letter-spacing: 1.8px;
  }
  #mirror-conn::before {
    content: "●";
    display: inline-block;
    margin-right: 7px;
    color: var(--text-muted);
    vertical-align: 0;
  }
  #mirror-conn.is-live::before {
    color: var(--accent);
    animation: live-pulse 2.2s ease-in-out infinite;
  }
  #mirror-conn.is-error { color: var(--accent); }
  #mirror-conn.is-error::before { color: var(--accent); }

  /* On narrow screens the header was overflowing the viewport because
     every item (back link, title, sid, cwd, owner, LIVE, share) was
     crammed into one non-wrapping flex row. Drop the least-essential
     items (cwd, owner name) and shrink the sid to its short tail so
     the remaining title / LIVE / share comfortably fit. */
  @media (max-width: 700px) {
    .mirror-header {
      height: auto;
      min-height: calc(44px + env(safe-area-inset-top));
      /* Respect iOS safe-area insets (Dynamic Island / notch). */
      padding:
        calc(8px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right))
        8px calc(12px + env(safe-area-inset-left));
      gap: 10px;
      flex-wrap: wrap;
    }
    .mirror-nav-back { margin-right: 6px; padding: 3px 7px; }
    .mirror-title { font-size: 10px; letter-spacing: 1.2px; }
    .mirror-title .sid {
      margin-left: 6px;
      max-width: 8ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
      display: inline-block;
    }
    .mirror-meta { gap: 12px; }
    .mirror-meta .cwd,
    .mirror-meta #mirror-owner { display: none; }
  }

  /* ── TRANSCRIPT: the broadcast feed.
     Every event is a row hanging off a 72px left-gutter timeline
     that carries the `[HH:MM:SS]` timestamp and a type tag. The
     visual grammar is 'terminal log', not 'chat bubbles'. ── */
  .mirror-transcript {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }
  /* Vertical tick rail down the left — the 'broadcast timeline'.
     X coordinate matches the tick marks on each event row. */
  .mirror-transcript::before {
    content: "";
    position: absolute;
    left: 104px; top: 0; bottom: 0;
    width: 1px;
    background: var(--border-dim);
    pointer-events: none;
  }

  .m-evt {
    position: relative;
    padding: 8px 24px 8px 128px;
    word-wrap: break-word;
    font-size: 13px;
    line-height: 1.55;
    animation: event-flash 900ms ease-out;
  }
  /* Timestamp lives in the left gutter. Populated by JS via data-ts
     (see renderEvent). Gutter is 98px wide so `HH:MM:SS am` fits on
     one line at 10px IBM Plex Mono. */
  .m-evt::before {
    content: attr(data-ts);
    position: absolute;
    left: 10px; top: 10px;
    width: 88px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.4px;
    color: var(--text-muted);
    text-align: right;
    text-transform: uppercase;
    white-space: nowrap;
  }
  /* Tick mark on the rail, centred on the row's first visual line. */
  .m-evt::after {
    content: "";
    position: absolute;
    left: 101px; top: 15px;
    width: 7px; height: 1px;
    background: var(--border);
  }
  .m-evt pre {
    white-space: pre-wrap;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
  }
  /* The meta row originally held '<label> <timestamp>'. The timestamp
     moves to the left gutter via the ::before, so the meta row gets
     slimmed down to just its label. The text-node timestamp the JS
     inserts is hidden via font-size:0. */
  .m-evt-meta {
    font-size: 0;
    margin-bottom: 4px;
  }
  .m-evt-meta .m-label { font-size: 10px; }

  /* Every event surfaces a short type tag in the top-right of the
     row — 'USER', 'CLAUDE', tool name, etc. — so you can scan a
     200-event stream by type alone. */
  .m-label {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── USER prompts: the 'in' signal. Right-aligned with a thick
     accent right-edge. Red = 'you are pushing from the web'. ── */
  .m-evt-user {
    padding-left: 128px;
    padding-right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .m-evt-user > pre {
    display: block;
    max-width: min(72ch, 100%);
    padding: 10px 14px;
    background: var(--accent-ink);
    border-right: 3px solid var(--accent);
    color: var(--text);
    text-align: left;
  }
  .m-evt-user .m-label { color: var(--accent); }

  /* ── ASSISTANT: the 'out' signal. Editorial layout — no bubble,
     just a thin left rule anchoring the row to the timeline. The
     row does NOT shift right via margin-left (that would break the
     absolute-positioned gutter timestamp); it keeps the same
     padding-left as every other event row, and the rule is drawn at
     x=122 via a background-gradient so content visually indents. ── */
  .m-evt-assistant {
    padding-left: 140px;
    padding-right: 24px;
    background-image: linear-gradient(
      to right,
      transparent 0, transparent 121px,
      var(--border) 121px, var(--border) 122px,
      transparent 122px
    );
  }
  .m-evt-assistant::after { background: var(--accent); width: 9px; }
  .m-evt-assistant .m-label { color: var(--accent); }

  @media (max-width: 700px) {
    /* Narrow screens: the left timeline gutter eats too much width,
       so we collapse it. Each event's timestamp moves to a small
       line above the content, and the vertical rail + tick marks
       are dropped. Assistant messages keep a thin accent left-edge
       as their anchor. */
    .mirror-transcript::before { display: none; }

    .m-evt {
      padding-left: 14px;
      padding-right: 14px;
    }
    .m-evt::before {
      position: static;
      display: block;
      width: auto;
      text-align: left;
      margin-bottom: 3px;
      font-size: 9px;
    }
    .m-evt::after { display: none; }

    .m-evt-user { padding-left: 14px; align-items: stretch; }
    .m-evt-user > pre { max-width: none; }
    .m-evt-user .m-label { text-align: left; }

    .m-evt-assistant {
      padding-left: 12px;
      background-image: none;
      border-left: 2px solid var(--accent);
    }

    .m-evt-notif {
      padding-left: 14px;
    }
  }

  /* ── TOOL CALLS: each one is a rectangular status row. No
     rounded corners, no coloured fill — just a hairline top border
     on the card body and a 2px accent bar when the call is
     pending or errored. ── */
  .m-evt-tool {
    padding-right: 24px;
  }
  .m-evt-tool .m-label { color: var(--gold); }
  .m-evt-tool details { margin-top: 4px; }
  .m-evt-tool summary {
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    user-select: none;
    padding: 3px 0;
  }
  .m-evt-tool summary:hover { color: var(--text); }
  .m-evt-tool .m-tool-result {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-dim);
  }
  .m-evt-tool.is-error {
    background: rgba(255, 77, 46, 0.03);
  }
  .m-evt-tool.is-error::after { background: var(--accent); }

  /* Shared tool-card grammar. Every tool renders the same way:
     `[TAG]  target-string          STATUS` with optional sub-line. */
  .m-tool-headline {
    display: flex; align-items: baseline; gap: 12px;
    font-size: 13px; color: var(--text); line-height: 1.4;
  }
  .m-tool-headline .m-tool-name {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--gold);
    flex-shrink: 0;
    min-width: 70px;
  }
  .m-tool-headline .m-tool-target {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .m-tool-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .m-tool-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    margin-left: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .m-tool-badge.pending { background: rgba(224,175,104,0.20); color: var(--yellow); }
  .m-tool-badge.ok { background: rgba(158,206,106,0.15); color: var(--green); }
  .m-tool-badge.error { background: rgba(247,118,142,0.18); color: var(--red); }
  .m-tool-badge.pending { border-color: var(--gold); color: var(--gold); }
  .m-tool-badge.ok { border-color: var(--accent); color: var(--accent); }
  .m-tool-badge.error { border-color: var(--accent); color: var(--accent); background: var(--accent-ink); }
  .m-tool-badge.nosupport { border-color: var(--border); color: var(--text-muted); }

  /* ── BASH — terminal prompt metaphor. The command is rendered with
     a leading `$ ` glyph; output lives in a black console block. ── */
  .m-bash-cmd {
    font-family: var(--font-mono);
    font-size: 12.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .m-bash-cmd::before {
    content: "$ ";
    color: var(--accent);
    font-weight: 600;
  }
  .m-bash-cmd-full {
    font-family: var(--font-mono);
    font-size: 12px; white-space: pre-wrap; color: var(--text);
  }
  .m-bash-out {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; white-space: pre-wrap;
    color: var(--text); margin: 6px 0 0;
    padding: 8px 10px;
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
    max-height: 320px; overflow: auto;
  }
  .m-bash-err {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; white-space: pre-wrap;
    color: var(--accent); margin: 6px 0 0;
    padding: 8px 10px;
    background: rgba(255, 77, 46, 0.05);
    border: 1px solid var(--accent-dim);
    max-height: 200px; overflow: auto;
  }
  .m-bash-label {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1.4px;
    margin-top: 8px;
  }

  /* ── READ — line-numbered diff-style view. ── */
  .m-read-body { max-height: 480px; overflow: auto; }
  .m-read-ln {
    width: 48px !important;
    text-align: right !important;
    padding-right: 6px;
    color: var(--text-muted);
    font-weight: 400 !important;
  }
  .m-diff-read .m-diff-content { color: var(--text); }
  .m-read-more .m-diff-content { color: var(--text-muted); font-style: italic; }

  /* ── CLAUDE-NET MCP lists (list_agents / list_teams / ToolSearch). ── */
  .m-cn-list {
    list-style: none; margin: 4px 0 0; padding: 0;
    font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
  }
  .m-cn-list li {
    padding: 1px 0;
    word-break: break-word;
  }
  .m-cn-dot { font-size: 10px; }
  .m-cn-dot-online { color: var(--green); }
  .m-cn-dot-offline { color: var(--text-muted); }
  .m-cn-muted { color: var(--text-muted); font-size: 11px; }

  /* ── WEB (Search / Fetch) ── */
  .m-web-query {
    font-family: var(--font-mono); color: var(--cyan);
  }
  .m-web-target-link {
    font-family: var(--font-mono); color: var(--cyan);
    text-decoration: none; word-break: break-all;
  }
  .m-web-target-link:hover { text-decoration: underline; }
  .m-web-results {
    list-style: none; margin: 4px 0 0; padding: 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .m-web-result {
    padding: 6px 8px;
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
  }
  .m-web-title {
    font-size: 13px; font-weight: 600; color: var(--cyan);
    text-decoration: none; display: block;
    word-break: break-word;
  }
  .m-web-title:hover { text-decoration: underline; }
  .m-web-host {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  .m-web-snippet {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    line-height: 1.45;
  }
  .m-web-summary {
    padding: 6px 10px;
    background: var(--bg-code); border: 1px solid var(--border-dim);
    max-height: 360px; overflow: auto;
  }

  /* ── GREP — ripgrep teletype output. ── */
  .m-grep {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; margin-top: 6px;
    max-height: 420px; overflow: auto;
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
    padding: 8px 10px;
  }
  .m-grep-file {
    color: var(--gold); margin-top: 10px; padding: 2px 0;
    font-weight: 600; word-break: break-all;
    letter-spacing: 0.2px;
  }
  .m-grep-file:first-child { margin-top: 0; }
  .m-grep-row {
    display: flex; gap: 12px; align-items: baseline;
    padding: 1px 0;
  }
  .m-grep-ln {
    color: var(--text-muted); text-align: right;
    min-width: 5ch; user-select: none; flex-shrink: 0;
  }
  .m-grep-text {
    white-space: pre-wrap; word-break: break-word;
    color: var(--text); background: none; padding: 0;
  }
  .m-grep-more { color: var(--text-muted); margin-top: 6px; font-style: italic; }

  /* TodoWrite list — styles live in the later block with .m-checkbox */

  /* ── DIFFS — Edit/Write/MultiEdit. High-contrast monospace, no
     rounding, the 'delta' badges are the only colour. ── */
  .m-diff-v2 {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55;
    background: var(--bg-code); border: 1px solid var(--border-dim);
    padding: 6px 0; margin: 6px 0 0;
    overflow-x: auto;
  }
  .m-diff-line { display: flex; align-items: flex-start; padding: 0 8px; }
  .m-diff-gutter {
    display: inline-block; width: 18px; flex-shrink: 0;
    text-align: center; user-select: none; color: var(--text-muted);
    font-weight: 700;
  }
  .m-diff-content { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .m-diff-del { background: rgba(255, 77, 46, 0.06); }
  .m-diff-del .m-diff-gutter { color: var(--accent); }
  .m-diff-del .m-diff-content { color: var(--accent); }
  .m-diff-add { background: rgba(85, 194, 122, 0.05); }
  .m-diff-add .m-diff-gutter { color: var(--green); }
  .m-diff-add .m-diff-content { color: var(--green); }
  .m-diff-ctx .m-diff-content { color: var(--text-muted); }
  .m-diff-word-del {
    background: rgba(255, 77, 46, 0.35);
    color: var(--text);
  }
  .m-diff-word-add {
    background: rgba(85, 194, 122, 0.30);
    color: var(--text);
  }
  .m-multiedit-hunk { margin-bottom: 10px; }
  .m-multiedit-hunk:last-child { margin-bottom: 0; }
  .m-multiedit-hunk-label {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin: 4px 8px 4px;
  }

  /* ── QUESTION cards — "INCOMING QUERY" framing. ── */
  .m-evt-question {
    padding-right: 24px;
  }
  .m-evt-question > * {
    max-width: 72ch;
    margin-left: 0;
  }
  .m-evt-question .m-q-body-wrap {
    border: 1px solid var(--gold);
    background: rgba(212, 160, 77, 0.04);
    padding: 12px 14px;
    margin-top: 4px;
  }
  .m-evt-question.answered .m-q-body-wrap {
    border-color: var(--border);
    background: var(--bg-panel);
  }
  .m-q-banner {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700;
    color: var(--gold);
    text-transform: uppercase; letter-spacing: 1.4px;
    padding: 3px 8px;
    border: 1px solid var(--gold);
  }
  .m-evt-question.answered .m-q-banner { color: var(--text-muted); border-color: var(--border); }
  .m-q-body { margin-top: 10px; font-size: 13px; line-height: 1.55; }
  .m-q-body h1, .m-q-body h2, .m-q-body h3 {
    font-weight: 600; color: var(--text); margin-top: 10px; margin-bottom: 4px;
  }
  .m-q-body h1 { font-size: 15px; }
  .m-q-body h2 { font-size: 14px; }
  .m-q-body h3 { font-size: 13px; color: var(--text-dim); }
  .m-q-body ul, .m-q-body ol { margin-left: 22px; margin-top: 4px; margin-bottom: 4px; }
  .m-q-body li { margin: 2px 0; }
  .m-q-body code {
    background: var(--bg); padding: 1px 4px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--accent);
  }
  .m-q-body pre {
    background: var(--bg); padding: 8px 10px; margin: 6px 0;
    border-left: 2px solid var(--accent); overflow-x: auto;
  }
  .m-q-body strong { font-weight: 600; color: var(--text); }
  .m-q-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .m-q-action {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.8px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.1s, color 0.1s, background 0.1s;
  }
  .m-q-action:hover { border-color: var(--accent); color: var(--accent); }
  .m-q-action.primary {
    background: var(--accent-ink);
    border-color: var(--accent);
    color: var(--accent);
  }
  .m-q-action.primary:hover { background: var(--accent); color: var(--on-accent); }
  .m-q-action .m-q-action-desc {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: normal;
    letter-spacing: 0;
    text-transform: none;
    font-family: var(--font-sans);
  }
  .m-q-answer {
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  /* ── System events — telegraphic lines aligned to the timeline. ── */
  .m-evt-notif {
    padding: 4px 24px 4px 128px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .m-evt-notif::after { background: var(--text-muted); }
  .m-evt-compact {
    text-align: center;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    padding: 10px 24px;
    margin: 8px 24px;
    border-top: 1px dashed var(--border);
    border-bottom: 1px dashed var(--border);
  }
  .m-evt-compact::before, .m-evt-compact::after { display: none; }
  .m-evt-end {
    text-align: center;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 24px;
  }
  .m-evt-end::before, .m-evt-end::after { display: none; }
  .m-truncated {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-left: 8px;
    padding: 1px 5px;
    border: 1px solid var(--gold);
  }

  /* ── COMPOSE — a single unified terminal prompt. The textarea,
     the `>` glyph and the Send button share one bordered frame so
     it reads as ONE instrument, not 'input + button'. Focus the
     textarea and the whole frame lights up. ── */
  .mirror-compose {
    display: flex;
    align-items: stretch;
    /* Respect iOS home-indicator / left & right safe-area insets. */
    padding:
      14px calc(20px + env(safe-area-inset-right))
      calc(14px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    position: relative;
  }
  .mirror-compose.compose-hidden { display: none; }

  /* Inner 'frame' the textarea + button both live inside. */
  .mirror-compose-frame {
    display: flex;
    align-items: stretch;
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: border-color 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .mirror-compose-frame:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 18px var(--accent-glow);
  }

  /* Left-rail prompt: small accent tick + `>` glyph, integrated into
     the frame's left edge rather than floating in the bar. */
  .mirror-compose-frame::before {
    content: ">";
    display: flex;
    align-items: flex-start;
    justify-content: center;
    width: 34px;
    padding-top: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    border-right: 1px solid var(--border);
    user-select: none;
    flex-shrink: 0;
  }
  .mirror-compose-frame:focus-within::before {
    background: var(--accent-ink);
  }

  .mirror-compose textarea {
    flex: 1;
    min-height: 46px;
    max-height: 180px;
    resize: vertical;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    padding: 11px 14px;
  }
  .mirror-compose textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.2px;
  }
  .mirror-compose textarea:focus {
    outline: none;
    box-shadow: none;
  }

  /* Trailing cluster: keyboard hint + Send button, stacked so the
     hint reads 'Enter to send · Shift+Enter for newline' without
     bloating the button text itself. */
  .mirror-compose-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 12px 0 10px;
    border-left: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mirror-compose-hint {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1.3;
    text-align: right;
    white-space: nowrap;
  }
  .mirror-compose-hint kbd {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    padding: 1px 5px;
    border: 1px solid var(--border);
    margin: 0 2px;
    background: var(--bg-panel);
  }
  @media (max-width: 700px) {
    /* On narrow screens: suppress the 'send/newline' hint lines (they
       take too much room next to the button) — the mode toggle button
       is enough of a signal. */
    .mirror-compose-hint { display: none; }
  }

  /* On touch-primary devices (phones, tablets without a hardware
     keyboard) the Send button disappears entirely and the textarea
     frame spans the full bar. Submit happens via a double-Enter
     (two presses within 500 ms); single Enter inserts a newline. */
  .mirror-compose.is-touch .mirror-compose-actions { display: none; }
  .mirror-compose.is-touch .mirror-compose-frame { flex: 1; }
  .mirror-compose.is-touch .mirror-compose-frame::before {
    /* Prompt rail stays but shrinks a little to reclaim tap-space. */
    width: 28px;
    padding-top: 11px;
    font-size: 13px;
  }
  /* iOS Safari auto-zooms the viewport whenever a focused input's
     font-size is under 16 px. Bump the textarea to 16 px on touch
     devices specifically — desktop keeps 13 px for density. */
  .mirror-compose.is-touch textarea { font-size: 16px; }

  /* ── Slash-command autocomplete popover ─────────────────────────
     Floats above the compose textarea whenever the current
     first-line starts with '/'. Keyboard (arrows + tab/enter) on
     desktop; tap-to-select on touch devices. Respects the overall
     broadcast aesthetic: sharp corners, mono, accent-on-select. */
  .mirror-slash-popover {
    position: absolute;
    left: 20px;
    right: 20px;
    bottom: calc(100% + 6px);
    max-height: 260px;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--accent);
    box-shadow: 0 0 24px var(--accent-glow);
    z-index: 20;
    display: none;
  }
  .mirror-slash-popover.is-open { display: block; }
  .mirror-slash-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.06s, border-color 0.06s;
  }
  .mirror-slash-item:hover,
  .mirror-slash-item.is-active {
    background: var(--accent-ink);
    border-left-color: var(--accent);
  }
  .mirror-slash-name {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .mirror-slash-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mirror-slash-source {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
    padding: 1px 6px;
    border: 1px solid var(--border);
  }
  .mirror-slash-empty {
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    font-style: italic;
  }
  @media (max-width: 700px) {
    /* Bigger tap targets + more room on mobile. */
    .mirror-slash-popover { left: 10px; right: 10px; max-height: 50vh; }
    .mirror-slash-item { padding: 12px 14px; }
    .mirror-slash-name { font-size: 13px; }
    .mirror-slash-desc { font-size: 12.5px; }
    .mirror-slash-source { display: none; }
  }

  .mirror-compose button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0 16px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 88px;
    height: 34px;
    align-self: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.1s, color 0.1s;
  }
  .mirror-compose button::before {
    content: "↵";
    font-size: 13px;
    font-weight: 400;
    line-height: 1;
  }

      if (t === 'light') document.body.classList.add('theme-light');

  })();
</script>

<script>
(function() {
  'use strict';

  // --- Theme toggle (wires every [data-theme-toggle] on the page).
  // The initial class is applied by the inline script in <body>, so
  // this just handles clicks + label sync. ---
  var THEME_KEY = 'claude-net.mirror.theme';
  function syncThemeLabel() {
    var light = document.body.classList.contains('theme-light');
    var label = light ? '◑ LIGHT' : '◐ DARK';
    var btns = document.querySelectorAll('[data-theme-toggle]');
    for (var i = 0; i < btns.length; i++) btns[i].textContent = label;
  }
  function toggleTheme() {
    var light = document.body.classList.toggle('theme-light');
    try { localStorage.setItem(THEME_KEY, light ? 'light' : 'dark'); } catch (e) {}
    syncThemeLabel();
  }
  document.addEventListener('click', function(e) {
    if (e.target.closest && e.target.closest('[data-theme-toggle]')) toggleTheme();
  });
  syncThemeLabel();

  // --- Router: dashboard (default) vs mirror view (/mirror/:sid) ---
  var mirrorMatch = location.pathname.match(/^\/mirror\/([^/]+)\/?$/);
  if (mirrorMatch) {
    document.body.classList.add('mirror-mode');
    startMirror(decodeURIComponent(mirrorMatch[1]));
    return;
  }

  // --- Dashboard state ---
  const agents = new Map(); // fullName -> { name, fullName, status }
  const teams = new Map();  // teamName -> { members: string[] }
  const messages = [];       // { from, to, type, content, team?, timestamp, routeType }
  const MAX_MESSAGES = 200;
  const RECONNECT_INTERVAL = 3000;

  // --- DOM refs ---
  const agentListEl = document.getElementById('agent-list');
  const msgFeedEl = document.getElementById('msg-feed');
  const teamListEl = document.getElementById('team-list');
  const agentCountEl = document.getElementById('agent-count');
  const teamCountEl = document.getElementById('team-count');
  const connDot = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const toField = document.getElementById('to-field');
  const msgField = document.getElementById('msg-field');
  const sendBtn = document.getElementById('send-btn');
  const sendError = document.getElementById('send-error');
  const toSuggestions = document.getElementById('to-suggestions');
  const mirrorListEl = document.getElementById('mirror-session-list');

  // Active mirror sessions (full entries with owner_token for click-through).
  const mirrorSessions = new Map(); // sid -> entry

  // --- WebSocket ---
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/dashboard');

    ws.onopen = function() {
      setConnected(true);
      if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
      refreshMirrorSessions();
    };

    ws.onmessage = function(e) {
      var event;
      try { event = JSON.parse(e.data); } catch { return; }
      handleEvent(event);
    };

    ws.onclose = function() {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = function() {
      // onclose will fire after this
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        connect();
      }
    }, RECONNECT_INTERVAL);
  }

  function setConnected(connected) {
    connDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
    connLabel.textContent = connected ? 'connected' : 'disconnected';
  }

  // --- Event handling ---
  function handleEvent(event) {
    switch (event.event) {
      case 'agent:connected':
        agents.set(event.full_name, {
          name: event.name,
          fullName: event.full_name,
          status: 'online'
        });
        renderAgents();
        updateSuggestions();
        break;

      case 'agent:disconnected':
        agents.delete(event.full_name);
        renderAgents();
        updateSuggestions();
        break;

      case 'message:routed':
        addMessage(event);
        break;

      case 'dashboard:message':
        addMessage(event);
        break;

      case 'team:changed':
        if (event.action === 'deleted') {
          teams.delete(event.team);
        } else {
          teams.set(event.team, { members: event.members || [] });
        }
        renderTeams();
        updateSuggestions();
        break;

      case 'mirror:session_started':
        // Partial info from the event; fetch full session (with token + URL).
        refreshMirrorSessions();
        break;

      case 'mirror:session_ended':
        mirrorSessions.delete(event.sid);
        renderMirrorSessions();
        break;

      case 'mirror:watcher_joined':
      case 'mirror:watcher_left': {
        const entry = mirrorSessions.get(event.sid);
        if (entry) {
          entry.watcher_count = (entry.watcher_count || 0) +
            (event.event === 'mirror:watcher_joined' ? 1 : -1);
          if (entry.watcher_count < 0) entry.watcher_count = 0;
          renderMirrorSessions();
        }
        break;
      }

      case 'mirror:event': {
        const entry = mirrorSessions.get(event.sid);
        if (entry) {
          entry.last_event_at = new Date(event.ts || Date.now()).toISOString();
          entry.transcript_len = (entry.transcript_len || 0) + 1;
          renderMirrorSessions();
        }
        break;
      }
    }

    updateCounts();
  }

  // --- Mirror sessions (dashboard panel) ---
  function refreshMirrorSessions() {
    fetch('/api/mirror/sessions/all')
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(list) {
        mirrorSessions.clear();
        if (Array.isArray(list)) {
          for (var i = 0; i < list.length; i++) {
            mirrorSessions.set(list[i].sid, list[i]);
          }
        }
        renderMirrorSessions();
      })
      .catch(function() { /* ignore */ });
  }

  function renderMirrorSessions() {
    if (!mirrorListEl) return;
    // Sort by last_event_at (most recent first). Rows will reorder as
    // events arrive, but that's desirable — the active session floats
    // to the top. Tiebreak by sid for stable ordering of quiet sessions.
    var entries = Array.from(mirrorSessions.values())
      .sort(function(a, b) {
        var ae = a.last_event_at || '', be = b.last_event_at || '';
        if (ae !== be) return be.localeCompare(ae);
        return (a.sid || '').localeCompare(b.sid || '');
      });
    if (entries.length === 0) {
      mirrorListEl.innerHTML = '<div class="mirror-list-empty">no active mirrors</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var age = relativeTime(e.last_event_at);
      var watchers = (e.watcher_count || 0) > 0
        ? '<span class="mli-watchers">' + e.watcher_count + ' watching</span>'
        : '';
      // Short sid suffix so fork-sessions in the same folder are
      // visibly distinct in the sidebar without needing name-sync
      // between plugin and mirror-agent.
      var sidTail = e.sid ? String(e.sid).slice(-6) : '';
      // Build a RELATIVE link so the mirror view opens on the same
      // domain the user is currently browsing from (cn.tynan.io,
      // london:4815, tailscale hostname, whatever). The absolute
      // mirror_url on the summary is kept for the plugin / share flow
      // which needs to embed the canonical URL in shareable text.
      var href = '/mirror/' + encodeURIComponent(e.sid) +
        '#token=' + encodeURIComponent(e.owner_token || '');
      html +=
        '<a class="mirror-list-item" href="' + escapeAttr(href) + '">' +
          '<div class="mli-owner">' +
            escapeHtml(e.owner_agent) +
            (sidTail ? ' <span class="mli-sid">· ' + escapeHtml(sidTail) + '</span>' : '') +
          '</div>' +
          '<div class="mli-cwd">' + escapeHtml(e.cwd || '') + '</div>' +
          '<div class="mli-meta">' +
            '<span>' + (e.transcript_len || 0) + ' events</span>' +
            '<span>' + age + '</span>' +
            watchers +
          '</div>' +
        '</a>';
    }
    mirrorListEl.innerHTML = html;
  }

  function relativeTime(iso) {
    if (!iso) return '';
    var t = new Date(iso).getTime();
    if (!isFinite(t)) return '';
    var dt = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (dt < 10) return 'just now';
    if (dt < 60) return dt + 's ago';
    if (dt < 3600) return Math.floor(dt / 60) + 'm ago';
    if (dt < 86400) return Math.floor(dt / 3600) + 'h ago';
    return Math.floor(dt / 86400) + 'd ago';
  }

  // --- Render agents ---
  function renderAgents() {
    var sorted = Array.from(agents.values()).sort(function(a, b) {
      if (a.status !== b.status) return a.status === 'online' ? -1 : 1;
      return a.fullName.localeCompare(b.fullName);
    });

    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var ag = sorted[i];
      html += '<div class="agent-item" data-name="' + escapeAttr(ag.fullName) + '">'
        + '<span class="agent-dot ' + ag.status + '"></span>'
        + '<span class="agent-name">' + escapeHtml(ag.fullName) + '</span>'
        + '</div>';
    }
    agentListEl.innerHTML = html;

    // Bind click handlers
    var items = agentListEl.querySelectorAll('.agent-item');
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener('click', function() {
        toField.value = this.getAttribute('data-name');
        msgField.focus();
      });
    }
  }

  // --- Render messages ---
  function addMessage(event) {
    var routeType = 'direct';
    var toLabel = event.to;
    if (event.to === 'broadcast') {
      routeType = 'broadcast';
      toLabel = 'broadcast';
    } else if (event.team) {
      routeType = 'team';
      toLabel = 'team:' + event.team;
    }

    messages.push({
      from: event.from,
      to: toLabel,
      type: event.type,
      content: event.content,
      timestamp: event.timestamp,
      routeType: routeType
    });

    while (messages.length > MAX_MESSAGES) {
      messages.shift();
    }

    renderLastMessage();
  }

  function renderLastMessage() {
    var msg = messages[messages.length - 1];
    if (!msg) return;

    var el = document.createElement('div');
    el.className = 'msg-entry';
    el.innerHTML =
      '<div class="msg-meta">'
        + '<span class="msg-route ' + msg.routeType + '">'
          + escapeHtml(msg.from) + ' &rarr; ' + escapeHtml(msg.to)
        + '</span>'
        + '<span class="msg-time">' + formatTime(msg.timestamp) + '</span>'
      + '</div>'
      + '<div class="msg-content">' + escapeHtml(msg.content) + '</div>';

    msgFeedEl.appendChild(el);

    // Remove excess DOM nodes
    while (msgFeedEl.children.length > MAX_MESSAGES) {
      msgFeedEl.removeChild(msgFeedEl.firstChild);
    }

    // Auto-scroll
    msgFeedEl.scrollTop = msgFeedEl.scrollHeight;
  }

  // --- Render teams ---
  function renderTeams() {
    var html = '';
    var teamNames = Array.from(teams.keys()).sort();
    for (var i = 0; i < teamNames.length; i++) {
      var tName = teamNames[i];
      var team = teams.get(tName);
      var members = team.members || [];

      html += '<div class="team-item">'
        + '<div class="team-header" data-team="' + escapeAttr(tName) + '">'
          + '<span>' + escapeHtml(tName) + '</span>'
          + '<span class="team-count">' + members.length + '</span>'
        + '</div>'
        + '<div class="team-members">';

      for (var j = 0; j < members.length; j++) {
        var memberName = members[j];
        var ag = agents.get(memberName);
        var status = ag ? ag.status : 'offline';
        html += '<div class="team-member">'
          + '<span class="agent-dot ' + status + '"></span>'
          + '<span>' + escapeHtml(memberName) + '</span>'
          + '</div>';
      }

      html += '</div></div>';
    }
    teamListEl.innerHTML = html;
  }

  // --- Update counts ---
  function updateCounts() {
    var onlineCount = 0;
    agents.forEach(function(ag) { if (ag.status === 'online') onlineCount++; });
    agentCountEl.textContent = onlineCount + ' agent' + (onlineCount !== 1 ? 's' : '');
    teamCountEl.textContent = teams.size + ' team' + (teams.size !== 1 ? 's' : '');
  }

  // --- Update to-field suggestions ---
  function updateSuggestions() {
    var html = '<option value="broadcast">';
    agents.forEach(function(ag) {
      html += '<option value="' + escapeAttr(ag.fullName) + '">';
    });
    teams.forEach(function(_, tName) {
      html += '<option value="team:' + escapeAttr(tName) + '">';
    });
    toSuggestions.innerHTML = html;
  }

  // --- Send message ---
  function doSend() {
    var to = toField.value.trim();
    var content = msgField.value.trim();
    sendError.textContent = '';

    if (!to || !content) return;
    sendBtn.disabled = true;

    var url, body;
    if (to === 'broadcast') {
      url = '/api/broadcast';
      body = { from: 'dashboard', content: content };
    } else if (to.startsWith('team:')) {
      url = '/api/send_team';
      body = { from: 'dashboard', team: to.slice(5), content: content };
    } else {
      url = '/api/send';
      body = { from: 'dashboard', to: to, content: content };
    }

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      sendBtn.disabled = false;
      if (data.error) {
        sendError.textContent = data.error;
      } else {
        msgField.value = '';
      }
    })
    .catch(function(err) {
      sendBtn.disabled = false;
      sendError.textContent = 'Send failed: ' + err.message;
    });
  }

  sendBtn.addEventListener('click', doSend);
  msgField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });

  // --- Helpers ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      // Respect the user's locale (12-hour with am/pm or 24-hour,
      // whichever the browser prefers). The gutter is sized to fit
      // either.
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  // --- Init ---
  connect();
  updateCounts();

  // ── Mirror view (scoped within the outer IIFE so helpers are in scope) ─
  function startMirror(sid) {
    var token = '';
    var hash = location.hash || '';
    var m = hash.match(/(?:^#|&)token=([^&]+)/);
    if (m) token = decodeURIComponent(m[1]);

    var sidEl = document.getElementById('mirror-sid');
    var cwdEl = document.getElementById('mirror-cwd');
    var ownerEl = document.getElementById('mirror-owner');
    var connEl = document.getElementById('mirror-conn');
    var statusEl = document.getElementById('mirror-status');
    var transcriptEl = document.getElementById('mirror-transcript');

    sidEl.textContent = sid;
    // Broadcast-style states: CONNECTING / LIVE / OFFLINE / ERROR.
    // The is-live / is-error classes drive the pulsing red dot CSS.
    function setConnState(state) {
      connEl.classList.remove('is-live', 'is-error');
      if (state === 'live') { connEl.textContent = 'LIVE'; connEl.classList.add('is-live'); }
      else if (state === 'offline') { connEl.textContent = 'OFFLINE'; }
      else if (state === 'connecting') { connEl.textContent = 'CONNECTING'; }
      else if (state === 'error') { connEl.textContent = 'ERROR'; connEl.classList.add('is-error'); }
      else if (state === 'unauth') { connEl.textContent = 'UNAUTHENTICATED'; connEl.classList.add('is-error'); }
    }
    setConnState('connecting');

    if (!token) {
      statusEl.className = 'mirror-status error';
      statusEl.textContent = 'Missing token in URL fragment. Paste the full mirror URL (including #token=...).';
      setConnState('unauth');
      return;
    }

    var rendered = Object.create(null); // uuid → true
    var userScrolledUp = false;
    var SCROLL_LOCK_THRESHOLD = 80;

    // ── Task* tool state (tracks Claude Code's harness task list) ────
    // Mirrors the state that TaskListV2 in the real CLI tracks: id →
    // {subject, activeForm, description, status}. Populated from
    // TaskCreate/TaskUpdate/TaskList/TaskGet payloads; used so that
    // TaskUpdate cards can show the task's subject (which lives only on
    // the TaskCreate call) instead of just the id.
    var taskState = new Map();
    var pendingTaskCreates = new Map(); // tool_use_id → {subject, ...}

    transcriptEl.addEventListener('scroll', function() {
      var distance = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
      userScrolledUp = distance > SCROLL_LOCK_THRESHOLD;
    });

    function scrollToBottom() {
      if (userScrolledUp) return;
      requestAnimationFrame(function() {
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      });
    }

    // ── Tool renderers ───────────────────────────────────────────────
    // Each entry has { call(payload, el), result(payload, el), label? }.
    // `call` is invoked when the tool_call arrives; `result` when the
    // matching tool_result arrives on the same card. Fallbacks cover
    // tools we don't have a custom renderer for yet.

    function toolLabelFromName(name) {
      if (!name) return '';
      // Parse MCP tool names: mcp__<server>__<tool> → "<server>: <tool>"
      var m = name.match(/^mcp__([^_]+)__(.+)$/);
      if (m) return m[1] + ': ' + m[2];
      return name;
    }

    function shortPath(p) {
      if (!p) return '';
      var parts = p.split('/');
      if (parts.length <= 2) return p;
      return '…/' + parts.slice(-2).join('/');
    }

    function makeHeadline(toolName, target, sub) {
      var html =
        '<div class="m-tool-headline">' +
          '<span class="m-tool-name">' + escapeHtml(toolLabelFromName(toolName)) + '</span>' +
          '<span class="m-tool-target">' + (target || '') + '</span>' +
          '<span class="m-tool-badge pending" data-role="status">pending</span>' +
        '</div>';
      if (sub) html += '<div class="m-tool-sub">' + sub + '</div>';
      return html;
    }

    function setStatusOk(el, text) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge ok'; badge.textContent = text || 'done'; }
    }
    function setStatusError(el) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge error'; badge.textContent = 'error'; }
      el.classList.add('is-error');
    }

    function appendDetails(el, summary, body, opts) {
      var open = opts && opts.open ? ' open' : '';
      var d = document.createElement('details');
      d.innerHTML = '<summary>' + escapeHtml(summary) + '</summary>' + body;
      if (open) d.setAttribute('open', '');
      el.appendChild(d);
      return d;
    }

    function truncateLines(text, maxLines) {
      if (!text) return '';
      var lines = String(text).split('\n');
      if (lines.length <= maxLines) return text;
      return lines.slice(0, maxLines).join('\n') +
        '\n… (' + (lines.length - maxLines) + ' more lines)';
    }

    // ── Task* helpers ───────────────────────────────────────────────

    var TASK_STATUS_GLYPHS = {
      pending: '◻',
      in_progress: '◼',
      completed: '✔',
      deleted: '×',
    };

    function taskUpsert(id, partial) {
      if (!id) return null;
      var key = String(id);
      var cur = taskState.get(key) || {};
      var merged = Object.assign({}, cur, partial);
      taskState.set(key, merged);
      return merged;
    }

    function taskSummaryLine() {
      var total = 0, pending = 0, inProg = 0, done = 0;
      taskState.forEach(function(t) {
        if (t.status === 'deleted') return;
        total++;
        if (t.status === 'completed') done++;
        else if (t.status === 'in_progress') inProg++;
        else pending++;
      });
      if (total === 0) return '';
      var parts = [done + ' done'];
      if (inProg > 0) parts.push(inProg + ' in progress');
      parts.push(pending + ' open');
      return total + ' task' + (total === 1 ? '' : 's') +
        ' (' + parts.join(', ') + ')';
    }

    function renderTaskLine(id, task) {
      if (!task) return '';
      var status = task.status || 'pending';
      var glyph = TASK_STATUS_GLYPHS[status] || TASK_STATUS_GLYPHS.pending;
      var title = task.subject || ('Task ' + id);
      var activity = status === 'in_progress' && task.activeForm
        ? task.activeForm
        : null;
      var html =
        '<div class="m-task-line m-task-' + escapeAttr(status) + '">' +
          '<span class="m-task-glyph">' + glyph + '</span>' +
          '<span class="m-task-subject">' + escapeHtml(title) + '</span>' +
        '</div>';
      if (activity) {
        html += '<div class="m-task-activity">' + escapeHtml(activity) + '…</div>';
      }
      return html;
    }

    function renderTaskListBlock(ids) {
      // Render given ids (or all tracked tasks if ids is null) as a checkbox
      // list. Sorted by id numerically when possible.
      var keys = ids || [...taskState.keys()];
      keys.sort(function(a, b) {
        var na = Number(a), nb = Number(b);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a).localeCompare(String(b));
      });
      var out = '';
      for (var i = 0; i < keys.length; i++) {
        var t = taskState.get(keys[i]);
        if (t && t.status !== 'deleted') out += renderTaskLine(keys[i], t);
      }
      return out;
    }

    /** Best-effort parse of a TaskList tool_response into task records. */
    function parseTaskListResponse(resp) {
      if (!resp) return null;
      if (typeof resp === 'object' && !Array.isArray(resp)) {
        if (Array.isArray(resp.tasks)) return resp.tasks;
        if (resp.id && resp.subject) return [resp];
      }
      if (Array.isArray(resp)) return resp;
      if (typeof resp === 'string') {
        // Try JSON first
        var trimmed = resp.trim();
        if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
          try {
            var parsed = JSON.parse(trimmed);
            return parseTaskListResponse(parsed);
          } catch (e) { /* fall through */ }
        }
      }
      return null;
    }

    /** Best-effort parse of a TaskCreate tool_response for the new taskId. */
    function parseCreatedTaskId(resp) {
      if (!resp) return null;
      if (typeof resp === 'object' && resp !== null) {
        return resp.taskId || resp.id || null;
      }
      var s = String(resp);
      var m = s.match(/[Tt]ask\s*#?(\d+)/);
      if (m) return m[1];
      return null;
    }

    // ── Rich diff renderer (Edit / Write / MultiEdit) ──────────────
    //
    // Uses `jsdiff` (loaded via /bin/diff.min.js) to compute a line-level
    // unified diff; within each (removed, added) pair of equal length,
    // runs a word-level diff so the precise delta highlights inside the
    // line instead of the whole line turning red/green. Falls back to a
    // naive two-block render if jsdiff didn't load for some reason.

    function splitDiffLines(s) {
      var lines = String(s).split('\n');
      if (lines.length > 0 && lines[lines.length - 1] === '') lines.pop();
      return lines;
    }

    function renderDiffLine(type, innerHtml) {
      var prefix = type === 'del' ? '−' : type === 'add' ? '+' : ' ';
      return '<div class="m-diff-line m-diff-' + type + '">' +
        '<span class="m-diff-gutter">' + prefix + '</span>' +
        '<span class="m-diff-content">' + (innerHtml || '&nbsp;') + '</span>' +
        '</div>';
    }

    function wordDiffLine(oldLine, newLine) {
      if (!window.Diff || typeof window.Diff.diffWordsWithSpace !== 'function') {
        return {
          oldHtml: escapeHtml(oldLine),
          newHtml: escapeHtml(newLine),
        };
      }
      var parts = window.Diff.diffWordsWithSpace(oldLine, newLine);
      var oldHtml = '', newHtml = '';
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        var safe = escapeHtml(p.value);
        if (p.added) {
          newHtml += '<span class="m-diff-word-add">' + safe + '</span>';
        } else if (p.removed) {
          oldHtml += '<span class="m-diff-word-del">' + safe + '</span>';
        } else {
          oldHtml += safe;
          newHtml += safe;
        }
      }
      return { oldHtml: oldHtml, newHtml: newHtml };
    }

    function renderRichDiff(oldStr, newStr) {
      oldStr = String(oldStr || '');
      newStr = String(newStr || '');
      var added = 0, removed = 0;
      var out = '';

      if (!window.Diff || typeof window.Diff.diffLines !== 'function') {
        // Fallback: naive two-block render (old path). Keeps rendering
        // correct when the lib didn't load.
        var oldLines = splitDiffLines(oldStr);
        var newLines = splitDiffLines(newStr);
        for (var i = 0; i < oldLines.length; i++)
          out += renderDiffLine('del', escapeHtml(oldLines[i]));
        for (var j = 0; j < newLines.length; j++)
          out += renderDiffLine('add', escapeHtml(newLines[j]));
        return {
          html: out,
          added: newLines.length,
          removed: oldLines.length,
        };
      }

      var parts = window.Diff.diffLines(oldStr, newStr);
      for (var k = 0; k < parts.length; k++) {
        var cur = parts[k];
        var next = parts[k + 1];
        if (cur.removed && next && next.added) {
          // Paired removal + addition. Word-diff per line when counts match;
          // otherwise just render each side as raw lines.
          var olds = splitDiffLines(cur.value);
          var news = splitDiffLines(next.value);
          if (olds.length === news.length) {
            for (var m = 0; m < olds.length; m++) {
              var pair = wordDiffLine(olds[m], news[m]);
              out += renderDiffLine('del', pair.oldHtml);
              out += renderDiffLine('add', pair.newHtml);
            }
          } else {
            for (var a = 0; a < olds.length; a++)
              out += renderDiffLine('del', escapeHtml(olds[a]));
            for (var b = 0; b < news.length; b++)
              out += renderDiffLine('add', escapeHtml(news[b]));
          }
          removed += olds.length;
          added += news.length;
          k++;  // consumed the 'next' added block
        } else if (cur.removed) {
          var delLines = splitDiffLines(cur.value);
          for (var dd = 0; dd < delLines.length; dd++)
            out += renderDiffLine('del', escapeHtml(delLines[dd]));
          removed += delLines.length;
        } else if (cur.added) {
          var addLines = splitDiffLines(cur.value);
          for (var aa = 0; aa < addLines.length; aa++)
            out += renderDiffLine('add', escapeHtml(addLines[aa]));
          added += addLines.length;
        } else {
          var ctxLines = splitDiffLines(cur.value);
          for (var cc = 0; cc < ctxLines.length; cc++)
            out += renderDiffLine('ctx', escapeHtml(ctxLines[cc]));
        }
      }
      return { html: out, added: added, removed: removed };
    }

    function diffSummary(diff) {
      return '−' + diff.removed + ' / +' + diff.added;
    }

    var TOOL_RENDERERS = {
      Read: {
        call: function(p, el) {
          var fp = p.input && p.input.file_path;
          el.innerHTML = makeHeadline('Read',
            '<span title="' + escapeAttr(fp || '') + '">' + escapeHtml(shortPath(fp || '')) + '</span>');
        },
        result: function(p, el) {
          if (p.is_error) { setStatusError(el); } else { setStatusOk(el, 'read'); }
          var parsed = parseReadContent(p.response);
          var rows = parsed.rows;
          var total = parsed.totalLines || rows.length;
          var start = parsed.startLine;
          var end = rows.length ? Number(rows[rows.length - 1].n) : start;
          var MAX = 60;
          var shown = rows.slice(0, MAX);
          var body = '<div class="m-diff-v2 m-read-body">';
          for (var i = 0; i < shown.length; i++) {
            var r = shown[i];
            body +=
              '<div class="m-diff-line m-diff-read">' +
                '<span class="m-diff-gutter m-read-ln">' + escapeHtml(r.n) + '</span>' +
                '<span class="m-diff-content">' + escapeHtml(r.text || '') + '</span>' +
              '</div>';
          }
          if (rows.length > MAX) {
            body +=
              '<div class="m-diff-line m-diff-ctx m-read-more">' +
                '<span class="m-diff-gutter">…</span>' +
                '<span class="m-diff-content">(' + (rows.length - MAX) + ' more lines)</span>' +
              '</div>';
          }
          body += '</div>';
          var summary;
          if (rows.length === 0) {
            summary = '(empty)';
          } else if (rows.length < total) {
            summary = 'lines ' + start + '–' + end + ' of ' + total;
          } else {
            summary = total + ' line' + (total === 1 ? '' : 's');
          }
          appendDetails(el, summary, body);
        },
      },
      Bash: {
        call: function(p, el) {
          var cmd = (p.input && p.input.command) || '';
          var desc = p.input && p.input.description;
          var lines = cmd.split('\n');
          var first = lines[0] || '';
          var headline = first.length > 120 ? first.slice(0, 117) + '…' : first;
          if (lines.length > 1) {
            headline += ' ↵ (' + lines.length + ' lines)';
          }
          el.innerHTML = makeHeadline('Bash',
            '<span class="m-bash-cmd">$ ' + escapeHtml(headline) + '</span>',
            desc ? escapeHtml(desc) : null);
          // Stash the full command (collapsed) when it's multi-line or long.
          if (lines.length > 1 || cmd.length > 120) {
            appendDetails(el, 'full command',
              '<pre class="m-bash-cmd-full">' + escapeHtml(cmd) + '</pre>');
          }
        },
        result: function(p, el) {
          var r = p.response;
          var stdout = '';
          var stderr = '';
          var interrupted = false;
          // Newer Claude Code wraps bash output as { stdout, stderr, interrupted, ... }.
          // Older versions return a plain string. Handle both.
          if (r && typeof r === 'object' && !Array.isArray(r)) {
            stdout = typeof r.stdout === 'string' ? r.stdout : '';
            stderr = typeof r.stderr === 'string' ? r.stderr : '';
            interrupted = !!r.interrupted;
          } else if (typeof r === 'string') {
            // Try parsing as JSON first (some transports stringify the object).
            var parsed = null;
            try { parsed = JSON.parse(r); } catch (e) { /* not JSON */ }
            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              stdout = parsed.stdout || '';
              stderr = parsed.stderr || '';
              interrupted = !!parsed.interrupted;
            } else {
              stdout = r;
            }
          }

          if (p.is_error) {
            setStatusError(el);
          } else if (interrupted) {
            var badge = el.querySelector('[data-role="status"]');
            if (badge) {
              badge.className = 'm-tool-badge error';
              badge.textContent = 'interrupted';
            }
          } else {
            setStatusOk(el, 'done');
          }

          var outLineCount = stdout ? stdout.trimEnd().split('\n').filter(function(l) { return l.length > 0; }).length : 0;
          var errLineCount = stderr ? stderr.trimEnd().split('\n').filter(function(l) { return l.length > 0; }).length : 0;

          // Build the details body. stdout + stderr stay COLLAPSED by default —
          // summary line tells you how much output there was at a glance.
          var body = '';
          if (stdout) {
            body += '<pre class="m-bash-out">' + escapeHtml(truncateLines(stdout, 40)) + '</pre>';
          }
          if (stderr) {
            body += '<div class="m-bash-label">stderr</div>' +
              '<pre class="m-bash-err">' + escapeHtml(truncateLines(stderr, 20)) + '</pre>';
          }
          if (!body) body = '<div class="m-tool-sub">(no output)</div>';

          var summary;
          if (outLineCount || errLineCount) {
            var parts = [];
            if (outLineCount) parts.push(outLineCount + ' line' + (outLineCount === 1 ? '' : 's') + ' stdout');
            if (errLineCount) parts.push(errLineCount + ' line' + (errLineCount === 1 ? '' : 's') + ' stderr');
            summary = parts.join(', ');
          } else {
            summary = 'output (empty)';
          }

          appendDetails(el, summary, body);  // collapsed by default
        },
      },

      Grep: {
        call: function(p, el) {
          var pat = p.input && p.input.pattern;
          var where = (p.input && (p.input.glob || p.input.path)) || '.';
          el.innerHTML = makeHeadline('Search',
            '🔍 <code>' + escapeHtml(pat || '') + '</code>',
            'in ' + escapeHtml(where));
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el);
          else setStatusOk(el, 'done');
          // Grep responses arrive as { content: "..." } (output_mode "content")
          // or { filenames: [...] } / raw string. Pull the usable text out
          // before we try to parse it.
          var resp;
          if (typeof p.response === 'string') {
            resp = p.response;
          } else if (p.response && typeof p.response === 'object') {
            if (typeof p.response.content === 'string') resp = p.response.content;
            else if (Array.isArray(p.response.content)) resp = p.response.content.join('\n');
            else if (Array.isArray(p.response.filenames)) resp = p.response.filenames.join('\n');
            else resp = tryJson(p.response);
          } else {
            resp = String(p.response || '');
          }
          var rawLines = (resp || '').split('\n').filter(function(l) { return l.length > 0; });
          // Grep output comes as either "N:content" (single-file path) or
          // "file:N:content" (multi-file). Detect mode so single-file results
          // can strip the repeated filename the way the TUI does.
          var contentRx = /^(\d+):(.*)$/;
          var multiRx = /^(.+?):(\d+):(.*)$/;
          var files = Object.create(null);
          var fileOrder = [];
          var singleFileMode = rawLines.length > 0 && rawLines.every(function(l) { return contentRx.test(l); });
          var matchCount = 0;
          var filenameMode = false;
          if (singleFileMode) {
            for (var i = 0; i < rawLines.length; i++) {
              var m = rawLines[i].match(contentRx);
              if (!m) continue;
              matchCount++;
              if (!files['__single__']) { files['__single__'] = []; fileOrder.push('__single__'); }
              files['__single__'].push({ line: m[1], text: m[2] });
            }
          } else {
            for (var j = 0; j < rawLines.length; j++) {
              var mm = rawLines[j].match(multiRx);
              if (!mm) continue;
              matchCount++;
              var f = mm[1];
              if (!files[f]) { files[f] = []; fileOrder.push(f); }
              files[f].push({ line: mm[2], text: mm[3] });
            }
            // files_with_matches mode: response is a plain list of file paths.
            if (matchCount === 0 && rawLines.length > 0) {
              filenameMode = true;
              matchCount = rawLines.length;
              for (var q = 0; q < rawLines.length; q++) {
                fileOrder.push(rawLines[q]);
                files[rawLines[q]] = [];
              }
            }
          }
          var fileCount = singleFileMode ? 1 : fileOrder.length;
          var summary;
          if (matchCount === 0) {
            summary = 'No matches';
          } else if (filenameMode) {
            summary = 'Found ' + matchCount + ' ' + (matchCount === 1 ? 'file' : 'files');
          } else {
            summary = 'Found ' + matchCount + ' ' + (matchCount === 1 ? 'line' : 'lines') +
              (fileCount > 1 ? ' across ' + fileCount + ' files' : '');
          }
          var body = '<div class="m-grep">';
          var MAX_LINES = 40;
          var shown = 0, clipped = false;
          for (var k = 0; k < fileOrder.length && !clipped; k++) {
            var key = fileOrder[k];
            var hits = files[key];
            if (!singleFileMode) {
              body += '<div class="m-grep-file">' + escapeHtml(key) + '</div>';
            }
            for (var h = 0; h < hits.length; h++) {
              if (shown >= MAX_LINES) { clipped = true; break; }
              body += '<div class="m-grep-row">' +
                '<span class="m-grep-ln">' + escapeHtml(hits[h].line) + '</span>' +
                '<code class="m-grep-text">' + escapeHtml(hits[h].text) + '</code>' +
                '</div>';
              shown++;
            }
          }
          if (clipped) {
            body += '<div class="m-grep-more">… ' + (matchCount - shown) + ' more</div>';
          }
          body += '</div>';
          appendDetails(el, summary, body, { open: true });
        },
      },

    // Small helper for MCP tools with no meaningful input/output —
    // the headline tells the whole story.
    function cnSimple(headline, okText) {
      return {
        call: function(p, el) {
          el.innerHTML = makeHeadline('claude-net', headline);
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, okText || 'done');

      };
