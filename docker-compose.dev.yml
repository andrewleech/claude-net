services:
  hub:
    build: .
    ports:
      - "4815:4815"
    environment:
      - CLAUDE_NET_PORT=4815
      - CLAUDE_NET_UPLOADS_DIR=/data/uploads
    volumes:
      - ./src:/app/src
      - ./.git:/app/.git:ro
      - cn-uploads-dev:/data/uploads
    restart: unless-stopped

volumes:
  cn-uploads-dev:
