    // ── Question cards (ExitPlanMode, AskUserQuestion) ───────────────

    function renderQuestionExitPlanMode(evt, payload) {
      var card = document.createElement('div');
      card.className = 'm-evt m-evt-question';
      card.setAttribute('data-tool-use-id', payload.tool_use_id || '');
      var planMd = (payload.input && payload.input.plan) || '';
      card.innerHTML =
        '<span class="m-q-banner">plan awaiting approval</span>' +
        '<div class="m-q-body md-body">' + renderMarkdown(planMd) + '</div>' +
        '<div class="m-q-actions">' +
          '<button type="button" class="m-q-action primary" data-action="approve">Approve → compose</button>' +
          '<button type="button" class="m-q-action" data-action="reject">Reject → compose</button>' +
        '</div>';
      card.querySelector('[data-action="approve"]').addEventListener('click', function() {
        prefillCompose('Proceed with this plan.');
      });
      card.querySelector('[data-action="reject"]').addEventListener('click', function() {
        prefillCompose("Don't do that — ");
      });
      return card;
    }

    function renderQuestionAskUserQuestion(evt, payload) {
      var card = document.createElement('div');
      card.className = 'm-evt m-evt-question';
      card.setAttribute('data-tool-use-id', payload.tool_use_id || '');
      var qs = (payload.input && payload.input.questions) || [];
      var html = '<span class="m-q-banner">awaiting answer</span>';
      for (var i = 0; i < qs.length; i++) {
        var q = qs[i];
        html += '<div class="m-q-body"><strong>' + escapeHtml(q.question || '') + '</strong></div>';
        html += '<div class="m-q-actions">';
        var opts = q.options || [];
        for (var j = 0; j < opts.length; j++) {
          var o = opts[j];
          html += '<button type="button" class="m-q-action" data-inject="' + escapeAttr(o.label || '') + '">' +
            escapeHtml(o.label || '') +
            (o.description ? '<span class="m-q-action-desc">' + escapeHtml(o.description) + '</span>' : '') +
          '</button>';
        }
        html += '</div>';
      }
      card.innerHTML = html;
      var btns = card.querySelectorAll('.m-q-action[data-inject]');
      for (var k = 0; k < btns.length; k++) {
        btns[k].addEventListener('click', function(e) {
          var text = e.currentTarget.getAttribute('data-inject');
          sendInject(text);
        });
      }
      return card;
    }

    function markQuestionAnswered(cardEl, payload) {
      cardEl.classList.add('answered');
      var banner = cardEl.querySelector('.m-q-banner');
      if (banner) banner.textContent = 'answered';
      var actions = cardEl.querySelector('.m-q-actions');
      if (actions) actions.remove();
      var resp = typeof payload.response === 'string' ? payload.response : tryJson(payload.response);
      if (resp) {
        var a = document.createElement('div');
        a.className = 'm-q-answer';
        a.textContent = '→ ' + truncateLines(resp, 2);
        cardEl.appendChild(a);
      }
    }

    // ── Markdown rendering (marked + DOMPurify) ────────────────────
    // `marked` parses CommonMark + GFM extras (tables, strikethrough, task
    // lists, etc). DOMPurify then strips any dangerous HTML — Claude's
    // output is trusted-ish but we still belt-and-brace it since on a
    // private tailnet one compromised model turn shouldn't XSS the
    // dashboard. If either lib fails to load (rare), fall back to the
    // raw text escaped as <pre>.

    var markedReady = typeof window.marked !== 'undefined';
    var purifyReady = typeof window.DOMPurify !== 'undefined';
    if (markedReady) {
      try {
        window.marked.setOptions({ gfm: true, breaks: true });
      } catch (e) { /* older/newer API; ignore */ }
    }

    function renderMarkdown(src) {
      if (!src) return '';
      var text = String(src);
      if (!markedReady) {
        return '<pre>' + escapeHtml(text) + '</pre>';
      }
      var html;
      try {
        html = window.marked.parse(text);
      } catch (e) {
        return '<pre>' + escapeHtml(text) + '</pre>';
      }
      if (purifyReady) {
        // Keep links target=_self by default but allow href/title; drop
        // scripts/iframes/event-handlers.
        html = window.DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
      }
      return html;
    }

    // ── Main renderEvent ─────────────────────────────────────────────

    function buildHistoryEl(evt) {
      var payload = evt.payload || {};
      var ts = formatTime(new Date(evt.ts).toISOString());
      var role = payload.role || 'system';
      var el = document.createElement('div');
      el.className = 'm-evt m-evt-history m-evt-history-' + role;
      el.setAttribute('data-uuid', evt.uuid);
      el.setAttribute('data-ts', ts);
      el.innerHTML =
        '<div class="m-evt-meta"><span class="m-label">' + escapeHtml(role) + '</span> ' + ts +
        ' <span class="m-history-tag">history</span></div>' +
        '<pre>' + escapeHtml(payload.text || '') + '</pre>';
      return el;
    }

    function renderEvent(evt) {
      if (!evt || !evt.uuid || rendered[evt.uuid]) return;
      rendered[evt.uuid] = true;
      if (typeof evt.ts === 'number' &&
          (firstRenderedTs === null || evt.ts < firstRenderedTs)) {
        firstRenderedTs = evt.ts;
      }

      var kind = evt.kind;
      var payload = evt.payload || {};
      var el;
      var ts = formatTime(new Date(evt.ts).toISOString());

      if (kind === 'user_prompt') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-user';
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">user</span> ' + ts + '</div>' +
          '<pre>' + escapeHtml(payload.prompt || '') + '</pre>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
      } else if (kind === 'assistant_message') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-assistant';
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">assistant</span> ' + ts + '</div>' +
          '<div class="md-body">' + renderMarkdown(payload.text || '') + '</div>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
        // Claude moved on → any outstanding permission banner has been
        // answered and should disappear.
        onAssistantReply();
      } else if (kind === 'tool_call') {
        // Question tools get their own card; everything else uses the
        // tool-renderer registry with a safe fallback for unknown names.
        if (payload.tool_name === 'ExitPlanMode') {
          el = renderQuestionExitPlanMode(evt, payload);
        } else if (payload.tool_name === 'AskUserQuestion') {
          el = renderQuestionAskUserQuestion(evt, payload);
        } else {
          el = document.createElement('div');
          el.className = 'm-evt m-evt-tool';
          el.setAttribute('data-tool-use-id', payload.tool_use_id || '');
          var renderer = TOOL_RENDERERS[payload.tool_name];
          if (renderer && typeof renderer.call === 'function') {
            renderer.call(payload, el);
          } else {
            renderUnknownToolCall(payload, el);
          }
        }
      } else if (kind === 'tool_result') {
        // Try to attach to the matching tool_call / question card.
        var existing = payload.tool_use_id
          ? transcriptEl.querySelector('[data-tool-use-id="' + cssEscape(payload.tool_use_id) + '"]')
          : null;
        if (existing) {
          if (existing.classList.contains('m-evt-question')) {
            markQuestionAnswered(existing, payload);
          } else {
            var r = TOOL_RENDERERS[payload.tool_name];
            if (r && typeof r.result === 'function') {
              r.result(payload, existing);
            } else {
              renderUnknownToolResult(payload, existing);
            }
          }
          scrollToBottom();
          return;
        }
        // No matching call — render stand-alone result.
        el = document.createElement('div');
        el.className = 'm-evt m-evt-tool' + (payload.is_error ? ' is-error' : '');
        el.innerHTML = makeHeadline(payload.tool_name || 'tool', '(orphan result)');
        var r2 = TOOL_RENDERERS[payload.tool_name];
        if (r2 && typeof r2.result === 'function') r2.result(payload, el);
        else renderUnknownToolResult(payload, el);
      } else if (kind === 'notification') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-notif';
        el.innerHTML = escapeHtml(payload.text || '');
        // Fire the permission-banner side-effect for attention-
        // getting notifications. Inline card still renders as
        // history; the banner is the at-a-glance affordance.
        onNotificationEvent(payload.text || '');
      } else if (kind === 'compact') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-compact';
        el.innerHTML = '— conversation ' + (payload.phase === 'pre' ? 'compacting' : 'compacted') + ' —';
      } else if (kind === 'session_start') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-notif';
        el.innerHTML = '— session started (' + escapeHtml(payload.source || '') + ') —';
      } else if (kind === 'session_end') {
        el = document.createElement('div');
        el.className = 'm-evt m-evt-end';
        el.innerHTML = '— session ended (' + escapeHtml(payload.reason || '') + ') —';
      } else if (kind === 'history_text') {
        el = buildHistoryEl(evt);
      } else {
        el = document.createElement('div');
        el.className = 'm-evt';
        el.innerHTML = '<pre>' + escapeHtml(JSON.stringify(evt)) + '</pre>';
      }

      // Broadcast-style gutter timestamp: every event row carries its
      // own HH:MM:SS in the left rail via data-ts, which the CSS
      // ::before picks up. Skip for inline-centered system events
      // (notif/compact/end) — they're their own visual treatment.
      if (el && !el.classList.contains('m-evt-compact') && !el.classList.contains('m-evt-end')) {
        el.setAttribute('data-ts', ts);
      }
      if (el) el.setAttribute('data-uuid', evt.uuid);

      transcriptEl.appendChild(el);
      scrollToBottom();
    }

    // Insert backfilled history frames (oldest-first) at the top of the
    // transcript. Preserves scroll-from-top so the user's view doesn't
    // jump when content is added above.
    function prependHistoryFrames(frames) {
      if (!frames || frames.length === 0) return;
      var prevTop = transcriptEl.scrollTop;
      var prevHeight = transcriptEl.scrollHeight;
      // Insertion anchor: keep prepending before whatever is currently
      // first. We walk frames in order and insertBefore(firstChild) so
      // the final order matches the input order (oldest at top).
      if (!historyDivider) {
        historyDivider = document.createElement('div');
        historyDivider.className = 'm-evt m-evt-history-divider';
        historyDivider.textContent = '— earlier history loaded from transcript —';
        if (transcriptEl.firstChild) {
          transcriptEl.insertBefore(historyDivider, transcriptEl.firstChild);
        } else {
          transcriptEl.appendChild(historyDivider);
        }
      }
      // Build all elements first, then insert them in reverse so the
      // first frame ends up at the top (above the divider).
      var els = [];
      for (var i = 0; i < frames.length; i++) {
        var f = frames[i];
        if (!f || !f.uuid || rendered[f.uuid]) continue;
        rendered[f.uuid] = true;
        els.push(buildHistoryEl(f));
        if (typeof f.ts === 'number' &&
            (firstRenderedTs === null || f.ts < firstRenderedTs)) {
          firstRenderedTs = f.ts;
        }
      }
      // Insert in reverse so the oldest frame is at the very top.
      for (var j = els.length - 1; j >= 0; j--) {
        transcriptEl.insertBefore(els[j], transcriptEl.firstChild);
      }
      // Restore scroll: keep the user's view anchored to the same content
      // they were looking at before the prepend.
      var added = transcriptEl.scrollHeight - prevHeight;
      transcriptEl.scrollTop = prevTop + added;
    }

    function prefillCompose(text) {
      var ct = document.getElementById('mirror-compose-text');
      if (!ct) return;
      ct.value = text;
      ct.focus();
      // Move caret to end
      var len = ct.value.length;
      try { ct.setSelectionRange(len, len); } catch (e) { /* ignore */ }
    }

    function sendInject(text) {
      if (!text || !text.trim()) return;
      var errEl = document.getElementById('mirror-compose-err');
      fetch('/api/mirror/' + encodeURIComponent(sid) + '/inject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, watcher: 'web-button' })
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          if (r.status >= 400 && errEl) {
            errEl.textContent = (r.body && r.body.error) || ('HTTP ' + r.status);
          }
        })
        .catch(function(err) {
          if (errEl) errEl.textContent = 'Send failed: ' + (err && err.message ? err.message : err);
        });
    }

    var thinkingEl = document.getElementById('mirror-thinking');
    // Turn state is pushed once per transition; the elapsed-seconds
    // counter is ticked client-side off startedAt so we don't need
    // per-second network traffic.
    var thinkingState = { active: false, startedAt: 0, tool: null };
    var thinkingTicker = null;
    function renderThinking() {
      if (!thinkingEl) return;
      if (!thinkingState.active) {
        thinkingEl.classList.remove('is-active');
        thinkingEl.textContent = '';
        return;
      }
      var secs = Math.max(0, Math.floor((Date.now() - thinkingState.startedAt) / 1000));
      var verb = thinkingState.tool ? 'Running ' + thinkingState.tool : 'Thinking';
      thinkingEl.textContent = '✻ ' + verb + ' for ' + secs + 's';
      thinkingEl.classList.add('is-active');
    }
    function updateThinkingIndicator(active, startedAt, tool) {
      thinkingState.active = !!active;
      thinkingState.tool = typeof tool === 'string' ? tool : null;
      if (active) {
        if (typeof startedAt === 'number') thinkingState.startedAt = startedAt;
        if (!thinkingTicker) thinkingTicker = setInterval(renderThinking, 1000);
      } else {
        if (thinkingTicker) { clearInterval(thinkingTicker); thinkingTicker = null; }
      }
      renderThinking();
    }

    // ── Permission-prompt banner ────────────────────────────────
    // Claude Code fires a Notification hook when it needs user
    // attention (tool-permission prompt, idle wait). We already
    // capture that as a mirror:event with kind: notification, but
    // buried in the transcript it's easy to miss — so match on
    // permission-shaped text and surface it as a sticky banner
    // with quick-inject buttons covering the common modal options.
    var promptBannerEl = document.getElementById('mirror-prompt-banner');
    var promptTextEl = document.getElementById('mirror-prompt-text');
    var PROMPT_RE = /permission|approval|waiting for input|needs your|allow/i;

    function showPromptBanner(text) {
      if (!promptBannerEl) return;
      promptTextEl.textContent = text;
      promptBannerEl.removeAttribute('hidden');
    }
    function hidePromptBanner() {
      if (!promptBannerEl) return;
      promptBannerEl.setAttribute('hidden', '');
      promptTextEl.textContent = '';
    }
    function onNotificationEvent(text) {
      if (!text || !PROMPT_RE.test(text)) return;
      showPromptBanner(text);
    }
    function onAssistantReply() {
      // Once Claude emits new text, the modal has been answered.
      hidePromptBanner();
    }

    if (promptBannerEl) {
      promptBannerEl.addEventListener('click', function(e) {
        var target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.classList.contains('cn-prompt-dismiss')) {
          hidePromptBanner();
          return;
        }
        var key = target.getAttribute('data-prompt-key');
        if (!key) return;
        // Esc uses the existing /stop endpoint (single Escape keypress).
        // Digits go through the normal inject path (which also sends
        // Enter — Claude Code's modals accept either bare digit or
        // digit+Enter so the double-Enter safety is harmless here).
        if (key === 'esc') {
          fetch('/api/mirror/' + encodeURIComponent(sid) + '/stop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ watcher: 'web-prompt-banner' }),
          }).catch(function() {});
        } else {
          fetch('/api/mirror/' + encodeURIComponent(sid) + '/inject', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: key, watcher: 'web-prompt-banner' }),
          }).catch(function() {});
        }
        hidePromptBanner();
      }, { signal: attachSig });
    }

    function applyInit(msg) {
      cwdEl.textContent = msg.cwd || '';
      ownerEl.textContent = msg.owner_agent || '';
      setConnState('live');
      if (msg.closed_at) {
        statusEl.className = 'mirror-status';
        statusEl.textContent = 'session closed at ' + msg.closed_at;
      }
      // Reset history state — a fresh init (including reconnect) starts
      // clean. Always enable the history button; has_more only tells us
      // the init window was truncated, not whether the JSONL has content.
      historyExhausted = false;
      historyInflight = false;
      firstRenderedTs = null;
      historyDivider = null;
      updateHistoryBtn();
      transcriptEl.innerHTML = '';
      rendered = Object.create(null);
      disconnectTailObserver();
      // Restore per-session scroll-back state. If the user previously
      // scrolled up in this session, preserve that and restore their
      // position; otherwise snap to the tail.
      var scrollState = sessionScrollState.get(sid);
      // Set userScrolledUp before the render loop so that scrollToBottom()
      // calls inside renderEvent no-op when we intend to restore position.
      setScrolledUp(!!(scrollState && scrollState.scrolledUp));
      if (Array.isArray(msg.transcript)) {
        for (var i = 0; i < msg.transcript.length; i++) {
          renderEvent(msg.transcript[i]);
        }
        // Transcript replay would have flipped the banner on for every
        // old notification it contains. Those prompts are answered and
        // historical — hide it so it only shows for live ones.
        hidePromptBanner();
      }
      if (userScrolledUp && scrollState && scrollState.anchorUuid) {
        // Restore by content anchor: find the frame the user was reading
        // and scroll to the same offset within it. Falls back to tail if
        // the frame is no longer in the rendered window (e.g. it was
        // loaded history that wasn't re-requested, or was outside the
        // 200-frame init window).
        var anchorUuid = scrollState.anchorUuid;
        var anchorOffset = scrollState.anchorOffset || 0;
        requestAnimationFrame(function() {
          var target = transcriptEl.querySelector('[data-uuid="' + anchorUuid + '"]');
          if (target) {
            transcriptEl.scrollTop = target.offsetTop + anchorOffset;
          } else {
            // Anchor not in current window; fall through to tail.
            setScrolledUp(false);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
            startTailObserver();
          }
        });
      } else {
        setScrolledUp(false);
        scrollToBottom();
        startTailObserver();
      }
    }

    var mws = null;
    var mReconnectTimer = null;
    var teardownCalled = false;
    function mConnect() {
      if (teardownCalled) return;
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = proto + '//' + location.host + '/ws/mirror/' + encodeURIComponent(sid);
      try {
        mws = new WebSocket(url);
      } catch (e) {
        setConnState('error');
        statusEl.className = 'mirror-status error';
        statusEl.textContent = 'Failed to open WebSocket: ' + (e && e.message ? e.message : e);
        return;
      }
      mws.onopen = function() { setConnState('live'); statusEl.textContent = ''; statusEl.className = 'mirror-status'; };
      mws.onmessage = function(e) {
        // Guard against late frames from a prior attach.
        if (activeAgentSid !== sid) return;
        var msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.event === 'mirror:init') applyInit(msg);
        else if (msg.event === 'mirror:event') renderEvent(msg);
        else if (msg.event === 'mirror:thinking') updateThinkingIndicator(msg.active, msg.startedAt, msg.tool);
        else if (msg.event === 'mirror:history_chunk') {
          historyInflight = false;
          prependHistoryFrames(msg.frames || []);
          historyExhausted = Boolean(msg.exhausted);
          updateHistoryBtn();
        }
        else if (msg.event === 'mirror:history_error') {
          historyInflight = false;
          updateHistoryBtn();
          statusEl.className = 'mirror-status error';
          statusEl.textContent = 'history: ' + (msg.error || 'error');
        }
        else if (msg.event === 'error') {
          statusEl.className = 'mirror-status error';
          statusEl.textContent = msg.message || 'error';
        }
      };
      mws.onclose = function() {
        setConnState('offline');
        if (teardownCalled) return;
        if (mReconnectTimer) return;
        mReconnectTimer = setTimeout(function() { mReconnectTimer = null; mConnect(); }, 3000);
      };
      mws.onerror = function() { /* close will follow */ };
    }
    mConnect();

    // Wire up the teardown closure so a subsequent attach (or detach) can
    // shut this session down cleanly. `attachAc.abort()` unbinds every
    // listener registered above so the reused DOM elements don't keep
    // firing handlers for the previous sid.
    mirrorTeardown = function() {
      teardownCalled = true;
      disconnectTailObserver();
      try { attachAc.abort(); } catch (e) { /* ignore */ }
      if (mReconnectTimer) { clearTimeout(mReconnectTimer); mReconnectTimer = null; }
      if (thinkingTicker) { clearInterval(thinkingTicker); thinkingTicker = null; }
      try { if (mws) mws.close(); } catch (e) { /* ignore */ }
      mws = null;
      if (thinkingEl) { thinkingEl.classList.remove('is-active'); thinkingEl.textContent = ''; }
      if (jumpBtn) jumpBtn.classList.remove('is-visible');
      if (transcriptEl) {
        // Capture final scroll state before wiping DOM so re-attach can restore it.
        var dist = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
        var scrolledUp = dist > SCROLL_LOCK_THRESHOLD;
        var teardownState = { scrolledUp: scrolledUp };
        if (scrolledUp) {
          var anchor = captureAnchor();
          if (anchor) { teardownState.anchorUuid = anchor.uuid; teardownState.anchorOffset = anchor.offset; }
        }
        setScrollState(sid, teardownState);
        transcriptEl.innerHTML = '';
      }
      if (statusEl) { statusEl.className = 'mirror-status'; statusEl.textContent = ''; }
      hidePromptBanner();
      // Task panel is shared DOM, but taskState is per-attach. Wipe
      // the rendered rows + button so the next session doesn't inherit
      // the previous one's list.
      if (taskPanelList) taskPanelList.innerHTML = '';
      if (taskPanelBtn) {
        taskPanelBtn.classList.add('d-none');
        taskPanelBtn.innerHTML = '';
      }
      if (taskPanelEl && window.bootstrap) {
        try {
          bootstrap.Collapse.getOrCreateInstance(taskPanelEl, { toggle: false }).hide();
        } catch (e) { /* ignore */ }
      }
      // Reset history button: a fresh attach starts with no anchor and
      // the button enabled (the initial transcript may have content).
      var hb = document.getElementById('mirror-history-btn');
      if (hb) {
        hb.disabled = false;
        hb.title = 'Load earlier history from the on-disk transcript';
      }
    };

    // Compose box (remote inject). Shown because we have an owner token —
    // reader-token UX lands in Phase M3.
    var composeEl = document.getElementById('mirror-compose');
    var composeText = document.getElementById('mirror-compose-text');
    var composeSend = document.getElementById('mirror-compose-send');
    var composeErr = document.getElementById('mirror-compose-err');
    if (composeEl) composeEl.classList.remove('compose-hidden');

    // Size caps come from the hub — fetched once so the compose box can
    // pick /inject vs /paste based on payload size. Sensible fallbacks
    // let sends keep working if the fetch fails.
    var injectMaxBytes = 512 * 1024;
    var pasteMaxBytes = 64 * 1024 * 1024;
    fetch('/api/mirror/config')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(cfg) {
        if (cfg && cfg.inject_max_kb) injectMaxBytes = cfg.inject_max_kb * 1024;
        if (cfg && cfg.paste_max_mb) pasteMaxBytes = cfg.paste_max_mb * 1024 * 1024;
      })
      .catch(function() { /* keep fallbacks */ });

    function utf8Bytes(s) {
      try { return new TextEncoder().encode(s).length; }
      catch (e) { return s.length; }
    }

    function doInject() {
      var text = composeText.value;
      if (!text || !text.trim()) return;
      var size = utf8Bytes(text);
      if (size > pasteMaxBytes) {
        composeErr.className = 'mirror-compose-err';
        composeErr.textContent =
          'Too large: ' + size + ' bytes (cap ' + pasteMaxBytes + ').';
        return;
      }
      composeSend.disabled = true;
      composeErr.className = 'mirror-compose-err';
      composeErr.textContent = '';
      var useLargeBlobPath = size > injectMaxBytes;
      var endpoint = useLargeBlobPath ? '/paste' : '/inject';
      fetch('/api/mirror/' + encodeURIComponent(sid) + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, watcher: 'web' })
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          composeSend.disabled = false;
          if (r.status >= 400) {
            composeErr.className = 'mirror-compose-err';
            composeErr.textContent = (r.body && r.body.error) || ('HTTP ' + r.status);
          } else {
            composeText.value = '';
            composeErr.className = 'mirror-compose-err is-notice';
            if (useLargeBlobPath && r.body && r.body.path) {
              composeErr.textContent =
                'Large paste (' + size + ' B) saved to ' + r.body.path +
                ' and injected as ' + r.body.reference;
            } else {
              composeErr.textContent = '';
            }
          }
        })
        .catch(function(err) {
          composeSend.disabled = false;
          composeErr.className = 'mirror-compose-err';
          composeErr.textContent = 'Send failed: ' + (err && err.message ? err.message : err);
        });
    }

    if (composeSend) composeSend.addEventListener('click', doInject, { signal: attachSig });

    // ── File uploads (paste / drop / attach-button) ───────────────
    // Dropped and pasted files are POSTed to /api/mirror/:sid/upload;
    // on success the returned URL is inserted at the caret in the
    // composer. The user still reviews + presses Send — uploads never
    // fire the prompt implicitly. Works on mobile via the native
    // file picker that the paperclip triggers.
    var attachBtn = document.getElementById('mirror-attach-btn');
    var attachInput = document.getElementById('mirror-attach-input');
    var composeFrame = composeEl ? composeEl.querySelector('.mirror-compose-frame') : null;
    var uploadsMaxBytes = 25 * 1024 * 1024;
    fetch('/api/uploads/config')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(cfg) {
        if (cfg && cfg.max_mb) uploadsMaxBytes = cfg.max_mb * 1024 * 1024;
      })
      .catch(function() { /* keep fallback */ });

    var pendingUploads = 0;
    function setAttachBusy(busy) {
      if (!attachBtn) return;
      if (busy) attachBtn.classList.add('is-uploading');
      else attachBtn.classList.remove('is-uploading');
    }

    function insertAtCursor(text) {
      if (!composeText) return;
      var start = composeText.selectionStart;
      var end = composeText.selectionEnd;
      if (typeof start !== 'number' || typeof end !== 'number') {
        composeText.value = (composeText.value ? composeText.value + ' ' : '') + text;
        return;
      }
      var before = composeText.value.substring(0, start);
      var after = composeText.value.substring(end);
      var prefix = before && !/\s$/.test(before) ? ' ' : '';
      var suffix = after && !/^\s/.test(after) ? ' ' : '';
      composeText.value = before + prefix + text + suffix + after;
      var pos = before.length + prefix.length + text.length + suffix.length;
      try { composeText.setSelectionRange(pos, pos); } catch (e) { /* ignore */ }
      composeText.focus();
    }

    function uploadOne(file) {
      if (!file) return;
      if (file.size > uploadsMaxBytes) {
        composeErr.className = 'mirror-compose-err';
        composeErr.textContent =
          'Too large: ' + (file.name || 'file') + ' (' + file.size +
          ' bytes, cap ' + uploadsMaxBytes + ').';
        return;
      }
      pendingUploads++;
      setAttachBusy(true);
      composeErr.className = 'mirror-compose-err is-notice';
      composeErr.textContent = 'Uploading ' + (file.name || '(pasted)') + '…';
      var fd = new FormData();
      fd.append('file', file, file.name || 'pasted');
      fetch('/api/mirror/' + encodeURIComponent(sid) + '/upload', {
        method: 'POST',
        body: fd
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          pendingUploads = Math.max(0, pendingUploads - 1);
          if (pendingUploads === 0) setAttachBusy(false);
          if (r.status >= 400 || !r.body || !r.body.url) {
            composeErr.className = 'mirror-compose-err';
            composeErr.textContent = 'Upload failed: ' +
              ((r.body && r.body.error) || ('HTTP ' + r.status));
            return;
          }
          insertAtCursor(r.body.url);
          composeErr.className = 'mirror-compose-err is-notice';
          composeErr.textContent = (file.name || 'file') + ' → ' + r.body.url;
        })
        .catch(function(err) {
          pendingUploads = Math.max(0, pendingUploads - 1);
          if (pendingUploads === 0) setAttachBusy(false);
          composeErr.className = 'mirror-compose-err';
          composeErr.textContent =
            'Upload failed: ' + (err && err.message ? err.message : err);
        });
    }

    function uploadFiles(fileList) {
      if (!fileList || !fileList.length) return;
      for (var i = 0; i < fileList.length; i++) uploadOne(fileList[i]);
    }

    if (attachBtn && attachInput) {
      attachBtn.addEventListener('click', function() { attachInput.click(); }, { signal: attachSig });
      attachInput.addEventListener('change', function() {
        uploadFiles(attachInput.files);
        attachInput.value = '';  // allow re-picking the same file
      }, { signal: attachSig });
    }

    if (composeText) {
      composeText.addEventListener('paste', function(e) {
        // Image paste from the system clipboard shows up as e.clipboardData.files.
        // Plain-text pastes have no files and fall through to the default paste.
        var files = e.clipboardData && e.clipboardData.files;
        if (!files || !files.length) return;
        e.preventDefault();
        uploadFiles(files);
      }, { signal: attachSig });
    }

    if (composeFrame) {
      composeFrame.addEventListener('dragover', function(e) {
        if (!e.dataTransfer || !e.dataTransfer.types) return;
        var hasFiles = false;
        for (var i = 0; i < e.dataTransfer.types.length; i++) {
          if (e.dataTransfer.types[i] === 'Files') { hasFiles = true; break; }
        }
        if (!hasFiles) return;
        e.preventDefault();
        composeFrame.classList.add('is-dragover');
      }, { signal: attachSig });
      composeFrame.addEventListener('dragleave', function(e) {
        // Only clear when leaving the frame itself, not bubbling from children.
        if (e.target === composeFrame) composeFrame.classList.remove('is-dragover');
      }, { signal: attachSig });
      composeFrame.addEventListener('drop', function(e) {
        composeFrame.classList.remove('is-dragover');
        var files = e.dataTransfer && e.dataTransfer.files;
        if (!files || !files.length) return;
        e.preventDefault();
        uploadFiles(files);
      }, { signal: attachSig });
    }

    // ── Enter-key mode ───────────────────────────────────────────
    // Touch-primary devices (phones, tablets without a hardware
    // keyboard) can't Shift+Enter, so Enter-sends turns into a trap.
    // Instead:
    //   - Desktop (pointer: fine): Enter sends, Shift+Enter newlines.
    //     The Transmit button is visible as the explicit affordance.
    //   - Touch: Enter always inserts a newline; submit is either
    //     tapping the icon-only Send button (a 44×44 ↵ target) or a
    //     quick double-Enter (two Enter presses within DOUBLE_ENTER_MS).
    //     The double-Enter shortcut lets you still type blank lines
    //     for paragraph breaks as long as you pause between them.
    var isTouchPrimary = false;
    try {
      isTouchPrimary = window.matchMedia(
        '(hover: none) and (pointer: coarse)'
      ).matches;
    } catch (e) { /* older browsers — assume desktop */ }
    if (composeEl) {
      if (isTouchPrimary) composeEl.classList.add('is-touch');
    }
    var DOUBLE_ENTER_MS = 500;
    var lastEnterAt = 0;

    // ── Slash-command autocomplete ────────────────────────────
    // Fetched once per session load. If the textarea's first line
    // starts with '/', a popover above it shows matching commands.
    // Enter/Tab inserts; Up/Down navigate; Esc dismisses; click or
    // tap also works for touch.
    var slashPopover = document.getElementById('mirror-slash-popover');
    var slashCommands = [];        // full catalog
    var slashFiltered = [];        // current filtered view
    var slashActiveIdx = 0;
    var slashOpen = false;
    fetch('/api/mirror/' + encodeURIComponent(sid) + '/commands')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(j) {
        if (j && Array.isArray(j.commands)) slashCommands = j.commands;
      })
      .catch(function() { /* endpoint optional; popover just won't suggest */ });

    function slashPrefix() {
      // Extract the slash-prefix on the current first line, if any.
      if (!composeText) return null;
      var val = composeText.value || '';
      var lineEnd = val.indexOf('\n');
      var firstLine = lineEnd < 0 ? val : val.slice(0, lineEnd);
      // Cursor must be on the first line (no newline before it).
      var caret = typeof composeText.selectionStart === 'number' ? composeText.selectionStart : val.length;
      if (lineEnd >= 0 && caret > lineEnd) return null;
      var trimmed = firstLine.trimStart();
      if (!trimmed.startsWith('/')) return null;
      // Prefix ends at the first whitespace (so '/command arg' filters on 'command').
      var after = trimmed.slice(1);
      var space = after.search(/\s/);
      return space < 0 ? after : after.slice(0, space);
    }

    function renderSlash() {
      if (!slashPopover) return;
      var q = slashPrefix();
      if (q === null || slashCommands.length === 0) {
        slashPopover.classList.remove('is-open');
        slashPopover.innerHTML = '';
        slashOpen = false;
        return;
      }
      var qLower = q.toLowerCase();
      slashFiltered = slashCommands.filter(function(c) {
        return !q || c.name.toLowerCase().indexOf(qLower) !== -1;
      }).slice(0, 24);
      // Prefix matches rank above substring matches.
      slashFiltered.sort(function(a, b) {
        var aPrefix = a.name.toLowerCase().startsWith(qLower) ? 0 : 1;
        var bPrefix = b.name.toLowerCase().startsWith(qLower) ? 0 : 1;
        if (aPrefix !== bPrefix) return aPrefix - bPrefix;
        return a.name.localeCompare(b.name);
      });
      if (slashActiveIdx >= slashFiltered.length) slashActiveIdx = 0;
      if (slashFiltered.length === 0) {
        slashPopover.innerHTML = '<div class="mirror-slash-empty">no matches for /' + escapeHtml(q) + '</div>';
      } else {
        var html = '';
        for (var i = 0; i < slashFiltered.length; i++) {
          var c = slashFiltered[i];
          var active = i === slashActiveIdx ? ' is-active' : '';
          html += '<div class="mirror-slash-item' + active + '" data-idx="' + i + '">' +
            '<span class="mirror-slash-name">/' + escapeHtml(c.name) + '</span>' +
            '<span class="mirror-slash-desc">' + escapeHtml(c.description || '') + '</span>' +
            '<span class="mirror-slash-source">' + escapeHtml(c.source) + '</span>' +
            '</div>';
        }
        slashPopover.innerHTML = html;
      }
      slashPopover.classList.add('is-open');
      slashOpen = true;
    }

    function slashInsertActive() {
      if (!slashOpen || !composeText) return false;
      if (slashActiveIdx < 0 || slashActiveIdx >= slashFiltered.length) return false;
      var pick = slashFiltered[slashActiveIdx];
      var val = composeText.value || '';
      var lineEnd = val.indexOf('\n');
      var firstLine = lineEnd < 0 ? val : val.slice(0, lineEnd);
      var rest = lineEnd < 0 ? '' : val.slice(lineEnd);
      // Replace the partial '/foo' with the full '/name ' (trailing space).
      var replaced = firstLine.replace(/\/\S*/, '/' + pick.name + ' ');
      composeText.value = replaced + rest;
      // Put the caret at the end of the inserted command.
      var pos = replaced.length;
      try { composeText.setSelectionRange(pos, pos); } catch (e) { /* ignore */ }
      slashPopover.classList.remove('is-open');
      slashOpen = false;
      composeText.focus();
      return true;
    }

    if (slashPopover) {
      // Rebuild on input and on caret moves.
      composeText.addEventListener('input', function() {
        slashActiveIdx = 0;
        renderSlash();
      }, { signal: attachSig });
      composeText.addEventListener('click', renderSlash, { signal: attachSig });
      composeText.addEventListener('keyup', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'Home' || e.key === 'End') {
          renderSlash();
        }
      }, { signal: attachSig });
      composeText.addEventListener('blur', function() {
        // Delay-close so click handlers fire first.
        setTimeout(function() { slashPopover.classList.remove('is-open'); slashOpen = false; }, 120);
      }, { signal: attachSig });
      // Click / tap to insert.
      slashPopover.addEventListener('mousedown', function(e) {
        var row = e.target.closest && e.target.closest('.mirror-slash-item');
        if (!row) return;
        e.preventDefault(); // keep focus on the textarea
        slashActiveIdx = parseInt(row.getAttribute('data-idx'), 10) || 0;
        slashInsertActive();
      }, { signal: attachSig });
    }

    if (composeText) {
      composeText.addEventListener('keydown', function(e) {
        // Intercept popover navigation first — only when the popover is open.
        if (slashOpen) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            slashActiveIdx = (slashActiveIdx + 1) % Math.max(1, slashFiltered.length);
            renderSlash();
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            slashActiveIdx = (slashActiveIdx - 1 + slashFiltered.length) % Math.max(1, slashFiltered.length);
            renderSlash();
            return;
          }
          if (e.key === 'Tab' || (e.key === 'Enter' && slashFiltered.length > 0)) {
            // Tab always inserts. Enter inserts when popover is open (overriding
            // the normal send behaviour).
            if (slashInsertActive()) { e.preventDefault(); return; }
          }
          if (e.key === 'Escape') {
            e.preventDefault();
            slashPopover.classList.remove('is-open');
            slashOpen = false;
            return;
          }
        }
        if (e.key !== 'Enter') return;
        if (isTouchPrimary) {
          // Touch: double-Enter-within-500ms submits; otherwise newline.
          // This keeps paragraph breaks possible (pause between Enters)
          // while giving a keyboard-only path to submit on mobile.
          var now = Date.now();
          var isDoubleEnter = now - lastEnterAt < DOUBLE_ENTER_MS;
          lastEnterAt = now;
          if (isDoubleEnter) {
            e.preventDefault();
            lastEnterAt = 0;
            // Strip trailing newlines the first Enter inserted.
            composeText.value = composeText.value.replace(/\n+$/, '');
            doInject();
          }
          // else: let the textarea insert the newline naturally.
        } else {
          // Desktop: Enter sends, Shift+Enter newlines.
          if (!e.shiftKey) { e.preventDefault(); doInject(); }
        }
      }, { signal: attachSig });
    }

    var stopBtn = document.getElementById('mirror-stop-btn');
    if (stopBtn) {
      stopBtn.addEventListener('click', function() {
        stopBtn.disabled = true;
        fetch('/api/mirror/' + encodeURIComponent(sid) + '/stop', { method: 'POST' })
          .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
          .then(function(r) {
            stopBtn.disabled = false;
            if (r.status >= 400) {
              statusEl.className = 'mirror-status error';
              statusEl.textContent = (r.body && r.body.error) || 'stop failed';
            }
          })
          .catch(function() { stopBtn.disabled = false; });
      }, { signal: attachSig });
    }

    var historyBtn = document.getElementById('mirror-history-btn');
    function updateHistoryBtn() {
      if (!historyBtn) return;
      historyBtn.disabled = historyExhausted || historyInflight;
      historyBtn.title = historyExhausted
        ? 'No earlier history available'
        : historyInflight
          ? 'Loading earlier history…'
          : 'Load earlier history from the on-disk transcript';
    }
    if (historyBtn) {
      updateHistoryBtn();
      historyBtn.addEventListener('click', function() {
        if (historyExhausted || historyInflight) return;
        if (!mws || mws.readyState !== 1) {
          statusEl.className = 'mirror-status error';
          statusEl.textContent = 'history: not connected';
          return;
        }
        historyInflight = true;
        updateHistoryBtn();
        statusEl.textContent = '';
        mws.send(JSON.stringify({
          action: 'request_history',
          before_ts: firstRenderedTs,
          limit: 200,
        }));
      }, { signal: attachSig });
    }

  }

  function tryJson(v) {
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function cssEscape(s) {
    return String(s).replace(/[^a-zA-Z0-9_-]/g, function(c) {
      return '\\' + c;
    });
  }
})();
</script>
<script>
// PWA: register the hub's service worker so the dashboard is installable
// (Chrome/Android homescreen, desktop Apps list, iOS add-to-homescreen).
// The worker itself is network-first — live data always hits the hub —
// so registration failure is non-fatal for normal browsing.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Default scope for a worker served from /sw.js is the origin
    // root, so no explicit scope arg is needed.
    navigator.serviceWorker.register('/sw.js')
      .catch(function(err) {
        if (window.console) console.warn('[claude-net] SW registration failed', err);
      });
  });
}
</script>
