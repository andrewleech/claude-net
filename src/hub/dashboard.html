<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>claude-net</title>
<meta name="theme-color" content="#0b0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="claude-net">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link href="/bin/bootstrap.min.css" rel="stylesheet">
<style>
  /* ───────────────────────────────────────────────────────────────
     BROADCAST CONSOLE
     Aesthetic: op-room / live broadcast monitor. Sharp corners,
     monospace everywhere structural, one saturated accent (amber-
     red "on air"), subtle scanlines for atmosphere. The feed is a
     continuous ticker, not a stack of cards.
     ─────────────────────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Dark (default) — broadcast monitor. */
    --bg: #0b0c10;
    --bg-panel: #101218;
    --bg-surface: #14171f;
    --bg-hover: #1a1e27;
    --bg-elevate: #1c2029;
    --border: #262a33;
    --border-dim: #1a1d24;
    --text: #e8ebef;
    --text-dim: #8b92a0;
    --text-muted: #545a66;

    /* ── One saturated accent: broadcast red-orange. Everything hot
         (live pulses, active selections, new-event flashes, user
         prompts, focus rings) uses this. Resist the urge to add
         more. ── */
    --accent: #ff4d2e;
    --accent-dim: #c53c22;
    --accent-glow: rgba(255, 77, 46, 0.18);
    --accent-ink: rgba(255, 77, 46, 0.08);

    /* Supporting hues, desaturated — used sparingly as type tags. */
    --gold: #d4a04d;
    --green: #55c27a;
    --red: #ff4d2e;       /* alias of --accent so existing error styles keep working */
    --text-accent: #ff6535; /* accent hue shifted orange for text — more legible in low light */
    --blue: #6fb0d4;      /* desaturated, not the 'main' colour any more */
    --cyan: #6fc3d9;
    --orange: #ff9e64;
    --purple: #b48ceb;
    --yellow: #d4a04d;    /* aliases --gold */

    --font-sans: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace;

    /* Scanline texture colour — swaps to a dark version on light
       theme. Keeps the broadcast-monitor feel on both modes. */
    --scanline: rgba(255, 255, 255, 0.012);

    /* Code-block ground (terminal-style panels — slightly darker
       than --bg on dark theme, slightly lighter than --bg on light). */
    --bg-code: #07080b;

    /* Text colour to use on top of the accent fill — keeps contrast
       readable on either theme. */
    --on-accent: #0b0c10;
  }

  /* Light theme overrides. */
  body.theme-light {
    --bg: #f3efe5;
    --bg-panel: #ebe6d7;
    --bg-surface: #e3ddcb;
    --bg-hover: #ddd5bf;
    --bg-elevate: #d5ccb2;
    --border: #bfb59a;
    --border-dim: #d0c7ae;
    --text: #1c1a16;
    --text-dim: #55534d;
    --text-muted: #8a8679;
    --accent: #c53518;
    --accent-dim: #9a2810;
    --accent-glow: rgba(197, 53, 24, 0.18);
    --accent-ink: rgba(197, 53, 24, 0.09);
    --gold: #8a6a28;
    --green: #3f8f52;
    --red: #c53518;
    --text-accent: var(--accent); /* light theme accent is already legible as text */
    --blue: #3a7594;
    --cyan: #3a7594;
    --orange: #c55a18;
    --purple: #7b4da3;
    --yellow: #8a6a28;
    --scanline: rgba(0, 0, 0, 0.022);
    --bg-code: #e8e0cc;
    --on-accent: #fff9ee;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* Very faint vertical scanline overlay — the 'broadcast monitor'
       texture. Tuned low enough to stay invisible on casual glance
       but enough to kill the flatness of pure-black backgrounds. */
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      var(--scanline) 2px, var(--scanline) 3px
    );
    font-feature-settings: 'ss01', 'cv11';
  }

  /* Uniform chrome label: the building block of the whole interface.
     Reused for panel headers, tool tags, meta rows, anything that
     labels something else. */
  .chrome-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Connection dot in the navbar. */
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--text-muted);
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .status-dot.offline { background: var(--text-muted); }

  /* Agent row indicator. Three states:
       online + mirror   → filled accent dot (clickable, row opens mirror)
       online, no mirror → hollow accent ring (not clickable, no mirror)
       offline           → small muted dot (not clickable) */
  .agent-dot {
    width: 7px; height: 7px;
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .agent-dot.online { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
  .agent-dot.no-mirror {
    background: transparent;
    border: 1px solid var(--text-muted);
    box-shadow: none;
  }
  .agent-dot.offline { background: var(--text-muted); opacity: 0.5; }
  .agent-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── TRANSCRIPT: the broadcast feed.
     Every event is a row hanging off a 72px left-gutter timeline
     that carries the `[HH:MM:SS]` timestamp and a type tag. The
     visual grammar is 'terminal log', not 'chat bubbles'. ── */
  .mirror-transcript {
    flex: 1;
    overflow-y: auto;
    /* Prevent long tool output (bash cmds, URLs) from pushing the
       viewport sideways on mobile. `clip` would disable panning inside
       nested horizontal-scroll blocks (diff, code) — use `hidden` here
       so those keep their own overflow. */
    overflow-x: hidden;
    padding: 8px 0 16px 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }
  /* The transcript used to draw a global vertical rail at x=104 via
     ::before ('broadcast timeline'). Removed: it grazed the right
     edge of the timestamp gutter on some font-load timings, and
     duplicated the per-assistant indent rule at x=121-122. Per-event
     tick marks (.m-evt::after) still render and read as standalone
     dashes without the rail. */

  .m-evt {
    position: relative;
    padding: 8px 24px 8px 128px;
    word-wrap: break-word;
    font-size: 13px;
    line-height: 1.55;
    animation: event-flash 900ms ease-out;
    /* Scope reflow inside the row: a textarea keystroke or live WS
       append elsewhere on the page can't trigger a full-document
       style recalc across hundreds of sibling rows. */
    contain: layout style paint;
  }

  /* Timestamp lives in the left gutter. Populated by JS via data-ts
     (see renderEvent). Gutter is 98px wide so `HH:MM:SS am` fits on
     one line at 10px IBM Plex Mono. */
  .m-evt::before {
    content: attr(data-ts);
    position: absolute;
    left: 10px; top: 10px;
    width: 88px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.4px;
    color: var(--text-muted);
    text-align: right;
    text-transform: uppercase;
    white-space: nowrap;
  }
  /* Tick mark on the rail, centred on the row's first visual line. */
  .m-evt::after {
    content: "";
    position: absolute;
    left: 101px; top: 15px;
    width: 7px; height: 1px;
    background: var(--border);
  }
  .m-evt pre {
    white-space: pre-wrap;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
  }
  /* The meta row originally held '<label> <timestamp>'. The timestamp
     moves to the left gutter via the ::before, so the meta row gets
     slimmed down to just its label. The text-node timestamp the JS
     inserts is hidden via font-size:0. */
  .m-evt-meta {
    font-size: 0;
    margin-bottom: 4px;
  }
  .m-evt-meta .m-label { font-size: 10px; }

  /* Every event surfaces a short type tag in the top-right of the
     row — 'USER', 'CLAUDE', tool name, etc. — so you can scan a
     200-event stream by type alone. */
  .m-label {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── USER prompts: the 'in' signal. Right-aligned with a thick
     accent right-edge. Red = 'you are pushing from the web'. ── */
  .m-evt-user {
    padding-left: 128px;
    padding-right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .m-evt-user > pre {
    display: block;
    max-width: min(72ch, 100%);
    padding: 10px 14px;
    background: var(--accent-ink);
    border-right: 3px solid var(--accent);
    color: var(--text);
    text-align: left;
  }
  .m-evt-user .m-label { color: var(--text-accent); }

  /* ── ASSISTANT: the 'out' signal. Editorial layout — no bubble,
     just a thin left rule anchoring the row to the timeline. The
     row does NOT shift right via margin-left (that would break the
     absolute-positioned gutter timestamp); it keeps the same
     padding-left as every other event row, and the rule is drawn at
     x=122 via a background-gradient so content visually indents. ── */
  .m-evt-assistant {
    padding-left: 140px;
    padding-right: 24px;
    background-image: linear-gradient(
      to right,
      transparent 0, transparent 121px,
      var(--border) 121px, var(--border) 122px,
      transparent 122px
    );
  }
  .m-evt-assistant::after { background: var(--accent); width: 9px; }
  .m-evt-assistant .m-label { color: var(--text-accent); }

  @media (max-width: 700px) {
    /* Narrow screens: the left timeline gutter eats too much width,
       so we collapse it. Each event's timestamp moves to a small
       line above the content, and the vertical rail + tick marks
       are dropped. Assistant messages keep a thin accent left-edge
       as their anchor. */
    .m-evt {
      padding-left: 14px;
      padding-right: 14px;
    }
    .m-evt::before {
      position: static;
      display: block;
      width: auto;
      text-align: left;
      margin-bottom: 3px;
      font-size: 9px;
    }
    .m-evt::after { display: none; }

    .m-evt-user { padding-left: 14px; align-items: stretch; }
    .m-evt-user > pre { max-width: none; }
    .m-evt-user .m-label { text-align: left; }

    .m-evt-assistant {
      padding-left: 12px;
      background-image: none;
      border-left: 2px solid var(--accent);
    }

    .m-evt-notif {
      padding-left: 14px;
    }
  }

  /* ── TOOL CALLS: each one is a rectangular status row. No
     rounded corners, no coloured fill — just a hairline top border
     on the card body and a 2px accent bar when the call is
     pending or errored. ── */
  .m-evt-tool {
    padding-right: 24px;
  }
  .m-evt-tool .m-label { color: var(--gold); }
  .m-evt-tool details { margin-top: 4px; }
  .m-evt-tool summary {
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    user-select: none;
    padding: 3px 0;
  }
  .m-evt-tool summary:hover { color: var(--text); }
  .m-evt-tool .m-tool-result {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-dim);
  }
  .m-evt-tool.is-error {
    background: rgba(255, 77, 46, 0.03);
  }
  .m-evt-tool.is-error::after { background: var(--accent); }

  /* Shared tool-card grammar. Every tool renders the same way:
     `[TAG]  target-string          STATUS` with optional sub-line. */
  .m-tool-headline {
    display: flex; align-items: baseline; gap: 12px;
    font-size: 13px; color: var(--text); line-height: 1.4;
  }
  .m-tool-headline .m-tool-name {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--gold);
    flex-shrink: 0;
    min-width: 70px;
  }
  .m-tool-headline .m-tool-target {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .m-tool-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
    overflow-wrap: anywhere;
  }
  .m-tool-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    margin-left: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .m-tool-badge.pending { background: rgba(224,175,104,0.20); color: var(--yellow); }
  .m-tool-badge.ok { background: rgba(158,206,106,0.15); color: var(--green); }
  .m-tool-badge.error { background: rgba(247,118,142,0.18); color: var(--text-accent); }
  .m-tool-badge.pending { border-color: var(--gold); color: var(--gold); }
  .m-tool-badge.ok { border-color: var(--text-accent); color: var(--text-accent); }
  .m-tool-badge.error { border-color: var(--text-accent); color: var(--text-accent); background: var(--accent-ink); }
  .m-tool-badge.nosupport { border-color: var(--border); color: var(--text-muted); }

  /* ── BASH — terminal prompt metaphor. The command is rendered with
     a leading `$ ` glyph; output lives in a black console block. ── */
  .m-bash-cmd {
    font-family: var(--font-mono);
    font-size: 12.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .m-bash-cmd::before {
    content: "$ ";
    color: var(--text-accent);
    font-weight: 600;
  }
  .m-bash-cmd-full {
    font-family: var(--font-mono);
    font-size: 12px; white-space: pre-wrap; color: var(--text);
  }
  .m-bash-out {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; white-space: pre-wrap;
    color: var(--text); margin: 6px 0 0;
    padding: 8px 10px;
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
    max-height: 320px; overflow: auto;
  }
  .m-bash-err {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; white-space: pre-wrap;
    color: var(--text-accent); margin: 6px 0 0;
    padding: 8px 10px;
    background: rgba(255, 77, 46, 0.05);
    border: 1px solid var(--accent-dim);
    max-height: 200px; overflow: auto;
  }
  .m-bash-label {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700; color: var(--text-accent);
    text-transform: uppercase; letter-spacing: 1.4px;
    margin-top: 8px;
  }

  /* ── READ — line-numbered diff-style view. ── */
  .m-read-body { max-height: 480px; overflow: auto; }
  .m-read-ln {
    width: 48px !important;
    text-align: right !important;
    padding-right: 6px;
    color: var(--text-muted);
    font-weight: 400 !important;
  }
  .m-diff-read .m-diff-content { color: var(--text); }
  .m-read-more .m-diff-content { color: var(--text-muted); font-style: italic; }

  /* ── CLAUDE-NET MCP lists (list_agents / list_teams / ToolSearch). ── */
  .m-cn-list {
    list-style: none; margin: 4px 0 0; padding: 0;
    font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
  }
  .m-cn-list li {
    padding: 1px 0;
    word-break: break-word;
  }
  .m-cn-dot { font-size: 10px; }
  .m-cn-dot-online { color: var(--green); }
  .m-cn-dot-offline { color: var(--text-muted); }
  .m-cn-muted { color: var(--text-muted); font-size: 11px; }

  /* ── WEB (Search / Fetch) ── */
  .m-web-query {
    font-family: var(--font-mono); color: var(--cyan);
  }
  .m-web-target-link {
    font-family: var(--font-mono); color: var(--cyan);
    text-decoration: none; word-break: break-all;
  }
  .m-web-target-link:hover { text-decoration: underline; }
  .m-web-results {
    list-style: none; margin: 4px 0 0; padding: 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .m-web-result {
    padding: 2px 0;
    line-height: 1.45;
  }
  .m-web-title {
    font-size: 13px; color: var(--cyan);
    text-decoration: none;
    word-break: break-word;
  }
  .m-web-title:hover { text-decoration: underline; }
  .m-web-host {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-muted);
  }
  .m-web-snippet {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    line-height: 1.45;
  }
  .m-web-summary {
    padding: 6px 10px;
    background: var(--bg-code); border: 1px solid var(--border-dim);
    max-height: 360px; overflow: auto;
  }

  /* ── GREP — ripgrep teletype output. ── */
  .m-grep {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55; margin-top: 6px;
    max-height: 420px; overflow: auto;
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
    padding: 8px 10px;
  }
  .m-grep-file {
    color: var(--gold); margin-top: 10px; padding: 2px 0;
    font-weight: 600; word-break: break-all;
    letter-spacing: 0.2px;
  }
  .m-grep-file:first-child { margin-top: 0; }
  .m-grep-row {
    display: flex; gap: 12px; align-items: baseline;
    padding: 1px 0;
  }
  .m-grep-ln {
    color: var(--text-muted); text-align: right;
    min-width: 5ch; user-select: none; flex-shrink: 0;
  }
  .m-grep-text {
    white-space: pre-wrap; word-break: break-word;
    color: var(--text); background: none; padding: 0;
  }
  .m-grep-more { color: var(--text-muted); margin-top: 6px; font-style: italic; }

  /* TodoWrite list — styles live in the later block with .m-checkbox */

  /* ── DIFFS — Edit/Write/MultiEdit. High-contrast monospace, no
     rounding, the 'delta' badges are the only colour. ── */
  .m-diff-v2 {
    font-family: var(--font-mono);
    font-size: 12px; line-height: 1.55;
    background: var(--bg-code); border: 1px solid var(--border-dim);
    padding: 6px 0; margin: 6px 0 0;
    overflow-x: auto;
  }
  .m-diff-line { display: flex; align-items: flex-start; padding: 0 8px; }
  .m-diff-gutter {
    display: inline-block; width: 18px; flex-shrink: 0;
    text-align: center; user-select: none; color: var(--text-muted);
    font-weight: 700;
  }
  .m-diff-content { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .m-diff-del { background: rgba(255, 77, 46, 0.06); }
  .m-diff-del .m-diff-gutter { color: var(--text-accent); }
  .m-diff-del .m-diff-content { color: var(--text-accent); }
  .m-diff-add { background: rgba(85, 194, 122, 0.05); }
  .m-diff-add .m-diff-gutter { color: var(--green); }
  .m-diff-add .m-diff-content { color: var(--green); }
  .m-diff-ctx .m-diff-content { color: var(--text-muted); }
  .m-diff-word-del {
    background: rgba(255, 77, 46, 0.35);
    color: var(--text);
  }
  .m-diff-word-add {
    background: rgba(85, 194, 122, 0.30);
    color: var(--text);
  }
  .m-multiedit-hunk { margin-bottom: 10px; }
  .m-multiedit-hunk:last-child { margin-bottom: 0; }
  .m-multiedit-hunk-label {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin: 4px 8px 4px;
  }

  /* ── QUESTION cards — "INCOMING QUERY" framing. ── */
  .m-evt-question {
    padding-right: 24px;
  }
  .m-evt-question > * {
    max-width: 72ch;
    margin-left: 0;
  }
  .m-evt-question .m-q-body-wrap {
    border: 1px solid var(--gold);
    background: rgba(212, 160, 77, 0.04);
    padding: 12px 14px;
    margin-top: 4px;
  }
  .m-evt-question.answered .m-q-body-wrap {
    border-color: var(--border);
    background: var(--bg-panel);
  }
  .m-q-banner {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700;
    color: var(--gold);
    text-transform: uppercase; letter-spacing: 1.4px;
    padding: 3px 8px;
    border: 1px solid var(--gold);
  }
  .m-evt-question.answered .m-q-banner { color: var(--text-muted); border-color: var(--border); }
  .m-q-body { margin-top: 10px; font-size: 13px; line-height: 1.55; }
  .m-q-body h1, .m-q-body h2, .m-q-body h3 {
    font-weight: 600; color: var(--text); margin-top: 10px; margin-bottom: 4px;
  }
  .m-q-body h1 { font-size: 15px; }
  .m-q-body h2 { font-size: 14px; }
  .m-q-body h3 { font-size: 13px; color: var(--text-dim); }
  .m-q-body ul, .m-q-body ol { margin-left: 22px; margin-top: 4px; margin-bottom: 4px; }
  .m-q-body li { margin: 2px 0; }
  .m-q-body code {
    background: var(--bg); padding: 1px 4px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-accent);
  }
  .m-q-body pre {
    background: var(--bg); padding: 8px 10px; margin: 6px 0;
    border-left: 2px solid var(--accent); overflow-x: auto;
  }
  .m-q-body strong { font-weight: 600; color: var(--text); }
  .m-q-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .m-q-action {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.8px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.1s, color 0.1s, background 0.1s;
  }
  .m-q-action:hover { border-color: var(--text-accent); color: var(--text-accent); }
  .m-q-action.primary {
    background: var(--accent-ink);
    border-color: var(--text-accent);
    color: var(--text-accent);
  }
  .m-q-action.primary:hover { background: var(--accent); color: var(--on-accent); }
  .m-q-action .m-q-action-desc {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: normal;
    letter-spacing: 0;
    text-transform: none;
    font-family: var(--font-sans);
  }
  .m-q-answer {
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  /* ── System events — telegraphic lines aligned to the timeline. ── */
  .m-evt-notif {
    padding: 4px 24px 4px 128px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .m-evt-notif::after { background: var(--text-muted); }
  .m-evt-compact {
    text-align: center;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    padding: 10px 24px;
    margin: 8px 24px;
    border-top: 1px dashed var(--border);
    border-bottom: 1px dashed var(--border);
  }
  .m-evt-compact::before, .m-evt-compact::after { display: none; }
  .m-evt-end {
    text-align: center;
    color: var(--text-accent);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 24px;
  }
  .m-evt-end::before, .m-evt-end::after { display: none; }

  /* History-backfill rows — visually distinct from live transcript so
     the user can see at a glance which content was loaded after the
     fact. Slightly dimmed; smaller `history` tag in the meta line. */
  .m-evt-history { opacity: 0.78; }
  .m-evt-history pre {
    margin: 4px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
  }
  .m-evt-history-user .m-label { color: var(--text-accent); }
  .m-evt-history-assistant .m-label { color: var(--text-dim); }
  .m-history-tag {
    display: inline-block;
    margin-left: 6px;
    padding: 0 4px;
    font-size: 9px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--border-dim);
  }
  .m-evt-history-divider {
    text-align: center;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 16px;
  }
  .m-evt-history-divider::before,
  .m-evt-history-divider::after { display: none; }

  .m-truncated {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-left: 8px;
    padding: 1px 5px;
    border: 1px solid var(--gold);
  }

  /* ── COMPOSE — a single unified terminal prompt. The textarea,
     the `>` glyph and the Send button share one bordered frame so
     it reads as ONE instrument, not 'input + button'. Focus the
     textarea and the whole frame lights up. ── */
  .mirror-compose {
    display: flex;
    align-items: stretch;
    /* Respect iOS home-indicator / left & right safe-area insets. */
    padding:
      14px calc(20px + env(safe-area-inset-right))
      calc(14px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    position: relative;
  }
  .mirror-compose.compose-hidden { display: none; }

  /* Inner 'frame' the textarea + button both live inside. */
  .mirror-compose-frame {
    display: flex;
    align-items: stretch;
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: border-color 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .mirror-compose-frame:focus-within {
    border-color: var(--text-accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 18px var(--accent-glow);
  }

  /* Left-rail prompt: small accent tick + `>` glyph, integrated into
     the frame's left edge rather than floating in the bar. */
  .mirror-compose-frame::before {
    content: ">";
    display: flex;
    align-items: flex-start;
    justify-content: center;
    width: 34px;
    padding-top: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text-accent);
    border-right: 1px solid var(--border);
    user-select: none;
    flex-shrink: 0;
  }
  .mirror-compose-frame:focus-within::before {
    background: var(--accent-ink);
  }

  .mirror-compose textarea {
    flex: 1;
    field-sizing: content;
    min-height: 46px;
    max-height: 50vh;
    resize: none;
    overflow-y: auto;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.55;
    padding: 11px 14px;
  }
  .mirror-compose textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
    letter-spacing: 0.2px;
  }
  .mirror-compose textarea:focus {
    outline: none;
    box-shadow: none;
  }

  /* Trailing cluster: keyboard hint + Send button, stacked so the
     hint reads 'Enter to send · Shift+Enter for newline' without
     bloating the button text itself. */
  .mirror-compose-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 12px 0 10px;
    border-left: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mirror-compose-hint {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1.3;
    text-align: right;
    white-space: nowrap;
  }
  .mirror-compose-hint kbd {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    padding: 1px 5px;
    border: 1px solid var(--border);
    margin: 0 2px;
    background: var(--bg-panel);
  }
  @media (max-width: 700px) {
    /* On narrow screens: suppress the 'send/newline' hint lines (they
       take too much room next to the button) — the mode toggle button
       is enough of a signal. */
    .mirror-compose-hint { display: none; }
  }

  /* On touch-primary devices (phones, tablets without a hardware
     keyboard) the Send button collapses to an icon-only tap target
     and the keyboard hint is suppressed (it's already hidden below
     700 px but belt-and-braces here for larger tablets in touch
     mode). Double-Enter (two presses within 500 ms) still works as
     a software-keyboard shortcut for users who prefer it. */
  .mirror-compose.is-touch .mirror-compose-hint { display: none; }
  .mirror-compose.is-touch .mirror-compose-actions {
    padding: 0 8px;
    gap: 0;
  }
  .mirror-compose.is-touch #mirror-compose-send {
    /* Icon-only: hide the "Transmit" text node, let the ::before ↵
       glyph carry the affordance. Bump the tap target to 44×44 to
       satisfy touch accessibility guidelines. */
    font-size: 0;
    min-width: 44px;
    width: 44px;
    height: 44px;
    padding: 0;
  }
  .mirror-compose.is-touch #mirror-compose-send::before {
    font-size: 22px;
    line-height: 1;
  }
  .mirror-compose.is-touch .mirror-compose-frame { flex: 1; }
  .mirror-compose.is-touch .mirror-compose-frame::before {
    /* Prompt rail stays but shrinks a little to reclaim tap-space. */
    width: 28px;
    padding-top: 11px;
    font-size: 13px;
  }
  /* iOS Safari auto-zooms the viewport whenever a focused input's
     font-size is under 16 px. Bump the textarea to 16 px on touch
     devices specifically — desktop keeps 13 px for density. */
  .mirror-compose.is-touch textarea {
    font-size: 16px;
    line-height: 1.3;
    padding: 6px 10px;
  }
  .mirror-compose.is-touch {
    padding:
      6px calc(10px + env(safe-area-inset-right))
      calc(6px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
  }
  .mirror-compose.is-touch .mirror-compose-frame::before { padding-top: 6px; }

  /* ── Slash-command autocomplete popover ─────────────────────────
     Floats above the compose textarea whenever the current
     first-line starts with '/'. Keyboard (arrows + tab/enter) on
     desktop; tap-to-select on touch devices. Respects the overall
     broadcast aesthetic: sharp corners, mono, accent-on-select. */
  .mirror-slash-popover {
    position: absolute;
    left: 20px;
    right: 20px;
    bottom: calc(100% + 6px);
    max-height: 260px;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--accent);
    box-shadow: 0 0 24px var(--accent-glow);
    z-index: 20;
    display: none;
  }
  .mirror-slash-popover.is-open { display: block; }
  .mirror-slash-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.06s, border-color 0.06s;
  }
  .mirror-slash-item:hover,
  .mirror-slash-item.is-active {
    background: var(--accent-ink);
    border-left-color: var(--text-accent);
  }
  .mirror-slash-name {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-accent);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .mirror-slash-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mirror-slash-source {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
    padding: 1px 6px;
    border: 1px solid var(--border);
  }
  .mirror-slash-empty {
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    font-style: italic;
  }
  @media (max-width: 700px) {
    /* Bigger tap targets + more room on mobile. */
    .mirror-slash-popover { left: 10px; right: 10px; max-height: 50vh; }
    .mirror-slash-item { padding: 12px 14px; }
    .mirror-slash-name { font-size: 13px; }
    .mirror-slash-desc { font-size: 12.5px; }
    .mirror-slash-source { display: none; }
  }

  #mirror-compose-send {
    background: transparent;
    color: var(--text-accent);
    border: 1px solid var(--accent);
    padding: 0 16px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 88px;
    height: 34px;
    align-self: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.1s, color 0.1s;
  }
  #mirror-compose-send::before {
    content: "↵";
    font-size: 13px;
    font-weight: 400;
    line-height: 1;
  }
  #mirror-compose-send:hover { background: var(--accent); color: var(--on-accent); }
  #mirror-compose-send:active { background: var(--accent-dim); }
  #mirror-compose-send:disabled {
    color: var(--text-muted);
    border-color: var(--border);
    cursor: default;
  }
  #mirror-compose-send:disabled:hover { background: transparent; color: var(--text-muted); }

  .mirror-compose-err {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-accent);
    padding: 6px 20px;
    min-height: 22px;
    letter-spacing: 0.3px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }
  .mirror-compose-err.is-notice { color: var(--green); }
  .mirror-compose-err:empty { display: none; }

  /* ── Attach button inside the compose frame ────────────────────
     Narrow column between the textarea and the Transmit actions.
     Stretches to the full frame height so when the textarea grows
     to multiple rows the button grows with it (single unified
     instrument — same trick as the `>` left rail). Visible on both
     desktop and touch. */
  .mirror-attach-btn {
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-left: 1px solid var(--border);
    padding: 0;
    width: 22px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, background 0.1s;
  }
  .mirror-attach-btn:hover {
    color: var(--text-accent);
    background: var(--accent-ink);
  }
  .mirror-attach-btn:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: -2px;
  }
  .mirror-attach-btn.is-uploading {
    color: var(--text-accent);
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  .mirror-attach-btn svg {
    width: 14px;
    height: 14px;
    display: block;
  }
  /* Touch: slightly wider for a bigger tap target. */
  .mirror-compose.is-touch .mirror-attach-btn {
    width: 28px;
  }
  .mirror-compose.is-touch .mirror-attach-btn svg {
    width: 16px;
    height: 16px;
  }
  /* Drag-over highlight on the compose frame itself. */
  .mirror-compose-frame.is-dragover {
    border-color: var(--text-accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-glow);
  }
  .mirror-compose-frame.is-dragover::after {
    content: "Drop to upload";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-accent);
    background: var(--bg);
    opacity: 0.9;
    pointer-events: none;
  }

  /* Stop button chrome is shared with #mirror-tasks-btn above. */
  .mirror-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    padding: 6px 20px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .mirror-status.error { color: var(--text-accent); }
  .mirror-status:empty { padding: 0; }

  /* Jump-to-latest button: floats above the compose box whenever the user
     has scrolled up so the feed isn't following new content. Fixed
     position so it clears the compose box on any screen size and
     respects the iOS safe-area inset. Hidden in teardown. */
  .mirror-jump-btn {
    position: fixed;
    bottom: calc(90px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    z-index: 200;
    display: none;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    background: var(--accent);
    color: var(--on-accent);
    border: none;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.6px;
    cursor: pointer;
    box-shadow: 0 2px 16px rgba(0,0,0,0.55);
    transition: opacity 0.15s;
  }
  .mirror-jump-btn.is-visible { display: flex; }
  .mirror-jump-btn:hover { opacity: 0.85; }

  /* ── Permission prompt banner ────────────────────────────────
     Appears when Claude Code's Notification hook fires with a
     permission-shaped message. Shows the text + one-key inject
     buttons so the user can answer the modal without hopping to
     the terminal. */
  .cn-prompt-banner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 14px;
    padding: 10px 20px;
    background: var(--bg-panel);
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    box-shadow: 0 0 18px rgba(234, 179, 8, 0.2);
    flex-shrink: 0;
  }
  .cn-prompt-banner[hidden] { display: none; }
  .cn-prompt-text {
    flex: 1 1 60%;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.45;
    color: var(--text);
    overflow-wrap: anywhere;
    min-width: 0;
  }
  .cn-prompt-text::before {
    content: "⚠ ";
    color: var(--gold);
    font-weight: 700;
    margin-right: 4px;
  }
  .cn-prompt-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cn-prompt-actions .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    min-width: 42px;
    --bs-btn-color: var(--gold);
    --bs-btn-border-color: var(--gold);
    --bs-btn-hover-color: var(--on-accent);
    --bs-btn-hover-bg: var(--gold);
    --bs-btn-hover-border-color: var(--gold);
  }
  .cn-prompt-dismiss {
    filter: invert(1) grayscale(100%) brightness(2);
    opacity: 0.65;
    margin-left: 4px;
  }
  .cn-prompt-dismiss:hover { opacity: 1; }
  @media (max-width: 767.98px) {
    .cn-prompt-banner { padding: 8px 12px; }
    .cn-prompt-text { flex-basis: 100%; font-size: 11.5px; }
    .cn-prompt-actions .btn { min-width: 36px; font-size: 10px; }
  }

  /* Thinking ghost row: sits between the transcript and compose bar.
     Scraped straight from the TUI's `✻ Brewed for Ns` line by the
     mirror-agent, so it shows the real elapsed time. Hidden when the
     session is idle. */
  .mirror-thinking {
    display: none;
    padding: 6px 20px;
    background: var(--bg-panel);
    border-top: 1px dashed var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-accent);
    letter-spacing: 0.4px;
    animation: live-pulse 2.4s ease-in-out infinite;
  }
  .mirror-thinking.is-active { display: block; }


  /* ── Mirror sessions sidebar list — 'active broadcasts'. ── */
  .mirror-list-heading {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 14px 14px 6px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
    position: relative;
  }
  .mirror-list-heading::before {
    content: "";
    position: absolute;
    left: 0; top: 16px;
    width: 3px; height: 10px;
    background: var(--accent);
  }
  .mirror-list-empty {
    padding: 6px 14px 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    font-style: italic;
  }
  .mirror-list-item {
    display: block;
    padding: 10px 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    border-left: 2px solid transparent;
    border-bottom: 1px solid var(--border-dim);
    transition: background 0.08s, border-color 0.08s;
  }
  .mirror-list-item:hover {
    background: var(--bg-hover);
    border-left-color: var(--text-accent);
  }
  .mirror-list-item .mli-owner {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .mirror-list-item .mli-sid {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .mirror-list-item .mli-cwd {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mirror-list-item .mli-meta {
    display: flex;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 5px;
  }
  .mirror-list-item .mli-watchers {
    color: var(--text-accent);
    font-weight: 700;
  }

  /* ── Markdown — editorial body text. ── */
  .md-body { font-size: 13.5px; line-height: 1.6; color: var(--text); }
  .md-body > *:first-child { margin-top: 0; }
  .md-body > *:last-child { margin-bottom: 0; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
    font-weight: 600;
    color: var(--text);
    margin: 18px 0 6px;
    letter-spacing: -0.2px;
  }
  .md-body h1 { font-size: 18px; }
  .md-body h2 { font-size: 15px; }
  .md-body h3 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; font-weight: 700; }
  .md-body h4, .md-body h5, .md-body h6 { font-size: 13px; color: var(--text-dim); }
  .md-body p { margin: 7px 0; }
  .md-body ul, .md-body ol { margin: 6px 0 6px 22px; padding: 0; }
  .md-body li { margin: 3px 0; }
  .md-body li > p { margin: 0; }
  .md-body code {
    background: var(--bg-code);
    border: 1px solid var(--border-dim);
    padding: 1px 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-accent);
  }
  .md-body pre {
    background: var(--bg-code);
    padding: 12px 14px;
    margin: 10px 0;
    border-left: 2px solid var(--accent);
    border-right: 1px solid var(--border-dim);
    border-top: 1px solid var(--border-dim);
    border-bottom: 1px solid var(--border-dim);
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.55;
  }
  .md-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
    border: none;
  }
  .md-body blockquote {
    border-left: 2px solid var(--gold);
    padding: 4px 0 4px 14px;
    margin: 8px 0;
    color: var(--text-dim);
    font-style: italic;
  }
  .md-body strong { font-weight: 600; color: var(--text); }
  .md-body em { font-style: italic; }
  .md-body a {
    color: var(--text-accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-dim);
    transition: border-color 0.1s;
  }
  .md-body a:hover { border-bottom-color: var(--text-accent); }
  .md-body hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 16px 0;
    position: relative;
  }
  .md-body hr::before {
    content: "▪ ▪ ▪";
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    padding: 0 10px;
    color: var(--text-accent);
    font-size: 8px;
    letter-spacing: 4px;
  }
  .md-body table {
    border-collapse: collapse; margin: 10px 0;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .md-body th, .md-body td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }
  .md-body th {
    background: var(--bg-panel);
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    font-size: 10px;
    color: var(--text-accent);
  }

  /* ── TodoWrite ── */
  .m-todo {
    list-style: none;
    padding: 6px 0 0 0;
    margin: 0;
    font-size: 12.5px;
  }
  .m-todo li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 4px 0;
    color: var(--text);
  }
  .m-todo .m-checkbox {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px; height: 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    margin-top: 2px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1;
    font-weight: 700;
  }
  .m-todo .m-checkbox.checked {
    background: var(--accent);
    border-color: var(--text-accent);
    color: var(--on-accent);
  }
  .m-todo .m-checkbox.in-progress {
    border-color: var(--gold);
    background: repeating-linear-gradient(
      45deg, var(--bg), var(--bg) 2px,
      rgba(212, 160, 77, 0.35) 2px, rgba(212, 160, 77, 0.35) 4px
    );
  }
  .m-todo li.completed .m-todo-text { text-decoration: line-through; opacity: 0.55; }
  .m-todo li.in_progress .m-todo-text { color: var(--gold); font-weight: 500; }
  .m-todo .m-todo-text { flex: 1; word-break: break-word; }

  /* ── Task tool family ── */
  .m-task-list-block { margin-top: 8px; }
  .m-task-line {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    padding: 2px 0;
  }
  .m-task-glyph {
    flex-shrink: 0; width: 16px; text-align: center;
    font-size: 13px; line-height: 1.2;
  }
  .m-task-subject { flex: 1; word-break: break-word; }
  .m-task-line.m-task-pending .m-task-glyph { color: var(--text-muted); }
  .m-task-line.m-task-pending .m-task-subject { color: var(--text); }
  .m-task-line.m-task-in_progress .m-task-glyph { color: var(--gold); }
  .m-task-line.m-task-in_progress .m-task-subject { color: var(--text); font-weight: 600; }
  .m-task-line.m-task-completed .m-task-glyph { color: var(--text-accent); }
  .m-task-line.m-task-completed .m-task-subject {
    color: var(--text-muted); text-decoration: line-through; opacity: 0.85;
  }
  .m-task-line.m-task-deleted .m-task-glyph { color: var(--text-accent); }
  .m-task-line.m-task-deleted .m-task-subject {
    color: var(--text-dim); text-decoration: line-through;
  }
  .m-task-activity {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-muted); padding-left: 26px;
    font-style: italic; margin-top: 2px;
    letter-spacing: 0.2px;
  }
  /* ── ANIMATIONS ─────────────────────────────────────────────── */

  /* New-event flash: each event arrives with a brief accent-red
     background tint that fades to transparent. Gives the feed a
     sense of live activity without being gratuitous. */
  @keyframes event-flash {
    0% {
      background-color: var(--accent-ink);
      border-left-color: var(--text-accent);
    }
    100% {
      background-color: transparent;
    }
  }

  /* Live "on air" pulse — for the live indicator dot in the header
     and mirror-header. Two-stage pulse, feels mechanical/broadcast
     rather than UI-ornamental. */
  @keyframes live-pulse {
    0%, 60%, 100% { opacity: 1; }
    30% { opacity: 0.25; }
  }

  /* Brief double-blink for session-row dots when the agent is waiting
     on user input. Distinct rhythm from live-pulse so the meaning is
     "needs your attention" rather than "stream is live". The dot stays
     mostly solid (~70% of the cycle) and dips twice in quick
     succession, then rests.

     Infinite by design: renderAgents() rebuilds the sidebar via
     innerHTML on every mirror:activity, which would restart any
     iteration-capped animation across ALL sessions whenever ANY
     session emits a frame — making a finite count behave erratically.
     Letting it run continuously keeps the visual urgency until the
     transition back to busy happens naturally. */
  @keyframes dot-attention {
    0%, 14%, 28%, 100% { opacity: 1; }
    7%, 21% { opacity: 0.2; }
  }
  .agent-dot.online.awaiting {
    animation: dot-attention 2.4s ease-in-out infinite;
  }

  /* ── Misc ── */
  /* Panel-body scrollable area inside sidebar/teams panels. */
  .panel-body { padding: 0; }

  /* Text selection — use the accent so selection feels 'on brand'. */
  ::selection { background: var(--accent); color: var(--on-accent); }

  /* Prefers-reduced-motion: disable the two animations above. */
  @media (prefers-reduced-motion: reduce) {
    .m-evt { animation: none; }
    header h1::before, #mirror-conn::before { animation: none; }
    .agent-dot.online.awaiting { animation: none; }
  }

  /* ── Unified shell ────────────────────────────────────────────────
     Bootstrap's offcanvas + list-group + navbar, rebound to this app's
     theme vars. Bindings live at :root (dark) and body.theme-light so
     every Bootstrap surface swaps when the theme toggles. */

  /* Shared bindings — apply at both themes. */
  :root,
  body.theme-light {
    --bs-body-bg: var(--bg);
    --bs-body-color: var(--text);
    --bs-body-font-family: var(--font-sans);
    --bs-font-monospace: var(--font-mono);
    --bs-border-color: var(--border);
    --bs-border-color-translucent: var(--border);
    --bs-secondary-bg: var(--bg-panel);
    --bs-tertiary-bg: var(--bg-panel);
    --bs-secondary-color: var(--text-dim);
    --bs-emphasis-color: var(--text);
    --bs-link-color: var(--text-accent);
    --bs-link-hover-color: var(--accent-dim);
    --bs-offcanvas-bg: var(--bg-panel);
    --bs-offcanvas-color: var(--text);
    --bs-offcanvas-border-color: var(--border);
    --bs-offcanvas-width: 260px;
    --bs-list-group-bg: transparent;
    --bs-list-group-color: var(--text);
    --bs-list-group-border-color: var(--border-dim);
    --bs-list-group-action-color: var(--text);
    --bs-list-group-action-hover-color: var(--text);
    --bs-list-group-action-hover-bg: var(--bg-hover);
    --bs-list-group-action-active-color: var(--text);
    --bs-list-group-action-active-bg: var(--accent-ink);
    --bs-navbar-color: var(--text-dim);
    --bs-navbar-hover-color: var(--text);
    --bs-navbar-active-color: var(--text);
    --bs-navbar-brand-color: var(--text);
    --bs-navbar-brand-hover-color: var(--text);
    --bs-navbar-toggler-border-color: var(--border);
    --bs-btn-close-color: var(--text);
    --bs-btn-close-filter: none;
  }

  /* Respect Bootstrap's reset but keep our app full-viewport. */
  html, body { height: 100%; }
  /* Lock horizontal scroll/over-scroll. `overflow-x: clip` hides overflow
     without creating a scroll container (so children still scroll their
     own y-axis), and `overscroll-behavior-x` kills the iOS/Chrome rubber-
     band horizontal pan on mobile. */
  html, body {
    overflow-x: clip;
    overscroll-behavior-x: none;
    max-width: 100vw;
  }
  body { overflow-y: hidden; }

  /* Navbar: panel background, mono chrome type, brand in sans. */
  nav[data-cn-navbar] {
    flex-shrink: 0;
    background-color: var(--bg-panel) !important;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  /* Broadcast callsign: mono + uppercase with a pulsing accent dot. */
  nav[data-cn-navbar] .navbar-brand {
    font-family: var(--font-mono);
    color: var(--text);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  nav[data-cn-navbar] .navbar-brand::before {
    content: "";
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: live-pulse 2.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  nav[data-cn-navbar] .btn-outline-secondary {
    --bs-btn-color: var(--text-dim);
    --bs-btn-border-color: var(--border);
    --bs-btn-hover-color: var(--text);
    --bs-btn-hover-bg: var(--bg-hover);
    --bs-btn-hover-border-color: var(--border);
    --bs-btn-active-color: var(--text);
    --bs-btn-active-bg: var(--bg-hover);
    --bs-btn-active-border-color: var(--border);
  }
  nav[data-cn-navbar] .badge {
    background-color: var(--bg-hover);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ── App shell layout ──
     Flex row: sidebar column + main column. On md+ the sidebar is an
     inline column (offcanvas-md behaviour); below md it's an overlay.
     Hamburger toggles .sidebar-collapsed on the shell on md+. */
  .cn-shell {
    display: flex;
    flex: 1 1 auto;
    min-height: 0;
    height: calc(100vh - 48px); /* navbar height */
  }

  #sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    color: var(--text);
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 768px) {
    /* Inline column on desktop; offcanvas-md strips overlay chrome. */
    #sidebar.offcanvas-md { position: static; transform: none; visibility: visible; }
    .cn-shell.sidebar-collapsed #sidebar { display: none; }
  }
  @media (max-width: 767.98px) {
    /* Below md: behave as offcanvas overlay (Bootstrap handles it). */
    #sidebar { width: 82vw; max-width: 320px; }
  }

  .cn-sidebar-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .cn-sidebar-body { flex: 1 1 auto; overflow-y: auto; min-height: 0; }

  #app-main {
    flex: 1 1 auto;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Contextual header — one row per view mode. */
  .cn-main-header {
    flex-shrink: 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }
  .cn-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 16px;
    min-height: 44px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }
  .cn-header-title {
    font-weight: 700;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .cn-header-sub { color: var(--text-dim); text-transform: none; letter-spacing: 0; }
  .cn-main-view { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
  .cn-view { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }

  /* Message log — live tail. */
  .cn-message-log {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 4px 0 16px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .cn-log-empty { color: var(--text-muted); padding: 14px 18px; font-family: var(--font-mono); font-size: 12px; }
  .cn-log-entry {
    padding: 6px 18px;
    border-left: 2px solid transparent;
    border-bottom: 1px solid var(--border-dim);
    animation: event-flash 1.2s ease-out;
  }
  .cn-log-meta {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }
  .cn-log-route { color: var(--text-dim); }
  .cn-log-time { color: var(--text-muted); }
  .cn-log-content { color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .cn-log-broadcast { border-left-color: var(--gold); }
  .cn-log-team { border-left-color: var(--cyan); }

  /* Sidebar rows — unified list-group style. */
  #agent-list .list-group-item {
    background: transparent;
    border-left: 0;
    border-right: 0;
    border-top: 0;
    border-bottom: 1px solid var(--border-dim);
    border-radius: 0;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    line-height: 1.35;
  }
  #agent-list .list-group-item:hover { background: var(--bg-hover); color: var(--text); }
  #agent-list .list-group-item.active {
    background: var(--accent-ink);
    border-bottom-color: var(--text-accent);
    color: var(--text);
    font-weight: 600;
  }
  #agent-list .list-group-item.active::before {
    content: "";
    display: block;
    width: 3px;
    align-self: stretch;
    background: var(--accent);
    margin: -8px 0 -8px -14px;
    margin-right: 6px;
  }
  /* Rows without an active mirror: show them but make clear they're not
     clickable. Tooltip explains why. */
  #agent-list .list-group-item.is-inactive {
    cursor: default;
    color: var(--text-muted);
  }
  #agent-list .list-group-item.is-inactive:hover { background: transparent; color: var(--text-muted); }
  #agent-list .list-group-item .row-hint {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.7;
  }
  .cn-home-glyph { color: var(--text-dim); font-size: 11px; }

  /* Host grouping — host row + indented session rows + ghost launches. */
  .cn-host-header {
    padding: 10px 14px 4px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-top: 1px solid var(--border-dim);
  }
  .cn-host-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--text);
    border-top: 1px solid var(--border-dim);
  }
  .cn-host-row.is-offline { color: var(--text-muted); }
  .cn-host-row .cn-host-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cn-launch-btn {
    background: transparent;
    color: var(--text-accent);
    border: 1px solid var(--accent-dim);
    padding: 2px 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  .cn-launch-btn:hover { background: var(--accent-ink); }
  .cn-launch-btn:disabled { opacity: 0.4; cursor: default; }
  .cn-host-child { padding-left: 22px !important; }
  .cn-session-row {
    align-items: flex-start !important;
    padding-top: 6px !important;
    padding-bottom: 6px !important;
  }
  .cn-session-row .agent-dot { margin-top: 4px; }
  .cn-session-body { flex: 1; min-width: 0; line-height: 1.3; }
  .cn-session-title { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cn-session-title .mli-sid { color: var(--text-muted); font-weight: 400; }
  .cn-session-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cn-session-cwd { color: var(--text-dim); }
  .cn-session-age { color: var(--text-muted); }
  .cn-ghost-launch {
    color: var(--text-dim);
    font-style: italic;
    animation: event-flash 1.6s ease-in-out infinite;
  }

  /* Launch modal — custom (not Bootstrap's) so we can keep the popover
     interaction compact on mobile. */
  .cn-launch-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 1060;
    padding-top: 10vh;
  }
  .cn-launch-modal.is-open { display: flex; }
  .cn-launch-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    width: min(560px, calc(100vw - 24px));
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .cn-launch-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cn-launch-head .cn-launch-title { flex: 1; font-weight: 600; color: var(--text); letter-spacing: 0.4px; }
  .cn-launch-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
    padding: 0 8px;
    cursor: pointer;
  }
  .cn-launch-close:hover { color: var(--text-accent); border-color: var(--text-accent); }
  .cn-launch-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }
  .cn-launch-input {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }
  .cn-launch-input:focus { border-color: var(--text-accent); box-shadow: 0 0 0 1px var(--accent); }
  .cn-launch-suggestions {
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid var(--border-dim);
  }
  .cn-launch-sugg-section {
    padding: 4px 12px;
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--bg-code);
  }
  .cn-launch-sugg-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    cursor: pointer;
    color: var(--text);
    border-bottom: 1px solid var(--border-dim);
  }

  .cn-launch-sugg-item .sugg-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .cn-launch-error { color: var(--text-accent); font-size: 11px; min-height: 1em; }
  @media (max-width: 767.98px) {
    .cn-launch-panel { width: 100vw; max-height: 90vh; }
    .cn-launch-modal { padding-top: 4vh; }
    .cn-launch-sugg-item { padding: 12px; min-height: 44px; }
  }

  /* Mirror view inside #main-view. */
  #mirror-view .mirror-transcript {
    flex: 1 1 auto;
    overflow-y: auto;
    /* No horizontal padding — events own their own left gutter for
       the timestamp + tick-rail (.m-evt::before / ::after at
       left:10/101px). Adding padding here shifts the events but not
       the .mirror-transcript::before rail, so the rail cuts through
       the right edge of each timestamp. */
    padding: 8px 0;
  }
  /* Mirror-header stop/tasks shared sizing — see shared rule below. */
  #mirror-conn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  #mirror-conn.is-live { color: var(--text-accent); animation: live-pulse 1.4s ease-in-out infinite; }
  #mirror-conn.is-error { color: var(--text-accent); }

  /* ── Task panel ───────────────────────────────────────────────
     Bootstrap's .collapse handles the show/hide and transition;
     we only supply the chrome that matches the rest of the mirror
     UI (panel background, accent border, mono subheader text). */
  #mirror-tasks-btn,
  #mirror-stop-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 108px;
  }
  #mirror-tasks-btn .cn-tasks-running {
    color: var(--gold);
    margin-left: 6px;
  }
  /* Chevron indicates expanded/collapsed. Rotates via aria-expanded
     which Bootstrap's Collapse keeps in sync. */
  #mirror-tasks-btn::after {
    content: "";
    display: inline-block;
    margin-left: 6px;
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid currentColor;
    transition: transform 0.18s ease;
    transform-origin: 50% 40%;
  }
  #mirror-tasks-btn[aria-expanded="true"]::after {
    transform: rotate(180deg);
  }
  .cn-tasks-panel {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--accent);
    /* Grows with the number of tasks up to ~1/3 screen; beyond that
       the list scrolls internally so the composer stays on screen. */
    max-height: 33vh;
    overflow-y: auto;
    padding: 0 20px 10px;
    /* .cn-view is a flex column. Without flex-shrink: 0 the transcript
       can squeeze the panel below its natural content size on tight
       mobile viewports — which looks like the panel is half a row tall.
       Pin it to its content height (up to max-height). */
    flex-shrink: 0;
  }
  .cn-tasks-panel .cn-tasks-head {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 0 4px;
    border-bottom: 1px dashed var(--border-dim);
    margin-bottom: 4px;
  }
  .cn-tasks-panel .m-task-line { padding: 3px 0; font-size: 12px; }
  .cn-tasks-panel .m-task-activity {
    padding-left: 26px; margin-top: 0; font-size: 10.5px;
  }

  /* Offcanvas overlay (<md) gets a backdrop dimmer. */
  .offcanvas-backdrop { background-color: rgba(0, 0, 0, 0.55); }

  /* Mobile polish (<md).
     Let the mirror header wrap instead of overflowing, keep the Stop
     button on the first row, and tighten the navbar so the hamburger,
     brand, agent count and theme toggle all fit at 375px. */
  @media (max-width: 767.98px) {

    nav[data-cn-navbar] .badge { font-size: 10px; }

  }
