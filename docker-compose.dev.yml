services:
  hub:
    build: .
    ports:
      - "4815:4815"
    environment:
      - CLAUDE_NET_PORT=4815
      - CLAUDE_NET_UPLOADS_DIR=/data/uploads
      - CLAUDE_NET_VERSION=${GIT_COMMIT:-dev}
    volumes:
      - ./src:/app/src
      - cn-uploads-dev:/data/uploads
    restart: unless-stopped

volumes:
  cn-uploads-dev:
