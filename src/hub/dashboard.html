<script>
(function() {
  'use strict';

  // --- Theme toggle (wires every [data-theme-toggle] on the page).
  // The initial class is applied by the inline script in <body>, so
  // this just handles clicks + label sync. ---
  var THEME_KEY = 'claude-net.mirror.theme';
  function syncThemeLabel() {
    var light = document.body.classList.contains('theme-light');
    var label = light ? '◑ LIGHT' : '◐ DARK';
    var btns = document.querySelectorAll('[data-theme-toggle]');
    for (var i = 0; i < btns.length; i++) btns[i].textContent = label;
  }
  function toggleTheme() {
    var light = document.body.classList.toggle('theme-light');
    try { localStorage.setItem(THEME_KEY, light ? 'light' : 'dark'); } catch (e) {}
    syncThemeLabel();
  }
  document.addEventListener('click', function(e) {
    if (e.target.closest && e.target.closest('[data-theme-toggle]')) toggleTheme();
  });
  syncThemeLabel();

  // --- Dashboard state ---
  // Unified sidebar: sessions are grouped under the host they run on.
  // Selection drives the main pane via window.location.hash (#agent=<sid>).
  const agents = new Map(); // fullName -> { name, fullName, status, mirrorSid, cwd }
  const mirrorBySid = new Map(); // sid -> { sid, owner_agent, cwd, last_event_at, ... }
  const hosts = new Map(); // host_id -> { user, hostname, home, recent_cwds, allow_dangerous_skip, online, connected_at }
  const pendingLaunches = []; // { hostId, launchKey, startedAt } — ghost rows replaced by real sessions
  const messageLogBuffer = []; // { from, to, type, content, routeType, timestamp }
  const MAX_LOG_ENTRIES = 500;
  const RECONNECT_INTERVAL = 3000;

  // --- DOM refs ---
  const agentListEl = document.getElementById('agent-list');
  const agentCountEl = document.getElementById('agent-count');
  const logAgentCountEl = document.getElementById('log-agent-count');
  const connDot = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const messageLogEl = document.getElementById('message-log');
  const messageLogView = document.getElementById('message-log-view');
  const mirrorView = document.getElementById('mirror-view');
  const headerLog = document.querySelector('[data-header-mode="log"]');
  const headerMirror = document.querySelector('[data-header-mode="mirror"]');

  // --- WebSocket ---
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/dashboard');

    ws.onopen = function() {
      setConnected(true);
      if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
      refreshMirrorSessions();
      refreshAgents();
    };

    ws.onmessage = function(e) {
      var event;
      try { event = JSON.parse(e.data); } catch { return; }
      handleEvent(event);
    };

    ws.onclose = function() {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = function() {
      // onclose will fire after this
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        connect();
      }
    }, RECONNECT_INTERVAL);
  }

  function setConnected(connected) {
    connDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
    connLabel.textContent = connected ? 'connected' : 'disconnected';
  }

  // --- Event handling ---
  function handleEvent(event) {
    switch (event.event) {
      case 'agent:connected':
        upsertAgent({
          name: event.name,
          fullName: event.full_name,
          status: 'online'
        });
        renderAgents();
        break;

      case 'agent:disconnected':
        agents.delete(event.full_name);
        renderAgents();
        break;

      case 'message:routed':
      case 'dashboard:message':
        addLogMessage(event);
        break;

      case 'mirror:session_started':
        refreshMirrorSessions();
        break;

      case 'mirror:session_ended': {
        mirrorBySid.delete(event.sid);
        // An agent can own multiple mirror sessions (fork-sessions in
        // the same cwd). If the one that ended was just the last-wins
        // binding, re-attach to whichever of their remaining sessions
        // has the most recent activity rather than nulling the agent.
        for (const ag of agents.values()) {
          if (ag.mirrorSid !== event.sid) continue;
          var replacement = null;
          var replacementTs = '';
          for (var m of mirrorBySid.values()) {
            if (m.owner_agent !== ag.fullName) continue;
            var ts = m.last_event_at || '';
            if (!replacement || ts > replacementTs) {
              replacement = m;
              replacementTs = ts;
            }
          }
          if (replacement) {
            ag.mirrorSid = replacement.sid;
            ag.cwd = replacement.cwd;
          } else {
            ag.mirrorSid = null;
            ag.cwd = null;
          }
        }
        renderAgents();
        if (activeAgentSid === event.sid) {
          // The mirror we're viewing vanished — fall back to the log.
          window.location.hash = '';
        }
        break;
      }

      case 'host:connected': {
        hosts.set(event.host_id, {
          host_id: event.host_id,
          user: event.user,
          hostname: event.hostname,
          home: event.home,
          recent_cwds: Array.isArray(event.recent_cwds) ? event.recent_cwds : [],
          allow_dangerous_skip: !!event.allow_dangerous_skip,
          online: true,
          connected_at: event.connected_at,
        });
        renderAgents();
        break;
      }

      case 'host:disconnected': {
        var h = hosts.get(event.host_id);
        if (h) { h.online = false; renderAgents(); }
        break;
      }

      case 'mirror:event':
      case 'mirror:activity': {
        // Lightweight ping fired by the hub for every recorded mirror event
        // (not just ones the dashboard is watching live). Bump last_event_at
        // + re-render so the most-active session floats to the top of the
        // sidebar regardless of where the user is interacting from.
        const entry = mirrorBySid.get(event.sid);
        if (entry) {
          entry.last_event_at = new Date(event.ts || Date.now()).toISOString();
          if (event.activity_state) entry.activity_state = event.activity_state;
          renderAgents();
        }
        break;
      }

      case 'mirror:owner_renamed': {
        // MCP plugin renamed itself; rewrite ownerAgent on every affected
        // mirror session and re-bind the agents Map so the sidebar shows
        // the new label without a full refresh.
        var oldOwner = event.old_owner;
        var newOwner = event.new_owner;
        if (!oldOwner || !newOwner || oldOwner === newOwner) break;
        var sids = Array.isArray(event.sids) ? event.sids : [];
        for (var i = 0; i < sids.length; i++) {
          var m = mirrorBySid.get(sids[i]);
          if (m) m.owner_agent = newOwner;
        }
        // Re-bind agent→mirror mapping: the old owner loses its binding,
        // the new one picks up whichever session has the most recent
        // activity.
        var oldAg = agents.get(oldOwner);
        if (oldAg) { oldAg.mirrorSid = null; oldAg.cwd = null; }
        var newAg = agents.get(newOwner);
        if (newAg) {
          var best = null;
          var bestTs = '';
          mirrorBySid.forEach(function(sess) {
            if (sess.owner_agent !== newOwner || sess.closed_at) return;
            var ts = sess.last_event_at || '';
            if (!best || ts > bestTs) { best = sess; bestTs = ts; }
          });
          if (best) { newAg.mirrorSid = best.sid; newAg.cwd = best.cwd; }
        }
        renderAgents();
        break;
      }
    }

    updateCounts();
  }

  function upsertAgent(patch) {
    const existing = agents.get(patch.fullName) || {};
    agents.set(patch.fullName, Object.assign({}, existing, patch));
  }

  function refreshAgents() {
    fetch('/api/agents')
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(list) {
        if (!Array.isArray(list)) return;
        agents.clear();
        for (var i = 0; i < list.length; i++) {
          var a = list[i];
          upsertAgent({
            name: a.shortName || a.fullName,
            fullName: a.fullName,
            status: a.status || 'online',
          });
        }
        // Merge in mirror state we already know about.
        for (const entry of mirrorBySid.values()) {
          const ag = agents.get(entry.owner_agent);
          if (ag) { ag.mirrorSid = entry.sid; ag.cwd = entry.cwd; }
        }
        renderAgents();
        updateCounts();
      })
      .catch(function() {});
  }

  // --- Mirror sessions (feed sidebar state) ---
  // When an agent owns more than one mirror (fork-sessions), bind to the
  // one with the most recent activity — closed sessions have old or
  // null last_event_at so they lose the tie-break.
  function refreshMirrorSessions() {
    fetch('/api/mirror/sessions/all')
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(list) {
        mirrorBySid.clear();
        for (const ag of agents.values()) { ag.mirrorSid = null; ag.cwd = null; }
        if (!Array.isArray(list)) { renderAgents(); return; }
        // Index mirrors into mirrorBySid + register placeholder agents.
        // Skip closed sessions — they're retained briefly on the hub
        // but shouldn't occupy a sidebar slot.
        var liveByOwner = new Map();
        for (var i = 0; i < list.length; i++) {
          var e = list[i];
          mirrorBySid.set(e.sid, e);
          if (e.closed_at) continue;
          if (!agents.has(e.owner_agent)) {
            upsertAgent({
              name: e.owner_agent,
              fullName: e.owner_agent,
              status: 'online',
            });
          }
          var existing = liveByOwner.get(e.owner_agent);
          var existingTs = existing ? (existing.last_event_at || '') : '';
          var candTs = e.last_event_at || '';
          if (!existing || candTs > existingTs) liveByOwner.set(e.owner_agent, e);
        }
        liveByOwner.forEach(function(e, ownerAgent) {
          var ag = agents.get(ownerAgent);
          if (ag) { ag.mirrorSid = e.sid; ag.cwd = e.cwd; }
        });
        renderAgents();
      })
      .catch(function() { /* ignore */ });
  }

  // --- Render agents (unified sidebar, grouped by host) ---
  //
  // Structure:
  //   - "Message log" home row (always first)
  //   - For each online host: host-row with + launch button, sessions below
  //   - Sessions whose host isn't in `hosts` appear under an "Other" group
  //     (covers dashboard@hub and any agent whose daemon hasn't opened
  //     its /ws/host channel yet)
  //   - Offline hosts at the bottom, dimmed, launch button disabled
  function hostIdForAgent(fullName) {
    // agent fullName format: session:user@host  →  host_id = user@host
    var m = String(fullName || '').match(/:(.+@[^@]+)$/);
    return m ? m[1] : null;
  }

  // Rows are keyed off mirror sessions (one row per sid). MCP agents
  // that have no mirror session (messaging-only registrations) get an
  // extra row at the end of their host group. This handles the case
  // where several claude processes in the same cwd share one
  // owner_agent — each session gets its own row regardless.
  function renderAgents() {
    // Bucket mirror sessions by host (derived from owner_agent's user@host
    // suffix). Skip closed sessions.
    var sessionsByHost = new Map();
    var sessionOrphans = [];
    mirrorBySid.forEach(function(sess) {
      if (sess.closed_at) return;
      var hid = hostIdForAgent(sess.owner_agent);
      var target = hid && hosts.has(hid) ? sessionsByHost : null;
      if (target) {
        if (!sessionsByHost.has(hid)) sessionsByHost.set(hid, []);
        sessionsByHost.get(hid).push(sess);
      } else {
        sessionOrphans.push(sess);
      }
    });

    // MCP agents that aren't the owner of any live mirror session —
    // these are messaging-only registrations. Render at the tail of
    // their host group (or the Other group if host unknown).
    var agentsWithMirror = new Set();
    mirrorBySid.forEach(function(sess) {
      if (!sess.closed_at) agentsWithMirror.add(sess.owner_agent);
    });
    var mcpByHost = new Map();
    var mcpOrphans = [];
    agents.forEach(function(ag) {
      if (agentsWithMirror.has(ag.fullName)) return;
      var hid = hostIdForAgent(ag.fullName);
      if (hid && hosts.has(hid)) {
        if (!mcpByHost.has(hid)) mcpByHost.set(hid, []);
        mcpByHost.get(hid).push(ag);
      } else {
        mcpOrphans.push(ag);
      }
    });

    // Within each host, sort sessions by last_event_at DESC (busiest first),
    // then by sid so ordering is stable.
    var sessionSort = function(a, b) {
      var ea = a.last_event_at || '', eb = b.last_event_at || '';
      if (ea !== eb) return eb.localeCompare(ea);
      return (a.sid || '').localeCompare(b.sid || '');
    };
    sessionsByHost.forEach(function(list) { list.sort(sessionSort); });
    sessionOrphans.sort(sessionSort);
    var mcpSort = function(a, b) {
      if (a.status !== b.status) return a.status === 'online' ? -1 : 1;
      return a.fullName.localeCompare(b.fullName);
    };
    mcpByHost.forEach(function(list) { list.sort(mcpSort); });
    mcpOrphans.sort(mcpSort);

    // Host ordering: online first, then by their busiest session's
    // last_event_at DESC, then alphabetical.
    var hostIds = Array.from(hosts.keys()).sort(function(a, b) {
      var ha = hosts.get(a), hb = hosts.get(b);
      if (ha.online !== hb.online) return ha.online ? -1 : 1;
      var la = ((sessionsByHost.get(a) || [])[0] || {}).last_event_at || '';
      var lb = ((sessionsByHost.get(b) || [])[0] || {}).last_event_at || '';
      if (la !== lb) return lb.localeCompare(la);
      return a.localeCompare(b);
    });

    // Count sessions per owner_agent — when > 1, labels get a sid-suffix
    // for disambiguation (e.g. "claude-net · ab12cd").
    var ownerCounts = {};
    mirrorBySid.forEach(function(sess) {
      if (sess.closed_at) return;
      ownerCounts[sess.owner_agent] = (ownerCounts[sess.owner_agent] || 0) + 1;
    });

    var homeActive = activeAgentSid ? '' : ' active';
    var html =
      '<a class="list-group-item list-group-item-action cn-home-row' + homeActive + '"'
      + ' href="#" data-sid="" data-name="__home__">'
      + '<span class="cn-home-glyph">&gt;</span>'
      + '<span class="agent-name">Message log</span>'
      + '</a>';

    for (var h = 0; h < hostIds.length; h++) {
      var hid = hostIds[h];
      var host = hosts.get(hid);
      html += renderHostRow(host);
      var sessions = sessionsByHost.get(hid) || [];
      for (var s = 0; s < sessions.length; s++) {
        html += renderSessionRow(sessions[s], ownerCounts);
      }
      var extras = mcpByHost.get(hid) || [];
      for (var e = 0; e < extras.length; e++) {
        html += renderMcpOnlyRow(extras[e]);
      }
      for (var p = 0; p < pendingLaunches.length; p++) {
        if (pendingLaunches[p].hostId === hid) {
          html += renderGhostLaunch(pendingLaunches[p]);
        }
      }
    }

    // Orphan sessions/agents (no host registered).
    if (sessionOrphans.length + mcpOrphans.length > 0) {
      html += '<div class="cn-host-header">Other</div>';
      for (var o = 0; o < sessionOrphans.length; o++) {
        html += renderSessionRow(sessionOrphans[o], ownerCounts);
      }
      for (var k = 0; k < mcpOrphans.length; k++) {
        html += renderMcpOnlyRow(mcpOrphans[k]);
      }
    }

    agentListEl.innerHTML = html;
  }

  function renderHostRow(host) {
    var offlineCls = host.online ? '' : ' is-offline';
    var launchBtn = host.online
      ? '<button class="cn-launch-btn" data-launch-host="' + escapeAttr(host.host_id) + '" type="button" title="Launch a new claude-channels session on this host">+ launch</button>'
      : '<span class="row-hint">offline</span>';
    return (
      '<div class="cn-host-row' + offlineCls + '">'
      + '<span class="agent-dot ' + (host.online ? 'online' : 'offline') + '"></span>'
      + '<span class="cn-host-name">' + escapeHtml(host.user + '@' + host.hostname) + '</span>'
      + launchBtn
      + '</div>'
    );
  }

  // Two-line row for a mirror session:
  //   line 1: short name (+ sid-tail if owner collides with another session)
  //   line 2: cwd's last two segments · "2m ago" style age
  // Clickable, opens the mirror view on select.
  function renderSessionRow(sess, ownerCounts) {
    var activeCls = sess.sid === activeAgentSid ? ' active' : '';
    var shortMatch = String(sess.owner_agent || '').match(/^([^:]+):/);
    var label = shortMatch ? shortMatch[1] : sess.owner_agent;
    var suffix = '';
    if ((ownerCounts[sess.owner_agent] || 0) > 1) {
      suffix = ' <span class="mli-sid">· ' + escapeHtml(String(sess.sid || '').slice(0, 6)) + '</span>';
    }
    var cwd = String(sess.cwd || '');
    var parts = cwd.split('/').filter(Boolean);
    var cwdShort = parts.length <= 2 ? cwd : '…/' + parts.slice(-2).join('/');
    var age = relativeTime(sess.last_event_at);
    var awaiting = sess.activity_state === 'awaiting_input' && !sess.closed_at;
    var dotCls = 'agent-dot online' + (awaiting ? ' awaiting' : '');
    return (
      '<a class="list-group-item list-group-item-action agent-item cn-host-child cn-session-row' + activeCls + '"'
      + ' href="#agent=' + encodeURIComponent(sess.sid) + '"'
      + ' data-sid="' + escapeAttr(sess.sid) + '"'
      + ' data-name="' + escapeAttr(sess.owner_agent) + '">'
      + '<span class="' + dotCls + '"' + (awaiting ? ' title="Waiting for user input"' : '') + '></span>'
      + '<div class="cn-session-body">'
      +   '<div class="cn-session-title">' + escapeHtml(label) + suffix + '</div>'
      +   '<div class="cn-session-sub">'
      +     '<span class="cn-session-cwd">' + escapeHtml(cwdShort) + '</span>'
      +     (age ? ' <span class="cn-session-age">· ' + escapeHtml(age) + '</span>' : '')
      +   '</div>'
      + '</div>'
      + '</a>'
    );
  }

  function relativeTime(iso) {
    if (!iso) return '';
    var t = new Date(iso).getTime();
    if (!isFinite(t)) return '';
    var dt = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (dt < 10) return 'just now';
    if (dt < 60) return dt + 's ago';
    if (dt < 3600) return Math.floor(dt / 60) + 'm ago';
    if (dt < 86400) return Math.floor(dt / 3600) + 'h ago';
    return Math.floor(dt / 86400) + 'd ago';
  }

  // Row for an MCP agent that has no live mirror session — messaging-
  // only registration. Not clickable; dim text so the user can see why
  // the row exists but doesn't interact.
  function renderMcpOnlyRow(ag) {
    var offline = ag.status === 'offline';
    var shortMatch = String(ag.fullName || '').match(/^([^:]+):/);
    var label = shortMatch ? shortMatch[1] : ag.fullName;
    var hint = offline
      ? '<span class="row-hint">offline</span>'
      : '<span class="row-hint" title="No mirror session — this agent is registered for messaging only.">no mirror</span>';
    return (
      '<div class="list-group-item agent-item cn-host-child is-inactive"'
      + ' data-sid=""'
      + ' data-name="' + escapeAttr(ag.fullName) + '">'
      + '<span class="agent-dot ' + (offline ? 'offline' : 'no-mirror') + '"></span>'
      + '<span class="agent-name">' + escapeHtml(label) + '</span>'
      + hint
      + '</div>'
    );
  }

  function renderGhostLaunch(entry) {
    var ageSec = Math.max(0, Math.floor((Date.now() - entry.startedAt) / 1000));
    return (
      '<div class="list-group-item cn-host-child cn-ghost-launch">'
      + '<span class="agent-dot no-mirror"></span>'
      + '<span class="agent-name">launching — ' + escapeHtml(entry.cwdShort) + '</span>'
      + '<span class="row-hint">' + ageSec + 's</span>'
      + '</div>'
    );
  }

  // --- Message log (live tail, ring buffer) ---
  function addLogMessage(event) {
    var routeType = 'direct';
    var toLabel = event.to;
    if (event.to === 'broadcast') {
      routeType = 'broadcast';
      toLabel = 'broadcast';
    } else if (event.team) {
      routeType = 'team';
      toLabel = 'team:' + event.team;
    }
    var entry = {
      from: event.from,
      to: toLabel,
      type: event.type,
      content: event.content,
      timestamp: event.timestamp,
      routeType: routeType,
    };
    messageLogBuffer.push(entry);
    if (messageLogBuffer.length > MAX_LOG_ENTRIES) messageLogBuffer.shift();
    appendLogEntry(entry);
  }

  function appendLogEntry(msg) {
    if (!messageLogEl) return;
    var empty = messageLogEl.querySelector('.cn-log-empty');
    if (empty) empty.remove();
    var el = document.createElement('div');
    el.className = 'cn-log-entry cn-log-' + msg.routeType;
    el.innerHTML =
      '<div class="cn-log-meta">'
        + '<span class="cn-log-route">'
          + escapeHtml(msg.from) + ' &rarr; ' + escapeHtml(msg.to)
        + '</span>'
        + '<span class="cn-log-time">' + formatTime(msg.timestamp) + '</span>'
      + '</div>'
      + '<div class="cn-log-content">' + escapeHtml(msg.content) + '</div>';
    messageLogEl.appendChild(el);
    while (messageLogEl.children.length > MAX_LOG_ENTRIES) {
      messageLogEl.removeChild(messageLogEl.firstChild);
    }
    // Only auto-scroll when the log is the visible view.
    if (messageLogView && !messageLogView.classList.contains('d-none')) {
      messageLogEl.scrollTop = messageLogEl.scrollHeight;
    }
  }

  // --- Update counts ---
  function updateCounts() {
    var onlineCount = 0;
    agents.forEach(function(ag) { if (ag.status === 'online') onlineCount++; });
    agentCountEl.textContent = onlineCount + ' agent' + (onlineCount !== 1 ? 's' : '');
    if (logAgentCountEl) logAgentCountEl.textContent = onlineCount + ' agent' + (onlineCount !== 1 ? 's' : '') + ' online';
  }

  // --- Helpers ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      // Respect the user's locale (12-hour with am/pm or 24-hour,
      // whichever the browser prefers). The gutter is sized to fit
      // either.
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  // --- View swap (message log ↔ mirror) ---
  function showMessageLogView() {
    if (messageLogView) messageLogView.classList.remove('d-none');
    if (mirrorView) mirrorView.classList.add('d-none');
    if (headerLog) headerLog.classList.remove('d-none');
    if (headerMirror) headerMirror.classList.add('d-none');
    if (messageLogEl) messageLogEl.scrollTop = messageLogEl.scrollHeight;
  }
  function showMirrorView() {
    if (messageLogView) messageLogView.classList.add('d-none');
    if (mirrorView) mirrorView.classList.remove('d-none');
    if (headerLog) headerLog.classList.add('d-none');
    if (headerMirror) headerMirror.classList.remove('d-none');
  }

  // --- Hash routing ---
  // /            → message log
  // /#agent=SID  → mirror view for that session
  function sidFromHash() {
    var h = window.location.hash || '';
    var m = h.match(/^#agent=(.+)$/);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function applyHashRoute() {
    var sid = sidFromHash();
    if (!sid) {
      detachMirror();
      showMessageLogView();
      renderAgents();
      return;
    }
    // Valid sid: must match a known mirror session.
    var known = mirrorBySid.has(sid);
    if (!known) {
      // Might be an early page-load race where the session list hasn't
      // arrived yet. Fetch + retry once, then fall back.
      fetch('/api/mirror/sessions/all')
        .then(function(r) { return r.ok ? r.json() : []; })
        .then(function(list) {
          if (Array.isArray(list)) {
            for (var i = 0; i < list.length; i++) {
              mirrorBySid.set(list[i].sid, list[i]);
              var ag = agents.get(list[i].owner_agent);
              if (ag) { ag.mirrorSid = list[i].sid; ag.cwd = list[i].cwd; }
            }
            renderAgents();
          }
          if (mirrorBySid.has(sid)) {
            showMirrorView();
            attachMirror(sid);
            renderAgents();
          } else {
            // Unknown sid — show empty-state and reset.
            if (messageLogEl) {
              var hint = document.createElement('div');
              hint.className = 'cn-log-empty text-secondary p-3';
              hint.textContent = "This session isn't active. Returning to the message log…";
              messageLogEl.prepend(hint);
              setTimeout(function() { hint.remove(); }, 3000);
            }
            window.location.hash = '';
          }
        })
        .catch(function() { window.location.hash = ''; });
      return;
    }
    showMirrorView();
    attachMirror(sid);
    renderAgents();
  }

  window.addEventListener('hashchange', applyHashRoute);

  // Navbar brand and the "Message log" home row both return to the log.
  document.addEventListener('click', function(e) {
    var brand = e.target.closest && e.target.closest('.navbar-brand');
    var home = e.target.closest && e.target.closest('.cn-home-row');
    if (brand || home) {
      e.preventDefault();
      if (window.location.hash) window.location.hash = '';
      else applyHashRoute();
      dismissMobileSidebar();
    }
    var agentRow = e.target.closest && e.target.closest('#agent-list .list-group-item.agent-item');
    if (agentRow && agentRow.getAttribute('href')) {
      // Let the href change the hash; then close the mobile offcanvas.
      dismissMobileSidebar();
    }
  });

  // ── Sidebar toggle ──
  // Below md: hamburger opens the Bootstrap offcanvas (overlay).
  // md+: hamburger toggles a `.sidebar-collapsed` class on the shell so
  // the inline column hides and the main pane reclaims space.
  var appShell = document.getElementById('app-shell');
  var sidebarEl = document.getElementById('sidebar');
  var sidebarToggleBtn = document.getElementById('sidebar-toggle');
  function isDesktop() {
    return window.matchMedia('(min-width: 768px)').matches;
  }
  function dismissMobileSidebar() {
    if (isDesktop() || !window.bootstrap) return;
    var inst = window.bootstrap.Offcanvas.getInstance(sidebarEl);
    if (inst) inst.hide();
  }
  if (sidebarToggleBtn) {
    sidebarToggleBtn.addEventListener('click', function() {
      if (isDesktop()) {
        appShell.classList.toggle('sidebar-collapsed');
      } else if (window.bootstrap) {
        var inst = window.bootstrap.Offcanvas.getOrCreateInstance(sidebarEl);
        inst.toggle();
      }
    });
  }

  // ── Launch modal wiring (Phase C) ─────────────────────────────────
  // Click "+ launch" on any host row → open the modal scoped to that host.
  // Autocomplete fetches /api/host/:id/ls?path=<parent-of-typed-segment>
  // on every keystroke (debounced), filters by trailing-segment prefix.
  // Tap / click / Enter picks a suggestion; Tab completes to the common
  // prefix (desktop only). Submit POSTs /api/host/:id/launch.
  var launchModal = document.getElementById('launch-modal');
  var launchInput = document.getElementById('launch-input');
  var launchSuggEl = document.getElementById('launch-suggestions');
  var launchSubmitBtn = document.getElementById('launch-submit');
  var launchSkipChk = document.getElementById('launch-skip');
  var launchSkipWrap = document.getElementById('launch-skip-wrap');
  var launchTitleEl = document.getElementById('launch-title');
  var launchErrorEl = document.getElementById('launch-error');
  var launchState = {
    hostId: null,
    lsCache: {},       // parent-path → [{name, is_dir}]
    lsCacheExpiry: 0,
    entries: [],        // currently-displayed suggestion entries
    activeIdx: -1,
    fetchInFlight: false,
    debounceTimer: null,
    touchMode: false,
  };

  function openLaunchModal(hostId) {
    var host = hosts.get(hostId);
    if (!host || !host.online) return;
    launchState.hostId = hostId;
    launchState.lsCache = {};
    launchTitleEl.textContent = 'Launch in ' + host.user + '@' + host.hostname;
    launchErrorEl.textContent = '';
    // Initial input: the most-recent cwd, if any, else ~/projects/
    var initial = (host.recent_cwds && host.recent_cwds[0]) || '~/projects/';
    // Expand ~ using the host's home for a full path the user can trim.
    if (initial.startsWith('~/')) initial = host.home + initial.slice(1);
    launchInput.value = initial;
    if (host.allow_dangerous_skip) {
      launchSkipWrap.style.display = '';
      launchSkipChk.checked = true;
    } else {
      launchSkipWrap.style.display = 'none';
      launchSkipChk.checked = false;
    }
    launchSubmitBtn.disabled = false;
    launchState.touchMode = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    launchModal.classList.add('is-open');
    renderLaunchSuggestions();
    // Focus the input; on desktop the user can type over the initial value.
    setTimeout(function() { launchInput.focus(); launchInput.select(); }, 0);
  }

  function closeLaunchModal() {
    launchModal.classList.remove('is-open');
    launchState.hostId = null;
    if (launchState.debounceTimer) {
      clearTimeout(launchState.debounceTimer);
      launchState.debounceTimer = null;
    }
  }

  function splitPath(p) {
    var i = p.lastIndexOf('/');
    if (i < 0) return { parent: '', tail: p };
    return { parent: p.slice(0, i + 1), tail: p.slice(i + 1) };
  }

  function fetchLs(parent) {
    if (!launchState.hostId) return Promise.resolve([]);
    var cached = launchState.lsCache[parent];
    if (cached && Date.now() < launchState.lsCacheExpiry) return Promise.resolve(cached);
    // Expand ~/ to the host's home for the actual API call.
    var host = hosts.get(launchState.hostId);
    var p = parent;
    if (host && p.startsWith('~/')) p = host.home + p.slice(1);
    if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
    var url = '/api/host/' + encodeURIComponent(launchState.hostId)
      + '/ls?path=' + encodeURIComponent(p);
    return fetch(url).then(function(r) {
      return r.json().then(function(body) {
        if (r.ok && Array.isArray(body.entries)) {
          launchState.lsCache[parent] = body.entries;
          launchState.lsCacheExpiry = Date.now() + 5000;
          return body.entries;
        }
        if (!r.ok && body.error) throw new Error(body.error);
        return [];
      });
    });
  }

  function renderLaunchSuggestions() {
    var host = hosts.get(launchState.hostId);
    var value = launchInput.value || '';
    var parts = splitPath(value);
    var parent = parts.parent || '/';
    launchState.entries = [];
    launchErrorEl.textContent = '';

    if (launchState.debounceTimer) clearTimeout(launchState.debounceTimer);
    launchState.debounceTimer = setTimeout(function() {
      // Start with recent cwds as a static section (when input is empty
      // or matches a recent entry).
      var recentSection = '';
      if (host && host.recent_cwds && host.recent_cwds.length > 0 && (!value || value.length < 3)) {
        recentSection = '<div class="cn-launch-sugg-section">Recent</div>';
        for (var i = 0; i < host.recent_cwds.length; i++) {
          var cwd = host.recent_cwds[i];
          recentSection +=
            '<div class="cn-launch-sugg-item" data-launch-pick="' + escapeAttr(cwd) + '">'
            + '<span class="sugg-path">' + escapeHtml(cwd) + '</span>'
            + '</div>';
          launchState.entries.push({ type: 'recent', path: cwd });
        }
      }

      fetchLs(parent).then(function(entries) {
        var filtered = entries.filter(function(e) {
          return !parts.tail || e.name.toLowerCase().indexOf(parts.tail.toLowerCase()) === 0;
        });
        filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });

        var foldersSection = '';
        if (filtered.length > 0) {
          foldersSection = '<div class="cn-launch-sugg-section">In ' + escapeHtml(parent) + '</div>';
          for (var j = 0; j < filtered.length; j++) {
            var full = parent + filtered[j].name + (filtered[j].is_dir ? '/' : '');
            foldersSection +=
              '<div class="cn-launch-sugg-item" data-launch-pick="' + escapeAttr(full) + '">'
              + '<span class="sugg-path">' + escapeHtml(filtered[j].name) + (filtered[j].is_dir ? '/' : '') + '</span>'
              + '</div>';
            launchState.entries.push({ type: 'dir', path: full });
          }
        }

        // Create-if-missing row — when typed path looks like a non-empty
        // dir that doesn't match any suggestion.
        var createSection = '';
        var typedLooksLikeNewPath = parts.tail.length > 0 && !entries.some(function(e) {
          return e.name === parts.tail;
        });
        if (typedLooksLikeNewPath && value.length > parent.length) {
          createSection =
            '<div class="cn-launch-sugg-item cn-launch-create" data-launch-create="' + escapeAttr(value) + '">'
            + '<span class="sugg-path">+ create ' + escapeHtml(value) + '</span>'
            + '<span class="sugg-hint">directory doesn\'t exist yet</span>'
            + '</div>';
          launchState.entries.push({ type: 'create', path: value });
        }

        launchSuggEl.innerHTML = recentSection + foldersSection + createSection;
        launchState.activeIdx = -1;
      }).catch(function(err) {
        launchSuggEl.innerHTML = recentSection;
        launchErrorEl.textContent = err.message || 'ls failed';
      });
    }, 100);
  }

  function launchSubmit() {
    if (!launchState.hostId || !launchInput.value) return;
    var hostId = launchState.hostId;
    var cwd = launchInput.value.trim();
    var host = hosts.get(hostId);
    // Tilde-expand for the server-side call using the host's home.
    if (host && cwd.startsWith('~/')) cwd = host.home + cwd.slice(1);
    // Strip trailing / to keep tmux -c happy.
    if (cwd.length > 1 && cwd.endsWith('/')) cwd = cwd.slice(0, -1);

    launchSubmitBtn.disabled = true;
    launchErrorEl.textContent = '';
    fetch('/api/host/' + encodeURIComponent(hostId) + '/launch', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        cwd: cwd,
        create_if_missing: true,
        skip_permissions: launchSkipChk.checked && host.allow_dangerous_skip,
      }),
    })
      .then(function(r) {
        return r.json().then(function(body) { return { status: r.status, body: body }; });
      })
      .then(function(res) {
        launchSubmitBtn.disabled = false;
        if (res.status >= 400) {
          launchErrorEl.textContent = (res.body && res.body.error) || ('HTTP ' + res.status);
          return;
        }
        // Ghost row will show under the host until mirror:session_started
        // replaces it with the real session. Auto-expire after 20s.
        var launchKey = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        var cwdParts = cwd.split('/');
        pendingLaunches.push({
          hostId: hostId,
          launchKey: launchKey,
          startedAt: Date.now(),
          cwdShort: cwdParts.slice(-2).join('/') || cwd,
        });
        setTimeout(function() {
          var i = pendingLaunches.findIndex(function(p) { return p.launchKey === launchKey; });
          if (i >= 0) { pendingLaunches.splice(i, 1); renderAgents(); }
        }, 20_000);
        renderAgents();
        closeLaunchModal();
      })
      .catch(function(err) {
        launchSubmitBtn.disabled = false;
        launchErrorEl.textContent = 'Launch failed: ' + (err && err.message ? err.message : err);
      });
  }

  // Wire sidebar click → open modal, modal controls.
  document.addEventListener('click', function(e) {
    var launchBtn = e.target.closest && e.target.closest('[data-launch-host]');
    if (launchBtn) {
      e.preventDefault();
      dismissMobileSidebar();
      openLaunchModal(launchBtn.getAttribute('data-launch-host'));
      return;
    }
    if (e.target.closest && e.target.closest('[data-launch-close]')) {
      closeLaunchModal();
      return;
    }
    if (e.target === launchModal) {
      closeLaunchModal();
      return;
    }
    var sugg = e.target.closest && e.target.closest('[data-launch-pick]');
    if (sugg) {
      var pick = sugg.getAttribute('data-launch-pick');
      launchInput.value = pick;
      // On touch mode, if the pick is a directory (ends with /), refresh
      // suggestions for that directory — tap-to-drill.
      if (launchState.touchMode && pick.endsWith('/')) {
        renderLaunchSuggestions();
      } else if (pick.endsWith('/')) {
        renderLaunchSuggestions();
      }
      launchInput.focus();
      return;
    }
    var createRow = e.target.closest && e.target.closest('[data-launch-create]');
    if (createRow) {
      // The user explicitly wants to create — just submit with the typed path.
      launchSubmit();
      return;
    }
  });
  if (launchInput) {
    launchInput.addEventListener('input', renderLaunchSuggestions);
    launchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { e.preventDefault(); closeLaunchModal(); return; }
      if (e.key === 'Enter') { e.preventDefault(); launchSubmit(); return; }
      if (e.key === 'Tab') {
        // Complete to the common prefix of the currently-filtered directory suggestions.
        var dirs = launchState.entries.filter(function(x) { return x.type === 'dir'; });
        if (dirs.length === 0) return;
        var common = dirs[0].path;
        for (var i = 1; i < dirs.length; i++) {
          var p = dirs[i].path;
          var j = 0;
          while (j < common.length && j < p.length && common[j] === p[j]) j++;
          common = common.slice(0, j);
        }
        if (common.length > launchInput.value.length) {
          e.preventDefault();
          launchInput.value = common;
          renderLaunchSuggestions();
        }
      }
    });
  }
  if (launchSubmitBtn) launchSubmitBtn.addEventListener('click', launchSubmit);

  // --- Init ---
  connect();
  updateCounts();
  showMessageLogView();
  // Honour a pre-existing hash on first load (reload / deep link).
  if (sidFromHash()) applyHashRoute();

  // ── Mirror view attach/detach ───────────────────────────────────────
  // A single mirror WebSocket at a time. Set by attachMirror, closed by
  // detachMirror. The teardown closure captures the WS + reconnect timer
  // for the currently-attached session.
  var activeAgentSid = null;
  var mirrorTeardown = null;
  // Per-sid scroll state: { scrolledUp: bool, scrollTop: number }.
  // scrolledUp is set when the user explicitly scrolls up in a session
  // and cleared when they scroll back to the bottom. Persists across
  // session switches so re-attaching a session resumes where they left
  // off. Cleared on page reload (in-memory only).
  // Keyed by sid → { scrolledUp, anchorUuid, anchorOffset }.
  // anchorUuid is the data-uuid of the topmost visible frame; anchorOffset
  // is scrollTop relative to that element's offsetTop. Using a content
  // anchor instead of a raw pixel survives content-shift from new frames.
  // Capped at 50 entries (insertion order eviction) to bound memory.
  var sessionScrollState = new Map();
  var SESSION_SCROLL_MAX = 50;
  function setScrollState(id, state) {
    sessionScrollState.delete(id); // re-insert at end for LRU order
    sessionScrollState.set(id, state);
    if (sessionScrollState.size > SESSION_SCROLL_MAX) {
      sessionScrollState.delete(sessionScrollState.keys().next().value);
    }
  }

  function detachMirror() {
    if (typeof mirrorTeardown === 'function') {
      try { mirrorTeardown(); } catch (e) { /* ignore */ }
      mirrorTeardown = null;
    }
    activeAgentSid = null;
  }

  function attachMirror(sid) {
    detachMirror();
    activeAgentSid = sid;

    var cwdEl = document.getElementById('mirror-cwd');
    var ownerEl = document.getElementById('mirror-owner');
    var connEl = document.getElementById('mirror-conn');
    var statusEl = document.getElementById('mirror-status');
    var transcriptEl = document.getElementById('mirror-transcript');
    var jumpBtn = document.getElementById('mirror-jump-btn');

    // Broadcast-style states: CONNECTING / LIVE / OFFLINE / ERROR.
    function setConnState(state) {
      connEl.classList.remove('is-live', 'is-error');
      if (state === 'live') { connEl.textContent = 'LIVE'; connEl.classList.add('is-live'); }
      else if (state === 'offline') { connEl.textContent = 'OFFLINE'; }
      else if (state === 'connecting') { connEl.textContent = 'CONNECTING'; }
      else if (state === 'error') { connEl.textContent = 'ERROR'; connEl.classList.add('is-error'); }
    }
    setConnState('connecting');
    if (statusEl) { statusEl.className = 'mirror-status'; statusEl.textContent = ''; }

    // Every listener attached inside attachMirror is wired to this
    // controller's signal; detachMirror aborts it so the DOM elements
    // (compose/textarea/stop/slash popover/transcript) don't accumulate
    // stale handlers across agent switches. Without this, clicking
    // "Transmit" N switches later fires N POSTs, each targeting a
    // different sid.
    var attachAc = new AbortController();
    var attachSig = attachAc.signal;

    var rendered = Object.create(null); // uuid → true
    var userScrolledUp = false;
    var SCROLL_LOCK_THRESHOLD = 80;
    // Anchor for "load earlier history" requests — the timestamp of
    // the oldest frame currently rendered. Set on first renderEvent
    // (live or backfilled) and lowered as older frames are prepended.
    // Timestamp-based anchoring is robust against the fact that live
    // frames carry synthetic uuids that don't necessarily appear in
    // the on-disk JSONL.
    var firstRenderedTs = null;
    var historyExhausted = false;
    var historyInflight = false;
    // Marker element separating loaded history from the live transcript.
    // Inserted lazily when the first chunk is prepended.
    var historyDivider = null;
    // ── Task* tool state (tracks Claude Code's harness task list) ────
    // Mirrors the state that TaskListV2 in the real CLI tracks: id →
    // {subject, activeForm, description, status}. Populated from
    // TaskCreate/TaskUpdate/TaskList/TaskGet payloads; used so that
    // TaskUpdate cards can show the task's subject (which lives only on
    // the TaskCreate call) instead of just the id.
    var taskState = new Map();
    var pendingTaskCreates = new Map(); // tool_use_id → {subject, ...}

    function setScrolledUp(val) {
      userScrolledUp = val;
      if (jumpBtn) jumpBtn.classList.toggle('is-visible', !!val);
    }

    if (jumpBtn) {
      jumpBtn.addEventListener('click', function() {
        setScrolledUp(false);
        setScrollState(sid, { scrolledUp: false });
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }, { signal: attachSig });
    }

    // Compute uuid anchor: walk upward from scrollTop to find the
    // topmost fully-or-partially-visible .m-evt element, then record
    // how far into it the scroll position sits.
    function captureAnchor() {
      var els = transcriptEl.querySelectorAll('.m-evt[data-uuid]');
      var st = transcriptEl.scrollTop;
      var anchor = null;
      for (var i = 0; i < els.length; i++) {
        if (els[i].offsetTop + els[i].offsetHeight > st) {
          anchor = { uuid: els[i].getAttribute('data-uuid'), offset: st - els[i].offsetTop };
          break;
        }
      }
      return anchor;
    }

    transcriptEl.addEventListener('scroll', function() {
      var distance = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
      setScrolledUp(distance > SCROLL_LOCK_THRESHOLD);
      var state = { scrolledUp: userScrolledUp };
      if (userScrolledUp) {
        // Only capture anchor when scrolled-up; at-bottom state needs
        // no anchor (next init will snap to tail).
        var a = captureAnchor();
        if (a) { state.anchorUuid = a.uuid; state.anchorOffset = a.offset; }
      }
      setScrollState(sid, state);
    }, { signal: attachSig });

    // Initial-replay tail-snap loop. scrollHeight is real so a couple
    // of rAF snaps suffice; the small loop guards against one-frame
    // layout lag.
    var tailLoopActive = false;
    function disconnectTailObserver() {
      tailLoopActive = false;
    }
    function startTailObserver() {
      tailLoopActive = true;
      var attempts = 0;
      function tick() {
        if (!tailLoopActive) return;
        if (userScrolledUp) { tailLoopActive = false; return; }
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
        if (++attempts < 4) {
          requestAnimationFrame(tick);
        } else {
          // Final tick: forcibly clear the flag. The rAF snap above is
          // authoritative; any intervening event that set userScrolledUp
          // during the loop did so on stale scroll geometry.
          tailLoopActive = false;
          setScrolledUp(false);
        }
      }
      requestAnimationFrame(tick);
    }

    function scrollToBottom() {
      if (userScrolledUp) return;
      requestAnimationFrame(function() {
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      });
    }

    // ── Tool renderers ───────────────────────────────────────────────
    // Each entry has { call(payload, el), result(payload, el), label? }.
    // `call` is invoked when the tool_call arrives; `result` when the
    // matching tool_result arrives on the same card. Fallbacks cover
    // tools we don't have a custom renderer for yet.

    function toolLabelFromName(name) {
      if (!name) return '';
      // Parse MCP tool names: mcp__<server>__<tool> → "<server>: <tool>"
      var m = name.match(/^mcp__([^_]+)__(.+)$/);
      if (m) return m[1] + ': ' + m[2];
      return name;
    }

    function shortPath(p) {
      if (!p) return '';
      var parts = p.split('/');
      if (parts.length <= 2) return p;
      return '…/' + parts.slice(-2).join('/');
    }

    function makeHeadline(toolName, target, sub) {
      var html =
        '<div class="m-tool-headline">' +
          '<span class="m-tool-name">' + escapeHtml(toolLabelFromName(toolName)) + '</span>' +
          '<span class="m-tool-target">' + (target || '') + '</span>' +
          '<span class="m-tool-badge pending" data-role="status">pending</span>' +
        '</div>';
      if (sub) html += '<div class="m-tool-sub">' + sub + '</div>';
      return html;
    }

    function setStatusOk(el, text) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge ok'; badge.textContent = text || 'done'; }
    }
    function setStatusError(el) {
      var badge = el.querySelector('[data-role="status"]');
      if (badge) { badge.className = 'm-tool-badge error'; badge.textContent = 'error'; }
      el.classList.add('is-error');
    }

    function appendDetails(el, summary, body, opts) {
      var open = opts && opts.open ? ' open' : '';
      var d = document.createElement('details');
      d.innerHTML = '<summary>' + escapeHtml(summary) + '</summary>' + body;
      if (open) d.setAttribute('open', '');
      el.appendChild(d);
      return d;
    }

    function truncateLines(text, maxLines) {
      if (!text) return '';
      var lines = String(text).split('\n');
      if (lines.length <= maxLines) return text;
      return lines.slice(0, maxLines).join('\n') +
        '\n… (' + (lines.length - maxLines) + ' more lines)';
    }

    // ── Task* helpers ───────────────────────────────────────────────

    var TASK_STATUS_GLYPHS = {
      pending: '◻',
      in_progress: '◼',
      completed: '✔',
      deleted: '×',
    };

    function taskUpsert(id, partial) {
      if (!id) return null;
      var key = String(id);
      var cur = taskState.get(key) || {};
      var merged = Object.assign({}, cur, partial);
      // Stamp when the task transitions INTO completed so the panel can
      // show the most recently finished ones first.
      if (merged.status === 'completed' && cur.status !== 'completed') {
        merged.completedAt = Date.now();
      }
      taskState.set(key, merged);
      scheduleTaskPanelRefresh();
      return merged;
    }

    // ── Task panel (header dropdown) ────────────────────────────
    // Bootstrap's Collapse component owns show/hide state via the
    // button's data-bs-toggle. We just render content off taskState
    // on every upsert, coalesced to one rAF tick per batch so a
    // TaskList response with N rows doesn't re-render N times.
    // Auto-opens once per session the first time a task goes
    // in_progress; after that the user's toggle is authoritative.
    var taskPanelList = document.getElementById('mirror-tasks-list');
    var taskPanelEl = document.getElementById('mirror-tasks-panel');
    var taskPanelBtn = document.getElementById('mirror-tasks-btn');
    var taskPanelRefreshPending = false;
    var taskPanelAutoOpenFired = false;

    function countTasks() {
      var total = 0, inProg = 0, done = 0;
      taskState.forEach(function(t) {
        if (t.status === 'deleted') return;
        total++;
        if (t.status === 'in_progress') inProg++;
        else if (t.status === 'completed') done++;
      });
      return { total: total, inProg: inProg, done: done };
    }

    // How many recently-completed tasks to show at the top of the panel
    // (after In progress). Matches Claude Code's TUI "last few wins" feel
    // without letting a long session's completed list push active items
    // off-screen.
    var COMPLETED_CAP = 5;

    function renderTaskPanelContent() {
      if (!taskPanelList) return;
      var buckets = { in_progress: [], pending: [], completed: [] };
      taskState.forEach(function(t, id) {
        if (!t || t.status === 'deleted') return;
        var bucket = t.status === 'in_progress' ? 'in_progress'
          : t.status === 'completed' ? 'completed'
          : 'pending';
        buckets[bucket].push([id, t]);
      });
      // In-progress and pending: stable numeric-id order.
      var byId = function(a, b) {
        var na = Number(a[0]), nb = Number(b[0]);
        if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
        return String(a[0]).localeCompare(String(b[0]));
      };
      buckets.in_progress.sort(byId);
      buckets.pending.sort(byId);
      // Completed: most-recent first, trimmed to the cap.
      buckets.completed.sort(function(a, b) {
        return (b[1].completedAt || 0) - (a[1].completedAt || 0);
      });
      var recentCompleted = buckets.completed.slice(0, COMPLETED_CAP);
      var hiddenCompleted = buckets.completed.length - recentCompleted.length;

      function renderBucket(label, rows) {
        if (!rows.length) return '';
        var html = '<div class="cn-tasks-head">' + escapeHtml(label) + '</div>';
        rows.forEach(function(pair) {
          html += renderTaskLine(pair[0], pair[1]);
        });
        return html;
      }
      var completedLabel = hiddenCompleted > 0
        ? 'Recently completed (+' + hiddenCompleted + ' older)'
        : 'Recently completed';
      var html = renderBucket('In progress', buckets.in_progress) +
        renderBucket(completedLabel, recentCompleted) +
        renderBucket('Pending', buckets.pending);
      taskPanelList.innerHTML = html ||
        '<div class="text-muted small text-center py-3">No tasks yet.</div>';
      // Bootstrap Collapse sets an inline `height: XXXpx` during the
      // show transition and only clears it on transitionend. If the
      // content has grown since the last open, that stale measurement
      // keeps the panel from expanding. Clearing it here lets CSS
      // (max-height: 33vh + natural content) drive the size.
      if (taskPanelEl && taskPanelEl.classList.contains('show')) {
        taskPanelEl.style.height = '';
      }
    }

    function updateTaskPanelBadge() {
      if (!taskPanelBtn) return;
      var c = countTasks();
      if (c.total === 0) {
        taskPanelBtn.classList.add('d-none');
        return;
      }
      taskPanelBtn.classList.remove('d-none');
      var running = c.inProg > 0
        ? '<span class="cn-tasks-running">' + c.inProg + ' running</span>'
        : '';
      taskPanelBtn.innerHTML = 'Tasks ' + c.total + running;
      // Auto-open once the first time any task goes in_progress.
      if (c.inProg > 0 && !taskPanelAutoOpenFired && window.bootstrap) {
        taskPanelAutoOpenFired = true;
        bootstrap.Collapse.getOrCreateInstance(taskPanelEl).show();
      }
      // Render unconditionally so the panel content is fresh the moment
      // the user opens it, not one frame late. Rendering into a hidden
      // collapse node is cheap (N task rows).
      renderTaskPanelContent();
    }

    function scheduleTaskPanelRefresh() {
      if (taskPanelRefreshPending) return;
      taskPanelRefreshPending = true;
      requestAnimationFrame(function() {
        taskPanelRefreshPending = false;
        updateTaskPanelBadge();
      });
    }

    // Render content on first open so the panel isn't empty if the
    // user opens it before any upsert fires.
    if (taskPanelEl) {
      taskPanelEl.addEventListener('show.bs.collapse', renderTaskPanelContent,
        { signal: attachSig });
    }

    function renderTaskLine(id, task) {
      if (!task) return '';
      var status = task.status || 'pending';
      var glyph = TASK_STATUS_GLYPHS[status] || TASK_STATUS_GLYPHS.pending;
      var title = task.subject || ('Task ' + id);
      var activity = status === 'in_progress' && task.activeForm
        ? task.activeForm
        : null;
      var html =
        '<div class="m-task-line m-task-' + escapeAttr(status) + '">' +
          '<span class="m-task-glyph">' + glyph + '</span>' +
          '<span class="m-task-subject">' + escapeHtml(title) + '</span>' +
        '</div>';
      if (activity) {
        html += '<div class="m-task-activity">' + escapeHtml(activity) + '…</div>';
      }
      return html;
    }

    /** Best-effort parse of a TaskList tool_response into task records. */
    function parseTaskListResponse(resp) {
      if (!resp) return null;
      if (typeof resp === 'object' && !Array.isArray(resp)) {
        if (Array.isArray(resp.tasks)) return resp.tasks;
        if (resp.id && resp.subject) return [resp];
      }
      if (Array.isArray(resp)) return resp;
      if (typeof resp === 'string') {
        // Try JSON first
        var trimmed = resp.trim();
        if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
          try {
            var parsed = JSON.parse(trimmed);
            return parseTaskListResponse(parsed);
          } catch (e) { /* fall through */ }
        }
      }
      return null;
    }

    /** Best-effort parse of a TaskCreate tool_response for the new taskId. */
    function parseCreatedTaskId(resp) {
      if (!resp) return null;
      if (typeof resp === 'object' && resp !== null) {
        return resp.taskId || resp.id || null;
      }
      var s = String(resp);
      var m = s.match(/[Tt]ask\s*#?(\d+)/);
      if (m) return m[1];
      return null;
    }

    // ── Rich diff renderer (Edit / Write / MultiEdit) ──────────────
    //
    // Uses `jsdiff` (loaded via /bin/diff.min.js) to compute a line-level
    // unified diff; within each (removed, added) pair of equal length,
    // runs a word-level diff so the precise delta highlights inside the
    // line instead of the whole line turning red/green. Falls back to a
    // naive two-block render if jsdiff didn't load for some reason.

    function splitDiffLines(s) {
      var lines = String(s).split('\n');
      if (lines.length > 0 && lines[lines.length - 1] === '') lines.pop();
      return lines;
    }

    function renderDiffLine(type, innerHtml) {
      var prefix = type === 'del' ? '−' : type === 'add' ? '+' : ' ';
      return '<div class="m-diff-line m-diff-' + type + '">' +
        '<span class="m-diff-gutter">' + prefix + '</span>' +
        '<span class="m-diff-content">' + (innerHtml || '&nbsp;') + '</span>' +
        '</div>';
    }

    function wordDiffLine(oldLine, newLine) {
      if (!window.Diff || typeof window.Diff.diffWordsWithSpace !== 'function') {
        return {
          oldHtml: escapeHtml(oldLine),
          newHtml: escapeHtml(newLine),
        };
      }
      var parts = window.Diff.diffWordsWithSpace(oldLine, newLine);
      var oldHtml = '', newHtml = '';
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        var safe = escapeHtml(p.value);
        if (p.added) {
          newHtml += '<span class="m-diff-word-add">' + safe + '</span>';
        } else if (p.removed) {
          oldHtml += '<span class="m-diff-word-del">' + safe + '</span>';
        } else {
          oldHtml += safe;
          newHtml += safe;
        }
      }
      return { oldHtml: oldHtml, newHtml: newHtml };
    }

    function renderRichDiff(oldStr, newStr) {
      oldStr = String(oldStr || '');
      newStr = String(newStr || '');
      var added = 0, removed = 0;
      var out = '';

      if (!window.Diff || typeof window.Diff.diffLines !== 'function') {
        // Fallback: naive two-block render (old path). Keeps rendering
        // correct when the lib didn't load.
        var oldLines = splitDiffLines(oldStr);
        var newLines = splitDiffLines(newStr);
        for (var i = 0; i < oldLines.length; i++)
          out += renderDiffLine('del', escapeHtml(oldLines[i]));
        for (var j = 0; j < newLines.length; j++)
          out += renderDiffLine('add', escapeHtml(newLines[j]));
        return {
          html: out,
          added: newLines.length,
          removed: oldLines.length,
        };
      }

      var parts = window.Diff.diffLines(oldStr, newStr);
      for (var k = 0; k < parts.length; k++) {
        var cur = parts[k];
        var next = parts[k + 1];
        if (cur.removed && next && next.added) {
          // Paired removal + addition. Word-diff per line when counts match;
          // otherwise just render each side as raw lines.
          var olds = splitDiffLines(cur.value);
          var news = splitDiffLines(next.value);
          if (olds.length === news.length) {
            for (var m = 0; m < olds.length; m++) {
              var pair = wordDiffLine(olds[m], news[m]);
              out += renderDiffLine('del', pair.oldHtml);
              out += renderDiffLine('add', pair.newHtml);
            }
          } else {
            for (var a = 0; a < olds.length; a++)
              out += renderDiffLine('del', escapeHtml(olds[a]));
            for (var b = 0; b < news.length; b++)
              out += renderDiffLine('add', escapeHtml(news[b]));
          }
          removed += olds.length;
          added += news.length;
          k++;  // consumed the 'next' added block
        } else if (cur.removed) {
          var delLines = splitDiffLines(cur.value);
          for (var dd = 0; dd < delLines.length; dd++)
            out += renderDiffLine('del', escapeHtml(delLines[dd]));
          removed += delLines.length;
        } else if (cur.added) {
          var addLines = splitDiffLines(cur.value);
          for (var aa = 0; aa < addLines.length; aa++)
            out += renderDiffLine('add', escapeHtml(addLines[aa]));
          added += addLines.length;
        } else {
          var ctxLines = splitDiffLines(cur.value);
          for (var cc = 0; cc < ctxLines.length; cc++)
            out += renderDiffLine('ctx', escapeHtml(ctxLines[cc]));
        }
      }
      return { html: out, added: added, removed: removed };
    }

    function diffSummary(diff) {
      return '−' + diff.removed + ' / +' + diff.added;
    }

    var TOOL_RENDERERS = {
      Read: {
        call: function(p, el) {

        result: function(p, el) {
          var r = p.response;
          var stdout = '';
          var stderr = '';
          var interrupted = false;
          // Newer Claude Code wraps bash output as { stdout, stderr, interrupted, ... }.
          // Older versions return a plain string. Handle both.
          if (r && typeof r === 'object' && !Array.isArray(r)) {
            stdout = typeof r.stdout === 'string' ? r.stdout : '';
            stderr = typeof r.stderr === 'string' ? r.stderr : '';
            interrupted = !!r.interrupted;
          } else if (typeof r === 'string') {
            // Try parsing as JSON first (some transports stringify the object).
            var parsed = null;
            try { parsed = JSON.parse(r); } catch (e) { /* not JSON */ }
            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              stdout = parsed.stdout || '';
              stderr = parsed.stderr || '';
              interrupted = !!parsed.interrupted;
            } else {
              stdout = r;
            }
          }

          if (p.is_error) {
            setStatusError(el);
          } else if (interrupted) {
            var badge = el.querySelector('[data-role="status"]');
            if (badge) {
              badge.className = 'm-tool-badge error';
              badge.textContent = 'interrupted';
            }
          } else {
            setStatusOk(el, 'done');
          }

          var outLineCount = stdout ? stdout.trimEnd().split('\n').filter(function(l) { return l.length > 0; }).length : 0;
          var errLineCount = stderr ? stderr.trimEnd().split('\n').filter(function(l) { return l.length > 0; }).length : 0;

          // Build the details body. stdout + stderr stay COLLAPSED by default —
          // summary line tells you how much output there was at a glance.
          var body = '';
          if (stdout) {
            body += '<pre class="m-bash-out">' + escapeHtml(truncateLines(stdout, 40)) + '</pre>';
          }
          if (stderr) {
            body += '<div class="m-bash-label">stderr</div>' +
              '<pre class="m-bash-err">' + escapeHtml(truncateLines(stderr, 20)) + '</pre>';
          }
          if (!body) body = '<div class="m-tool-sub">(no output)</div>';

          var summary;
          if (outLineCount || errLineCount) {
            var parts = [];
            if (outLineCount) parts.push(outLineCount + ' line' + (outLineCount === 1 ? '' : 's') + ' stdout');
            if (errLineCount) parts.push(errLineCount + ' line' + (errLineCount === 1 ? '' : 's') + ' stderr');
            summary = parts.join(', ');
          } else {
            summary = 'output (empty)';
          }

          appendDetails(el, summary, body);  // collapsed by default
        },
      },

      Grep: {
        call: function(p, el) {
          var pat = p.input && p.input.pattern;
          var where = (p.input && (p.input.glob || p.input.path)) || '.';
          el.innerHTML = makeHeadline('Search',
            '🔍 <code>' + escapeHtml(pat || '') + '</code>',
            'in ' + escapeHtml(where));
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el);
          else setStatusOk(el, 'done');
          // Grep responses arrive as { content: "..." } (output_mode "content")
          // or { filenames: [...] } / raw string. Pull the usable text out
          // before we try to parse it.
          var resp;
          if (typeof p.response === 'string') {
            resp = p.response;
          } else if (p.response && typeof p.response === 'object') {
            if (typeof p.response.content === 'string') resp = p.response.content;
            else if (Array.isArray(p.response.content)) resp = p.response.content.join('\n');
            else if (Array.isArray(p.response.filenames)) resp = p.response.filenames.join('\n');
            else resp = tryJson(p.response);
          } else {
            resp = String(p.response || '');
          }
          var rawLines = (resp || '').split('\n').filter(function(l) { return l.length > 0; });
          // Grep output comes as either "N:content" (single-file path) or
          // "file:N:content" (multi-file). Detect mode so single-file results
          // can strip the repeated filename the way the TUI does.
          var contentRx = /^(\d+):(.*)$/;
          var multiRx = /^(.+?):(\d+):(.*)$/;
          var files = Object.create(null);
          var fileOrder = [];
          var singleFileMode = rawLines.length > 0 && rawLines.every(function(l) { return contentRx.test(l); });
          var matchCount = 0;
          var filenameMode = false;
          if (singleFileMode) {
            for (var i = 0; i < rawLines.length; i++) {
              var m = rawLines[i].match(contentRx);
              if (!m) continue;
              matchCount++;
              if (!files['__single__']) { files['__single__'] = []; fileOrder.push('__single__'); }
              files['__single__'].push({ line: m[1], text: m[2] });
            }
          } else {
            for (var j = 0; j < rawLines.length; j++) {
              var mm = rawLines[j].match(multiRx);
              if (!mm) continue;
              matchCount++;
              var f = mm[1];
              if (!files[f]) { files[f] = []; fileOrder.push(f); }
              files[f].push({ line: mm[2], text: mm[3] });
            }
            // files_with_matches mode: response is a plain list of file paths.
            if (matchCount === 0 && rawLines.length > 0) {
              filenameMode = true;
              matchCount = rawLines.length;
              for (var q = 0; q < rawLines.length; q++) {
                fileOrder.push(rawLines[q]);
                files[rawLines[q]] = [];
              }
            }
          }
          var fileCount = singleFileMode ? 1 : fileOrder.length;
          var summary;
          if (matchCount === 0) {
            summary = 'No matches';
          } else if (filenameMode) {
            summary = 'Found ' + matchCount + ' ' + (matchCount === 1 ? 'file' : 'files');
          } else {
            summary = 'Found ' + matchCount + ' ' + (matchCount === 1 ? 'line' : 'lines') +
              (fileCount > 1 ? ' across ' + fileCount + ' files' : '');
          }
          var body = '<div class="m-grep">';
          var MAX_LINES = 40;
          var shown = 0, clipped = false;
          for (var k = 0; k < fileOrder.length && !clipped; k++) {
            var key = fileOrder[k];
            var hits = files[key];
            if (!singleFileMode) {
              body += '<div class="m-grep-file">' + escapeHtml(key) + '</div>';
            }
            for (var h = 0; h < hits.length; h++) {
              if (shown >= MAX_LINES) { clipped = true; break; }
              body += '<div class="m-grep-row">' +
                '<span class="m-grep-ln">' + escapeHtml(hits[h].line) + '</span>' +
                '<code class="m-grep-text">' + escapeHtml(hits[h].text) + '</code>' +
                '</div>';
              shown++;
            }
          }
          if (clipped) {
            body += '<div class="m-grep-more">… ' + (matchCount - shown) + ' more</div>';
          }
          body += '</div>';
          appendDetails(el, summary, body, { open: true });
        },
      },

      // ── Claude Code task list (Task* family) ─────────────────────
      //
      // Each renderer maintains `taskState` so TaskUpdate cards can show
      // the subject (which lives on the earlier TaskCreate) plus a live
      // checkbox line matching the CLI's TaskListV2 rendering.

      // Inline cards are intentionally terse — the persistent task
      // panel in the header is the source of truth for current state.
      // These rows just mark "when" something happened.

      TaskCreate: {
        call: function(p, el) {
          var subject = (p.input && p.input.subject) || '';
          var activeForm = p.input && p.input.activeForm;
          var description = p.input && p.input.description;
          // Upsert under a temp key keyed on tool_use_id so the task
          // shows in the panel immediately, even if the result hook is
          // delayed or never arrives. The result handler migrates to
          // the real task id.
          if (p.tool_use_id) {
            var tmpKey = 'pending:' + p.tool_use_id;
            pendingTaskCreates.set(p.tool_use_id, {
              subject: subject,
              activeForm: activeForm,
              description: description,
              tmpKey: tmpKey,
            });
            taskUpsert(tmpKey, {
              subject: subject,
              activeForm: activeForm,
              description: description,
              status: 'pending',
            });
          }
          el.innerHTML = makeHeadline('TaskCreate', '➕ ' + escapeHtml(subject));
        },
        result: function(p, el) {
          if (p.is_error) { setStatusError(el); return; }
          setStatusOk(el, 'created');
          var id = parseCreatedTaskId(p.response);
          if (id) {
            var pend = pendingTaskCreates.get(p.tool_use_id);
            if (pend) {
              if (pend.tmpKey) taskState.delete(pend.tmpKey);
              // Don't overwrite status if a later TaskUpdate already
              // moved this task (in_progress / completed arriving
              // before TaskCreate's result hook is a real ordering).
              var existing = taskState.get(String(id));
              var data = {
                subject: pend.subject,
                activeForm: pend.activeForm,
                description: pend.description,
              };
              if (!existing || !existing.status) data.status = 'pending';
              taskUpsert(id, data);
              pendingTaskCreates.delete(p.tool_use_id);
            }
          }
        },
      },

    // Small helper for MCP tools with no meaningful input/output —
    // the headline tells the whole story.
    function cnSimple(headline, okText) {
      return {
        call: function(p, el) {
          el.innerHTML = makeHeadline('claude-net', headline);
        },
        result: function(p, el) {
          if (p.is_error) setStatusError(el); else setStatusOk(el, okText || 'done');
        },
      };
    }

    // Read's PostToolUse payload ships a structured object:
    //   { type: 'text', file: { filePath, content, startLine, numLines, totalLines } }
    // but the older cat -n string form still turns up in orphan-result
    // paths and redacted fallbacks. Normalise to { rows, totalLines,
    // startLine } and let callers render.
    // Bridges to the extracted parsers module served at /dashboard/parsers.js.
    // The <script type="module"> in <head> assigns them to window.Parsers.
    function parseReadContent(resp)       { return window.Parsers.parseReadContent(resp); }
    function parseReadTextLines(text)     { return window.Parsers.parseReadTextLines(text); }
    function extractCnList(resp, key)     { return window.Parsers.extractCnList(resp, key); }
    function unwrapMcpText(resp)          { return window.Parsers.unwrapMcpText(resp); }
    function extractToolSearchNames(text) { return window.Parsers.extractToolSearchNames(text); }
    function extractWebSearchResults(resp){ return window.Parsers.extractWebSearchResults(resp); }
    function hostFromUrl(u)               { return window.Parsers.hostFromUrl(u); }
    function toWebSearchText(resp)        { return window.Parsers.toWebSearchText(resp); }
    function extractWebSearchSummary(resp){ return window.Parsers.extractWebSearchSummary(resp); }

    // Render an unknown tool with a clear "no custom view yet" note.
    function renderUnknownToolCall(payload, el) {

      el.innerHTML = makeHeadline(name, '');

      if (badge) { badge.className = 'm-tool-badge nosupport'; badge.textContent = 'no view'; }
      appendDetails(el, 'input (raw)',
        '<pre>' + escapeHtml(tryJson(payload.input)) + '</pre>');
    }
    function renderUnknownToolResult(payload, el) {
      var resp = typeof payload.response === 'string' ? payload.response : tryJson(payload.response);
      if (payload.is_error) setStatusError(el);
      else setStatusOk(el, 'done');
      appendDetails(el, 'result (raw)', '<pre>' + escapeHtml(truncateLines(resp, 30)) + '</pre>');
