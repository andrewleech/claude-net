<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-net</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1b26;
    --bg-surface: #24283b;
    --bg-hover: #2f3349;
    --border: #3b3f54;
    --text: #c0caf5;
    --text-muted: #565f89;
    --text-dim: #737aa2;
    --green: #9ece6a;
    --red: #f7768e;
    --blue: #7aa2f7;
    --cyan: #7dcfff;
    --orange: #ff9e64;
    --purple: #bb9af7;
    --yellow: #e0af68;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .status-dot.online { background: var(--green); }
  .status-dot.offline { background: var(--red); }

  /* Main layout */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Panels */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-shrink: 0;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* Agent sidebar */
  .sidebar { width: 200px; flex-shrink: 0; }

  .agent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .agent-item:hover { background: var(--bg-hover); }

  .agent-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .agent-dot.online { background: var(--green); }
  .agent-dot.offline { background: var(--text-muted); }

  .agent-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Message feed */
  .feed { flex: 1; min-width: 0; }

  .feed .panel-body { padding: 4px 8px; }

  .msg-entry {
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 2px;
    font-size: 13px;
    line-height: 1.4;
  }

  .msg-entry:hover { background: var(--bg-hover); }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 1px;
  }

  .msg-route {
    font-weight: 600;
    font-size: 12px;
  }

  .msg-route.direct { color: var(--blue); }
  .msg-route.broadcast { color: var(--orange); }
  .msg-route.team { color: var(--purple); }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .msg-content {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 80px;
    overflow: hidden;
  }

  /* Teams panel */
  .teams-panel { width: 220px; flex-shrink: 0; }

  .team-item {
    padding: 6px 12px;
    font-size: 13px;
  }

  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 2px 0;
    font-weight: 500;
  }

  .team-header:hover { color: var(--cyan); }

  .team-count {
    font-size: 11px;
    color: var(--text-muted);
  }

  .team-members {
    padding-left: 14px;
    margin-top: 2px;
  }

  .team-member {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1px 0;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Send bar */
  .send-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .send-bar label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .send-bar input, .send-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }

  .send-bar input:focus, .send-bar select:focus {
    border-color: var(--blue);
  }

  #to-field { width: 160px; }
  #msg-field { flex: 1; }

  #send-btn {
    background: var(--blue);
    color: var(--bg);
    border: none;
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  .send-error {
    font-size: 12px;
    color: var(--red);
    margin-left: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Mirror-session view (path /mirror/:sid) */
  #mirror-root { display: none; flex: 1; flex-direction: column; min-height: 0; }
  body.mirror-mode #dashboard-root { display: none; }
  body.mirror-mode #mirror-root { display: flex; }

  .mirror-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .mirror-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .mirror-title .sid { color: var(--text-muted); font-family: monospace; margin-left: 8px; }
  .mirror-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .mirror-meta span { white-space: nowrap; }
  .mirror-meta .cwd { font-family: monospace; }

  .mirror-transcript {
    flex: 1; overflow-y: auto;
    padding: 16px 24px; display: flex; flex-direction: column; gap: 12px;
  }
  .m-evt { max-width: 78ch; word-wrap: break-word; font-size: 13px; line-height: 1.45; }
  .m-evt pre { white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; }
  .m-evt-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

  .m-evt-user { align-self: stretch; padding: 10px 12px; background: rgba(122,162,247,0.10); border-left: 3px solid var(--blue); border-radius: 4px; }
  .m-evt-user .m-label { color: var(--blue); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .m-evt-assistant { align-self: stretch; padding: 10px 12px; background: rgba(158,206,106,0.08); border-left: 3px solid var(--green); border-radius: 4px; }
  .m-evt-assistant .m-label { color: var(--green); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .m-evt-tool { align-self: stretch; padding: 8px 12px; background: var(--bg-surface); border-left: 3px solid var(--cyan); border-radius: 4px; }
  .m-evt-tool .m-label { color: var(--cyan); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .m-evt-tool details { margin-top: 4px; }
  .m-evt-tool summary { cursor: pointer; color: var(--text-muted); font-size: 12px; user-select: none; }
  .m-evt-tool .m-tool-result { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
  .m-evt-tool.is-error { border-left-color: var(--red); }

  .m-evt-notif { align-self: center; color: var(--text-muted); font-style: italic; font-size: 12px; }
  .m-evt-compact { align-self: center; color: var(--text-dim); font-size: 12px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); padding: 4px 12px; }
  .m-evt-end { align-self: center; color: var(--orange); font-size: 12px; font-weight: 600; }
  .m-truncated { color: var(--orange); font-size: 11px; margin-left: 6px; }

  .mirror-compose {
    display: flex; align-items: stretch; gap: 8px;
    padding: 12px 24px; background: var(--bg-surface); border-top: 1px solid var(--border);
  }
  .mirror-compose.compose-hidden { display: none; }
  .mirror-compose-note { font-size: 12px; color: var(--text-muted); padding: 6px 0; flex: 1; }
  .mirror-compose textarea {
    flex: 1; min-height: 44px; max-height: 140px; resize: vertical;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px;
  }
  .mirror-compose textarea:focus { outline: none; border-color: var(--blue); }
  .mirror-compose button {
    background: var(--blue); color: var(--bg); border: none; padding: 0 18px;
    border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer;
    align-self: stretch; min-width: 80px;
  }
  .mirror-compose button:hover { opacity: 0.85; }
  .mirror-compose button:disabled { opacity: 0.4; cursor: default; }
  .mirror-compose-err { font-size: 12px; color: var(--red); padding: 4px 12px; min-height: 18px; }

  .mirror-status { font-size: 11px; padding: 4px 12px; color: var(--text-muted); }
  .mirror-status.error { color: var(--red); }
</style>
</head>
<body>

<div id="dashboard-root">
<header>
  <h1>claude-net</h1>
  <div class="header-stats">
    <span id="agent-count">0 agents</span>
    <span id="team-count">0 teams</span>
    <span><span id="conn-dot" class="status-dot offline"></span><span id="conn-label">disconnected</span></span>
  </div>
</header>

<main>
  <div class="panel sidebar">
    <div class="panel-header">Agents</div>
    <div class="panel-body" id="agent-list"></div>
  </div>

  <div class="panel feed">
    <div class="panel-header">Messages</div>
    <div class="panel-body" id="msg-feed"></div>
  </div>

  <div class="panel teams-panel">
    <div class="panel-header">Teams</div>
    <div class="panel-body" id="team-list"></div>
  </div>
</main>

<div class="send-bar">
  <label for="to-field">To:</label>
  <input type="text" id="to-field" placeholder="agent, broadcast, team:name" list="to-suggestions">
  <datalist id="to-suggestions"></datalist>
  <input type="text" id="msg-field" placeholder="Message content...">
  <button id="send-btn">Send</button>
  <span class="send-error" id="send-error"></span>
</div>
</div>

<div id="mirror-root">
  <header class="mirror-header">
    <div class="mirror-title">mirror session<span class="sid" id="mirror-sid"></span></div>
    <div class="mirror-meta">
      <span class="cwd" id="mirror-cwd"></span>
      <span id="mirror-owner"></span>
      <span id="mirror-conn">connecting…</span>
    </div>
  </header>
  <div class="mirror-status" id="mirror-status"></div>
  <div class="mirror-transcript" id="mirror-transcript"></div>
  <div class="mirror-compose compose-hidden" id="mirror-compose">
    <textarea id="mirror-compose-text" placeholder="Send a prompt to the local claude (Enter to send, Shift+Enter for newline)…" rows="2"></textarea>
    <button id="mirror-compose-send" type="button">Send</button>
  </div>
  <div class="mirror-compose-err" id="mirror-compose-err"></div>
</div>

<script>
(function() {
  'use strict';

  // --- Router: dashboard (default) vs mirror view (/mirror/:sid) ---
  var mirrorMatch = location.pathname.match(/^\/mirror\/([^/]+)\/?$/);
  if (mirrorMatch) {
    document.body.classList.add('mirror-mode');
    startMirror(decodeURIComponent(mirrorMatch[1]));
    return;
  }

  // --- Dashboard state ---
  const agents = new Map(); // fullName -> { name, fullName, status }
  const teams = new Map();  // teamName -> { members: string[] }
  const messages = [];       // { from, to, type, content, team?, timestamp, routeType }
  const MAX_MESSAGES = 200;
  const RECONNECT_INTERVAL = 3000;

  // --- DOM refs ---
  const agentListEl = document.getElementById('agent-list');
  const msgFeedEl = document.getElementById('msg-feed');
  const teamListEl = document.getElementById('team-list');
  const agentCountEl = document.getElementById('agent-count');
  const teamCountEl = document.getElementById('team-count');
  const connDot = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const toField = document.getElementById('to-field');
  const msgField = document.getElementById('msg-field');
  const sendBtn = document.getElementById('send-btn');
  const sendError = document.getElementById('send-error');
  const toSuggestions = document.getElementById('to-suggestions');

  // --- WebSocket ---
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/dashboard');

    ws.onopen = function() {
      setConnected(true);
      if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
    };

    ws.onmessage = function(e) {
      var event;
      try { event = JSON.parse(e.data); } catch { return; }
      handleEvent(event);
    };

    ws.onclose = function() {
      setConnected(false);
      scheduleReconnect();
    };

    ws.onerror = function() {
      // onclose will fire after this
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        connect();
      }
    }, RECONNECT_INTERVAL);
  }

  function setConnected(connected) {
    connDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
    connLabel.textContent = connected ? 'connected' : 'disconnected';
  }

  // --- Event handling ---
  function handleEvent(event) {
    switch (event.event) {
      case 'agent:connected':
        agents.set(event.full_name, {
          name: event.name,
          fullName: event.full_name,
          status: 'online'
        });
        renderAgents();
        updateSuggestions();
        break;

      case 'agent:disconnected':
        agents.delete(event.full_name);
        renderAgents();
        updateSuggestions();
        break;

      case 'message:routed':
        addMessage(event);
        break;

      case 'dashboard:message':
        addMessage(event);
        break;

      case 'team:changed':
        if (event.action === 'deleted') {
          teams.delete(event.team);
        } else {
          teams.set(event.team, { members: event.members || [] });
        }
        renderTeams();
        updateSuggestions();
        break;
    }

    updateCounts();
  }

  // --- Render agents ---
  function renderAgents() {
    var sorted = Array.from(agents.values()).sort(function(a, b) {
      if (a.status !== b.status) return a.status === 'online' ? -1 : 1;
      return a.fullName.localeCompare(b.fullName);
    });

    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var ag = sorted[i];
      html += '<div class="agent-item" data-name="' + escapeAttr(ag.fullName) + '">'
        + '<span class="agent-dot ' + ag.status + '"></span>'
        + '<span class="agent-name">' + escapeHtml(ag.fullName) + '</span>'
        + '</div>';
    }
    agentListEl.innerHTML = html;

    // Bind click handlers
    var items = agentListEl.querySelectorAll('.agent-item');
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener('click', function() {
        toField.value = this.getAttribute('data-name');
        msgField.focus();
      });
    }
  }

  // --- Render messages ---
  function addMessage(event) {
    var routeType = 'direct';
    var toLabel = event.to;
    if (event.to === 'broadcast') {
      routeType = 'broadcast';
      toLabel = 'broadcast';
    } else if (event.team) {
      routeType = 'team';
      toLabel = 'team:' + event.team;
    }

    messages.push({
      from: event.from,
      to: toLabel,
      type: event.type,
      content: event.content,
      timestamp: event.timestamp,
      routeType: routeType
    });

    while (messages.length > MAX_MESSAGES) {
      messages.shift();
    }

    renderLastMessage();
  }

  function renderLastMessage() {
    var msg = messages[messages.length - 1];
    if (!msg) return;

    var el = document.createElement('div');
    el.className = 'msg-entry';
    el.innerHTML =
      '<div class="msg-meta">'
        + '<span class="msg-route ' + msg.routeType + '">'
          + escapeHtml(msg.from) + ' &rarr; ' + escapeHtml(msg.to)
        + '</span>'
        + '<span class="msg-time">' + formatTime(msg.timestamp) + '</span>'
      + '</div>'
      + '<div class="msg-content">' + escapeHtml(msg.content) + '</div>';

    msgFeedEl.appendChild(el);

    // Remove excess DOM nodes
    while (msgFeedEl.children.length > MAX_MESSAGES) {
      msgFeedEl.removeChild(msgFeedEl.firstChild);
    }

    // Auto-scroll
    msgFeedEl.scrollTop = msgFeedEl.scrollHeight;
  }

  // --- Render teams ---
  function renderTeams() {
    var html = '';
    var teamNames = Array.from(teams.keys()).sort();
    for (var i = 0; i < teamNames.length; i++) {
      var tName = teamNames[i];
      var team = teams.get(tName);
      var members = team.members || [];

      html += '<div class="team-item">'
        + '<div class="team-header" data-team="' + escapeAttr(tName) + '">'
          + '<span>' + escapeHtml(tName) + '</span>'
          + '<span class="team-count">' + members.length + '</span>'
        + '</div>'
        + '<div class="team-members">';

      for (var j = 0; j < members.length; j++) {
        var memberName = members[j];
        var ag = agents.get(memberName);
        var status = ag ? ag.status : 'offline';
        html += '<div class="team-member">'
          + '<span class="agent-dot ' + status + '"></span>'
          + '<span>' + escapeHtml(memberName) + '</span>'
          + '</div>';
      }

      html += '</div></div>';
    }
    teamListEl.innerHTML = html;
  }

  // --- Update counts ---
  function updateCounts() {
    var onlineCount = 0;
    agents.forEach(function(ag) { if (ag.status === 'online') onlineCount++; });
    agentCountEl.textContent = onlineCount + ' agent' + (onlineCount !== 1 ? 's' : '');
    teamCountEl.textContent = teams.size + ' team' + (teams.size !== 1 ? 's' : '');
  }

  // --- Update to-field suggestions ---
  function updateSuggestions() {
    var html = '<option value="broadcast">';
    agents.forEach(function(ag) {
      html += '<option value="' + escapeAttr(ag.fullName) + '">';
    });
    teams.forEach(function(_, tName) {
      html += '<option value="team:' + escapeAttr(tName) + '">';
    });
    toSuggestions.innerHTML = html;
  }

  // --- Send message ---
  function doSend() {
    var to = toField.value.trim();
    var content = msgField.value.trim();
    sendError.textContent = '';

    if (!to || !content) return;
    sendBtn.disabled = true;

    var url, body;
    if (to === 'broadcast') {
      url = '/api/broadcast';
      body = { from: 'dashboard', content: content };
    } else if (to.startsWith('team:')) {
      url = '/api/send_team';
      body = { from: 'dashboard', team: to.slice(5), content: content };
    } else {
      url = '/api/send';
      body = { from: 'dashboard', to: to, content: content };
    }

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      sendBtn.disabled = false;
      if (data.error) {
        sendError.textContent = data.error;
      } else {
        msgField.value = '';
      }
    })
    .catch(function(err) {
      sendBtn.disabled = false;
      sendError.textContent = 'Send failed: ' + err.message;
    });
  }

  sendBtn.addEventListener('click', doSend);
  msgField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });

  // --- Helpers ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  // --- Init ---
  connect();
  updateCounts();

  // ── Mirror view (scoped within the outer IIFE so helpers are in scope) ─
  function startMirror(sid) {
    var token = '';
    var hash = location.hash || '';
    var m = hash.match(/(?:^#|&)token=([^&]+)/);
    if (m) token = decodeURIComponent(m[1]);

    var sidEl = document.getElementById('mirror-sid');
    var cwdEl = document.getElementById('mirror-cwd');
    var ownerEl = document.getElementById('mirror-owner');
    var connEl = document.getElementById('mirror-conn');
    var statusEl = document.getElementById('mirror-status');
    var transcriptEl = document.getElementById('mirror-transcript');

    sidEl.textContent = sid;
    connEl.textContent = 'connecting…';

    if (!token) {
      statusEl.className = 'mirror-status error';
      statusEl.textContent = 'Missing token in URL fragment. Paste the full mirror URL (including #token=...).';
      connEl.textContent = 'unauthenticated';
      return;
    }

    var rendered = Object.create(null); // uuid → true
    var autoscroll = true;

    transcriptEl.addEventListener('scroll', function() {
      var nearBottom =
        transcriptEl.scrollTop + transcriptEl.clientHeight >=
        transcriptEl.scrollHeight - 24;
      autoscroll = nearBottom;
    });

    function renderEvent(evt) {
      if (!evt || !evt.uuid || rendered[evt.uuid]) return;
      rendered[evt.uuid] = true;

      var kind = evt.kind;
      var payload = evt.payload || {};
      var el = document.createElement('div');
      el.className = 'm-evt m-evt-' + kind;

      if (kind === 'user_prompt') {
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">user</span> ' + formatTime(new Date(evt.ts).toISOString()) + '</div>' +
          '<pre>' + escapeHtml(payload.prompt || '') + '</pre>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
      } else if (kind === 'assistant_message') {
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">assistant</span> ' + formatTime(new Date(evt.ts).toISOString()) + '</div>' +
          '<pre>' + escapeHtml(payload.text || '') + '</pre>' +
          (payload.truncated ? '<span class="m-truncated">truncated</span>' : '');
      } else if (kind === 'tool_call') {
        var inputStr = tryJson(payload.input);
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">tool</span> ' + escapeHtml(payload.tool_name || '') + ' ' + formatTime(new Date(evt.ts).toISOString()) + '</div>' +
          '<details><summary>input</summary><pre>' + escapeHtml(inputStr) + '</pre></details>';
        el.setAttribute('data-tool-use-id', payload.tool_use_id || '');
      } else if (kind === 'tool_result') {
        // Try to attach to the matching tool_call card if present.
        var existing = payload.tool_use_id
          ? transcriptEl.querySelector('[data-tool-use-id="' + cssEscape(payload.tool_use_id) + '"]')
          : null;
        var responseStr = tryJson(payload.response);
        if (existing) {
          if (payload.is_error) existing.classList.add('is-error');
          var res = document.createElement('div');
          res.className = 'm-tool-result';
          res.innerHTML = '<details open><summary>result' + (payload.is_error ? ' (error)' : '') + '</summary><pre>' + escapeHtml(responseStr) + '</pre></details>';
          existing.appendChild(res);
          return; // no new event card
        }
        el.className = 'm-evt m-evt-tool' + (payload.is_error ? ' is-error' : '');
        el.innerHTML =
          '<div class="m-evt-meta"><span class="m-label">tool result</span> ' + escapeHtml(payload.tool_name || '') + ' ' + formatTime(new Date(evt.ts).toISOString()) + '</div>' +
          '<details open><summary>result' + (payload.is_error ? ' (error)' : '') + '</summary><pre>' + escapeHtml(responseStr) + '</pre></details>';
      } else if (kind === 'notification') {
        el.innerHTML = escapeHtml(payload.text || '');
      } else if (kind === 'compact') {
        el.innerHTML = '— conversation ' + (payload.phase === 'pre' ? 'compacting' : 'compacted') + ' —';
      } else if (kind === 'session_start') {
        el.innerHTML = '— session started (' + escapeHtml(payload.source || '') + ') —';
      } else if (kind === 'session_end') {
        el.className = 'm-evt m-evt-end';
        el.innerHTML = '— session ended (' + escapeHtml(payload.reason || '') + ') —';
      } else {
        el.innerHTML = '<pre>' + escapeHtml(JSON.stringify(evt)) + '</pre>';
      }

      transcriptEl.appendChild(el);
      if (autoscroll) {
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }
    }

    function applyInit(msg) {
      cwdEl.textContent = msg.cwd || '';
      ownerEl.textContent = msg.owner_agent || '';
      connEl.textContent = 'connected';
      if (msg.closed_at) {
        statusEl.className = 'mirror-status';
        statusEl.textContent = 'session closed at ' + msg.closed_at;
      }
      transcriptEl.innerHTML = '';
      rendered = Object.create(null);
      if (Array.isArray(msg.transcript)) {
        for (var i = 0; i < msg.transcript.length; i++) {
          renderEvent(msg.transcript[i]);
        }
      }
    }

    var mws = null;
    var mReconnectTimer = null;
    function mConnect() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = proto + '//' + location.host + '/ws/mirror/' + encodeURIComponent(sid) + '?t=' + encodeURIComponent(token);
      try {
        mws = new WebSocket(url);
      } catch (e) {
        connEl.textContent = 'error';
        statusEl.className = 'mirror-status error';
        statusEl.textContent = 'Failed to open WebSocket: ' + (e && e.message ? e.message : e);
        return;
      }
      mws.onopen = function() { connEl.textContent = 'connected'; statusEl.textContent = ''; statusEl.className = 'mirror-status'; };
      mws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.event === 'mirror:init') applyInit(msg);
        else if (msg.event === 'mirror:event') renderEvent(msg);
        else if (msg.event === 'error') {
          statusEl.className = 'mirror-status error';
          statusEl.textContent = msg.message || 'error';
        }
      };
      mws.onclose = function() {
        connEl.textContent = 'disconnected';
        if (mReconnectTimer) return;
        mReconnectTimer = setTimeout(function() { mReconnectTimer = null; mConnect(); }, 3000);
      };
      mws.onerror = function() { /* close will follow */ };
    }
    mConnect();

    // Compose box (remote inject). Shown because we have an owner token —
    // reader-token UX lands in Phase M3.
    var composeEl = document.getElementById('mirror-compose');
    var composeText = document.getElementById('mirror-compose-text');
    var composeSend = document.getElementById('mirror-compose-send');
    var composeErr = document.getElementById('mirror-compose-err');
    if (composeEl) composeEl.classList.remove('compose-hidden');

    function doInject() {
      var text = composeText.value;
      if (!text || !text.trim()) return;
      composeSend.disabled = true;
      composeErr.textContent = '';
      fetch('/api/mirror/' + encodeURIComponent(sid) + '/inject?t=' + encodeURIComponent(token), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, watcher: 'web' })
      })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(r) {
          composeSend.disabled = false;
          if (r.status >= 400) {
            composeErr.textContent = (r.body && r.body.error) || ('HTTP ' + r.status);
          } else {
            composeText.value = '';
          }
        })
        .catch(function(err) {
          composeSend.disabled = false;
          composeErr.textContent = 'Send failed: ' + (err && err.message ? err.message : err);
        });
    }

    if (composeSend) composeSend.addEventListener('click', doInject);
    if (composeText) {
      composeText.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doInject();
        }
      });
    }
  }

  function tryJson(v) {
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v, null, 2); } catch { return String(v); }
  }

  function cssEscape(s) {
    return String(s).replace(/[^a-zA-Z0-9_-]/g, function(c) {
      return '\\' + c;
    });
  }
})();
</script>
</body>
</html>
